  /v1/conversations/{id}:
    delete:
      tags: [Dify-Compat]
      summary: 删除会话
      description: 删除当前用户的某一次会话（Dify 兼容接口）
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: string
            example:
              user: "default"
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              example:
                result: "success"
        "404":
          description: 会话不存在

  /v1/chat-messages/{task_id}/stop:
    post:
      tags: [Dify-Compat]
      summary: 停止响应
      description: 停止正在运行的流式响应（Dify 兼容接口）。task_id 是 SSE 流中的 Dify task_id。
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: SSE 流中的 Dify task_id（非 message_id）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: string
            example:
              user: "default"
      responses:
        "200":
          description: 停止成功
          content:
            application/json:
              example:
                result: "success"
        "404":
          description: 任务不存在或已停止

