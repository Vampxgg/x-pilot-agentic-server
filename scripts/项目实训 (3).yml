              - 2-3 句话的总体判断：基于 Step 3 的根因主题，直接点明核心问题所在，不说套话



              ### 执行分析报告



              数据来源：日志中每个步骤的 STEP_COMPLETE 记录 + 各步骤下 PROCESSING 记录汇总



              以表格形式呈现 SOP 中**每一个步骤**的执行结果：

              - 步骤编号和名称

              - 执行状态（通过 / 有瑕疵 / 失败 / 跳过）

              - 得分情况（实得分 / 满分）

              - 主要问题摘要（如有）



              **强制要求：SOP 有多少个步骤，表格就必须有多少行。一行不能少。**



              ### 问题深度分析



              数据来源：Step 3 的根因主题 + Step 4 的逐项分析



              按 Step 3 归纳出的根因主题组织内容。每个根因主题包含：



              1. 主题名称和根因分析（为什么这些问题会同时出现）

              2. 涉及的具体问题列表（step_id + kop_name）

              3. 该主题下每个 critical/high 问题的详细分析：

                 - 问题描述（引用日志中的 description、kop_name、时间戳）

                 - 风险说明（引用 SOP 中的 deduction_rule 和 forbidden_action）

                 - 正确做法（引用 SOP 中的 scoring_criteria）

                 - 练习建议

              4. 该主题下 medium/low 问题以简表形式呈现（KOP名称、扣分、改进要点）



              **弹性深度规则：**

              - 如果问题登记簿总条数 <= 3：每条都做详细分析

              - 如果总条数 4-10：critical/high 做详细分析，medium/low 做简要分析

              - 如果总条数 > 10：按根因主题组织，每个主题内选最典型的 1-2 个做详细分析，其余简表呈现，但**每一条都必须出现在报告中**



              ### 改进路径与学习资源



              数据来源：Step 5 + get_datas 工具返回结果



              按根因主题组织改进方向，每个方向包含：

              - 具体的练习任务（可操作的、有明确完成标准的）

              - 推荐的学习资源（来自工具返回，标注标题和链接）

              - 预期达成标准



              ### 评价



              一段简短的总结性评语。



