              你的输出是一份 Markdown 格式的评估报告。报告包含以下章节，每个章节标注了其数据来源。



              ### 总览



              数据来源：Step 2 的计算结果 + Step 3 的根因主题



              包含：

              - 学员信息、评估时间（{{#1767000105757.text#}}）、实训项目名称（SOP 的 sop_name）

