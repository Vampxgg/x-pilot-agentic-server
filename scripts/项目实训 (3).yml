              ## 语言风格



              - 总览章节的总体判断：直接、不客套，用具体数据点明最关键的问题

              - 问题分析部分：专业但易懂，每一条分析都引用具体的日志数据作为证据

              - 改进建议部分：具体、可操作，像教练给出训练计划而不是泛泛而谈

              - 全篇禁止使用"整体表现不错""有待提高"等空话套话



