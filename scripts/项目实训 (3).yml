              settings: {}
              tool_description: "主要用途： 基于用户提出的具体查询和检索需求，从内部知识库、外部互联网或视频内容中检索、过滤并聚合数据。这个工具是获取信息、验证知识和执行数据分析的第一步。\n\
                调用目标： 解决用户对特定信息、数据、报告或知识的需求。\n调用条件： 当用户明确要求查找、检索或获取数据时。\n| **输入参数**\
                \ | `query` | `database_id` | `methods` | `keywords` | `methods_local_is_all`\
                \ | `methods_web_provider_select` | `methods_web_video_nums` | `methods_web_domain_select`\
                \ | `methods_web_data_nums` |\n| :--- | :--- | :--- | :--- | :---\
                \ | :--- | :--- |:--- |:--- |:--- |\n| **必需性** | 否 | 否 | 否 | 是 | 是\
                \ (必填) | 否 | 否 | 否 | 否 |\n| **描述** | 用户发出的具体数据查询中心主题topic。 | 可选数据源：\
                \ 用户希望检索数据的特定知识库、文档集或数据库的唯一标识 ID。(`methods_local_is_all`为1的时候禁止使用)\
                \ | 检索策略： 指定本次数据获取所使用的一个或多个检索方式（可选参数为`local`、`web`、`hybrid`）。 | 数据检索关键字列表：`形式：[{\"\
                xx_id\":\"\",\"xx_queries\":[\"\",\"\"]}]` 详细的数据检索关键字列表适应于检索方式的三种形态。根据不同的关键字组合获取具有深度、高广度的相关数据\
                \ | **【本地检索模式】** `1` 表示使用所有知识库进行相关检索，`0` 表示使用用户要求的知识库进行检索。 | **【网络搜索提供商】**\
                \ 指定搜索引擎服务商，支持高度自定义。 | **【视频数量】** 指定每个关键字列表需要的视频数量。 |**【使用的特定域检索】**\
                \ 指定需要检索数据的相关域，支持高度自定义。 |**【检索在线资源数量】** 指定每个关键字列表需要的在线数据数量。 |\n**综合使用示例**\n\
                以下示例展示了如何根据不同需求组合使用上述参数：\n\n```json\n[\n  // 示例 1: 基础本地检索 - 在【指定】知识库中查找\n\
                \  // 场景：最常见的用法，用户明确知道要在哪个手册或知识库中查找信息。\n  {\n    \"keywords\": [\n\
                \      {\n        \"xx_id\": \"task_torque_wrench_01\",\n        \"\
                xx_queries\": [\"扭力扳手\", \"正确使用方法\", \"预设扭矩值\"]\n      }\n    ],\n\
                \    \"methods\": \"local\",\n    \"methods_local_is_all\": 0, //\
                \ 0表示使用指定的知识库\n    \"database_id\": \"db_vehicle_maintenance_manual_v3\"\
                , // 必须提供，因为methods_local_is_all为0\n    \"query\": \"查询扭力扳手的操作规范\"\
                \ // 可选的主题描述\n  },\n\n  // 示例 2: 进阶本地检索 - 在【所有】知识库中进行全局查找\n  // 场景：用户不确定信息在哪份资料里，需要在所有已知的内部知识库中进行广泛搜索。\n\
                \  {\n    \"keywords\": [\n      {\n        \"xx_id\": \"task_spark_plug_02\"\
                ,\n        \"xx_queries\": [\"火花塞\", \"更换周期\", \"大众EA888发动机\"]\n \
                \     }\n    ],\n    \"methods\": \"local\",\n    \"methods_local_is_all\"\
                : 1 // 1表示检索所有知识库\n    // 注意：此时 database_id 字段禁止出现\n  },\n\n  // 示例\
                \ 3: 基础网页检索 - 使用默认设置进行通用搜索\n  // 场景：需要从互联网上查找公开的、最新的信息。\n  {\n   \
                \ \"keywords\": [\n      {\n        \"xx_id\": \"info_emission_standard_01\"\
                ,\n        \"xx_queries\": [\"国六B排放标准\", \"最新政策解读\"]\n      }\n  \
                \  ],\n    \"methods\": \"web\",\n    \"database_id\": \"xxx\",\n\
                \    \"methods_local_is_all\": 0, // 本地检索未启用，此参数按文档要求填写，通常为0\n   \
                \ \"methods_web_data_nums\": 3 // 指定需要返回3条网页数据\n  },\n\n  // 示例 4:\
                \ 高级网页检索 - 自定义搜索引擎、域名和数量\n  // 场景：需要进行更精确的、有特定来源目标的网络搜索，例如在专业论坛或官方网站上查找。\n\
                \  {\n    \"keywords\": [\n      {\n        \"xx_id\": \"tech_battery_life_01\"\
                ,\n        \"xx_queries\": [\"新能源汽车\", \"三元锂电池\", \"冬季续航衰减\"]\n  \
                \    }\n    ],\n    \"methods\": \"web\",\n    \"methods_local_is_all\"\
                : 0,\n    \"methods_web_provider_select\": \"searchapi_io\",\n   \
                \ \"methods_web_domain_select\": \"web\",\n    \"methods_web_data_nums\"\
                : 3,  // 需要3条网页结果\n    \"methods_web_video_nums\": 2   // 同时需要2个相关的教学视频\n\
                \  },\n\n  // 示例 5: 混合检索模式 - 本地优先，网络补充\n  // 场景：这是一个非常强大的模式。系统会首先检索本地指定的知识库，然后用同样的关键词去网络上查找补充信息。\n\
                \  {\n    \"keywords\": [\n      {\n        \"xx_id\": \"hybrid_atf_change_01\"\
                ,\n        \"xx_queries\": [\"自动变速箱油\", \"循环机换油\", \"ZF 8速\"]\n  \
                \    },\n      {\n        \"xx_id\": \"hybrid_atf_check_02\",\n  \
                \      \"xx_queries\": [\"ATF油位检查\", \"油温要求\"]\n      }\n    ],\n\
                \    \"methods\": \"hybrid\",\n    \"query\": \"自动变速箱油更换与检查的完整流程\"\
                ,\n    // --- 本地检索部分 ---\n    \"methods_local_is_all\": 0,\n    \"\
                database_id\": \"db_transmission_repair_guide\",\n    // --- 网络检索部分\
                \ ---\n    \"methods_web_provider_select\": \"web\",\n    \"methods_web_data_nums\"\
                : 3,\n    \"methods_web_video_nums\": 2\n  },\n\n  // 示例 6: 复杂检索 -\
                \ 多个关键词组的综合查询\n  // 场景：用户的查询意图非常复杂，包含多个子主题，需要对每个子主题分别进行检索，并将结果汇总。\n\
                \  {\n    \"keywords\": [\n      {\n        \"xx_id\": \"complex_task_a\"\
                ,\n        \"xx_queries\": [\"发动机正时皮带\", \"更换教程\", \"标记点对齐\"]\n  \
                \    },\n      {\n        \"xx_id\": \"complex_task_b\",\n       \
                \ \"xx_queries\": [\"冷却液\", \"冰点测试\", \"更换排空气方法\"]\n      },\n   \
                \   {\n        \"xx_id\": \"complex_task_c\",\n        \"xx_queries\"\
                : [\"制动液\", \"DOT4标准\", \"含水量检测\"]\n      }\n    ],\n    \"methods\"\
                : \"hybrid\",\n    \"query\": \"车辆大保养全套流程技术要点\",\n    \"methods_local_is_all\"\
                : 1, // 对所有本地知识库进行检索\n    \"methods_web_data_nums\": 3,\n    \"methods_web_video_nums\"\
                : 1\n  }\n]\n\n**输出**：包含相关数据的数据关键列表"
              tool_label: 数据Pipeline
              tool_name: get_datas
              type: workflow
