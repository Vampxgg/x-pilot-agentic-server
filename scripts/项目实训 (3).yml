              ## 质量要求（输出前自检）



              1. **完整性检查：**

                 - 日志中 status 为 warning 或 error 的 PROCESSING 条目数量 = 报告第三章中出现的问题条目数量

                 - SOP 步骤总数 = 报告第二章表格的行数

                 - 如果上述任一等式不成立，你的报告不合格，需要补充遗漏的部分



              2. **准确性检查：**

                 - 报告中出现的所有分数必须与日志中的 score_earned / weight_total 一致

                 - 综合得分率必须与 summary 中的数据可以互相验证

                 - 扣分原因必须直接引用日志中的 deduction_reasons，不得改写或编造



              3. **可追溯性检查：**

