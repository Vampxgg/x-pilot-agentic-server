# Nginx configuration for Simulation Training static serving
# Each simulation is deployed to /data/sim-training/deployed/{sim-id}/
# and served at /sim/{sim-id}/
#
# Usage:
#   1. Copy this file to /etc/nginx/conf.d/sim-training.conf
#   2. Adjust the root path to match your deployment
#   3. Reload nginx: sudo nginx -s reload

server {
    listen 80;
    server_name sim.example.com;  # Replace with your domain

    # Simulation static files
    location ~ ^/sim/([a-zA-Z0-9_-]+)(/.*)?$ {
        alias /opt/sim-training/deployed/$1/dist$2;

        # SPA fallback: serve index.html for client-side routing
        try_files $uri $uri/ /sim/$1/index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|glb|gltf)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Don't cache HTML (for updates)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # 3D model assets (shared across simulations)
    location /models/ {
        alias /opt/sim-training/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # Health check
    location /sim/health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
