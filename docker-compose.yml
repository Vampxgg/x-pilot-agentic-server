# Infrastructure services for x-pilot-agentic-server.
# Start: docker compose up -d
# Stop:  docker compose down
# Data:  ./volumes/postgres/ (bind mount, see .gitignore)

services:
  postgres:
    image: postgres:16-alpine
    container_name: xpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: xpilot
    ports:
      - "5433:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d xpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  playwright:
    image: mcr.microsoft.com/playwright:v1.60.0-noble
    container_name: xpilot-playwright
    restart: unless-stopped
    init: true
    ipc: host
    ports:
      - "3001:3000"
    command: >
      /bin/sh -c "npx -y playwright@1.60.0 run-server --port 3000 --host 0.0.0.0"
