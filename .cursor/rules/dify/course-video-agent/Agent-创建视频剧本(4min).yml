      \ \"string\",\n            icon: \"string (optional)\",\n          },\n    \
      \    },\n        {\n          type: \"key-value-list\",\n          displayName:\
      \ \"键值对列表\",\n          description: \"展示成对的属性信息（如参数、档案）。\",\n          contentSchema:\
      \ {\n            items: [\n              {\n                label: \"string\"\
      ,\n                value: \"string\",\n              },\n            ],\n  \
      \        },\n        },\n        {\n          type: \"bullet-points\",\n   \
      \       displayName: \"要点列表\",\n          description: \"结构化罗列并列的信息点或步骤。\",\n\
      \          contentSchema: {\n            title: \"string (optional)\",\n   \
      \         points: [\n              {\n                text: \"string\",\n  \
