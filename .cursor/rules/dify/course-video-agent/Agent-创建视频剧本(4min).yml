          import json\nimport re\n\ndef main(scene_data: str):\n    \"\"\"\n    适配器：解析\
          \ SceneBuilder 的输出，判断是否需要调用文生图工具。\n    \n    Inputs:\n    - scene_data:\
          \ SceneBuilder LLM 输出的 JSON 字符串 (Raw string from LLM)\n    \n    Outputs:\n\
          \    {\n        \"should_generate\": bool,\n        \"tool_input_original_script\"\
          : str, # 工具需要的 JSON 字符串参数\n        \"scene_data\": dict,               \
          \ # 解析后的场景数据\n        \"error\": str | None\n    }\n    \"\"\"\n    default_output\
          \ = {\n        \"should_generate\": False,\n        \"tool_input_original_script\"\
          : \"[]\",\n        \"has_image_tasks\": False,\n        \"tool_input_images\"\
          : \"[]\",\n        \"has_video_tasks\": False,\n        \"tool_input_videos\"\
          : \"[]\",\n        \"scene_data\": {},\n        \"error\": None\n    }\n\
          \    \n    try:\n        # 1. 输入校验与空值处理\n        if not scene_data:\n  \
          \          # 输入为空时，记录错误但返回默认结构，避免流程 Crash\n            default_output[\"\
          error\"] = \"Input scene_data is empty or None\"\n            return default_output\n\
          \            \n        # 2. 提取 JSON\n        # 处理 Dify 可能传入 List[str] 的情况\
          \ (Iteration Output)\n        json_str = \"\"\n        if isinstance(scene_data,\
          \ list):\n            if len(scene_data) > 0:\n                json_str\
          \ = str(scene_data[0]) # 取第一个元素并转字符串\n            else:\n              \
          \  default_output[\"error\"] = \"Input scene_data is an empty list\"\n \
          \               return default_output\n        else:\n            json_str\
          \ = str(scene_data).strip()\n\n        # 尝试匹配 Markdown JSON 块\n        match\
          \ = re.search(r'```(?:json)?\\s*(.*?)\\s*```', json_str, re.DOTALL)\n  \
          \      if match:\n            json_str = match.group(1)\n        else:\n\
          \            # 尝试匹配最外层的 {...}\n            match_brace = re.search(r'\\\
          {.*\\}', json_str, re.DOTALL)\n            if match_brace:\n           \
          \     json_str = match_brace.group(0)\n                \n        # 3. 解析\
          \ Scene Data\n        try:\n            # 安全处理：如果 json_str 是列表形式（例如 LLM\
          \ 错误输出了 [list] 而不是 {dict}），\n            # 这里的 loads 会返回 list，导致后续 AttributeError\n\
          \            parsed_data = json.loads(json_str)\n            \n        \
          \    if isinstance(parsed_data, list):\n                # 兼容性修复：如果解析出的是列表，尝试取第一个元素（假设\
          \ LLM 包装在数组中）\n                if len(parsed_data) > 0 and isinstance(parsed_data[0],\
          \ dict):\n                    parsed_data = parsed_data[0]\n           \
          \     else:\n                    raise ValueError(f\"Parsed data is a list,\
          \ expected a dictionary. Content: {str(parsed_data)[:100]}\")\n        \
          \    \n            if not isinstance(parsed_data, dict):\n             \
          \    raise ValueError(f\"Parsed scene_data is not a dictionary. Type: {type(parsed_data)}\"\
          )\n                 \n            default_output[\"scene_data\"] = parsed_data\n\
          \        except json.JSONDecodeError as e:\n            default_output[\"\
          error\"] = f\"JSON Decode Error: {str(e)} | Raw input preview: {json_str[:100]}\"\
          \n            return default_output\n        except ValueError as e:\n \
          \           default_output[\"error\"] = str(e)\n            return default_output\n\
          \        \n        # 4. 检查是否需要 AI 生成图片或视频\n        image_tasks = []\n  \
          \      video_tasks = []\n        \n        # Helper function with safe access\n\
          \        def check_media(media_obj, context_id, media_type=\"image\"):\n\
          \            if not isinstance(media_obj, dict):\n                return\n\
          \            \n            source_type = media_obj.get(\"source_type\")\n\
          \            generated_url = media_obj.get(\"generated_url\")\n        \
          \    \n            # Logic for Image\n            if media_type == \"image\"\
          :\n                if source_type == \"ai-generated\" and not generated_url:\n\
          \                    prompt = media_obj.get(\"generation_prompt\", \"\"\
          )\n                    if not prompt: prompt = \"High quality image\"\n\
          \                    image_tasks.append({\n                        \"id\"\
          : context_id, \n                        \"prompt\": prompt,\n          \
          \              \"type\": \"image\"\n                    })\n           \
          \ \n            # Logic for Video\n            elif media_type == \"video\"\
          :\n                if source_type == \"ai-video-generated\" and not generated_url:\n\
          \                    prompt = media_obj.get(\"video_prompt\", \"\")\n  \
          \                  if not prompt: prompt = \"High quality video\"\n    \
          \                video_tasks.append({\n                        \"id\": context_id,\n\
          \                        \"prompt\": prompt,\n                        \"\
          type\": \"video\",\n                        \"duration\": media_obj.get(\"\
          duration\", 8)\n                    })\n        \n        # 4.1 检查场景级别的\
          \ image (如封面)\n        scene_id = default_output[\"scene_data\"].get('id',\
          \ 'scene')\n        if \"image\" in default_output[\"scene_data\"]:\n  \
          \           check_media(default_output[\"scene_data\"][\"image\"], f\"{scene_id}_main_image\"\
          , \"image\")\n             \n        # 4.2 检查组件中的 image 或 video\n      \
          \  components = default_output[\"scene_data\"].get(\"components\", [])\n\
          \        if isinstance(components, list):\n            for idx, comp in\
          \ enumerate(components):\n                if not isinstance(comp, dict):\
          \ continue\n                \n                comp_id = comp.get('id', str(idx))\n\
          \                content = comp.get(\"content\", {})\n                \n\
          \                if isinstance(content, dict):\n                    # Check\
          \ for Image\n                    if \"image\" in content:\n            \
          \            check_media(content[\"image\"], f\"{scene_id}_comp_{comp_id}\"\
          , \"image\")\n                    # Check for Video\n                  \
          \  if \"video\" in content:\n                        check_media(content[\"\
          video\"], f\"{scene_id}_comp_{comp_id}\", \"video\")\n        \n       \
          \ # 5. 构建输出\n        if image_tasks:\n            default_output[\"has_image_tasks\"\
          ] = True\n            default_output[\"tool_input_images\"] = json.dumps(image_tasks,\
          \ ensure_ascii=False)\n            \n        if video_tasks:\n         \
          \   default_output[\"has_video_tasks\"] = True\n            default_output[\"\
          tool_input_videos\"] = json.dumps(video_tasks, ensure_ascii=False)\n\n \
          \       all_tasks = image_tasks + video_tasks\n        if all_tasks:\n \
          \           default_output[\"should_generate\"] = True\n            default_output[\"\
          tool_input_original_script\"] = json.dumps(all_tasks, ensure_ascii=False)\n\
