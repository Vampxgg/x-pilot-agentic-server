          theme\") or visual_direction.get(\"theme\")\n        color_palette_raw =\
          \ actual_config.get(\"color_palette\") or visual_direction.get(\"color_palette\"\
          , {\n            \"primary_color\": \"#000000\",\n            \"background_base\"\
          : \"#FFFFFF\"\n        })\n\n        final_config = {\n            \"video_modes\"\
