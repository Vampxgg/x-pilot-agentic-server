      \ comment: \"情况A: 用户提供了现成图片的URL（来自Web或上传）\",\n            source_type: \"external-url\"\
      ,\n            url: \"string (https://...)\",\n            alt_text: \"string\
      \ (图片描述)\",\n          },\n          {\n            comment: \"情况B: 需要AI现场生成的图片（抽象概念/无素材时）\"\
      ,\n            source_type: \"ai-generated\",\n            generation_prompt:\
      \ \"string (用于SD/Midjourney的详细绘图Prompt)\",\n            style_preset: \"string\
      \ (photorealistic | vector-art | 3d-render)\",\n            generated_url: \"\
      null (初始为null，等待注入)\",\n          },\n        ],\n  },\n  },\n  toolbox: [\n\
      \    {\n      category: \"essential-info\",\n      displayName: \"基础信息与陈述 (Essential\
