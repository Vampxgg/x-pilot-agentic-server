      \        displayName: \"Graph/Network Viz\",\n        concept:\n          \"\
      Use to show relationships between nodes (knowledge graphs, social networks,\
      \ topologies).\",\n      },\n      {\n        type: \"layer-diagram\",\n   \
      \     displayName: \"Layer Diagram\",\n        concept:\n          \"Use to\
      \ explain stacked architectures (e.g., OSI model, software layers, geological\
      \ strata).\",\n      },\n      {\n        type: \"pyramid-diagram\",\n     \
      \   displayName: \"Pyramid Diagram\",\n        concept:\n          \"Use to\
      \ show hierarchical structures (e.g., Maslow's hierarchy, food pyramid).\",\n\
      \      },\n    ],\n  },\n  {\n    category: \"logic-structure\",\n    description:\n\
      \      \"Tools for explaining how things work, structure, logic, and algorithms.\"\
      ,\n    tools: [\n      {\n        type: \"schematic-draw\",\n        displayName:\
      \ \"Schematic Blueprint (Enhanced)\",\n        concept:\n          \"Use to\
      \ draw technical blueprints or sketches of internal structures. The go-to tool\
      \ for 'How it works' or engineering breakdowns.\",\n      },\n      {\n    \
      \    type: \"model-3d\",\n        displayName: \"3D Model\",\n        concept:\n\
      \          \"Use to showcase a 3D object, potentially with rotation or exploded\
      \ views. Best for product demos or biological structures.\",\n      },\n   \
      \   {\n        type: \"mindmap-growth\",\n        displayName: \"Mindmap Growth\"\
      ,\n        concept:\n          \"Use to visually branch out ideas from a central\
      \ root. Good for brainstorming, taxonomy, or evolution of concepts.\",\n   \
      \   },\n      {\n        type: \"algo-visualizer\",\n        displayName: \"\
      Algorithm Visualizer\",\n        concept:\n          \"Use to step through algorithmic\
      \ logic (sorting, searching). Specific to CS education.\",\n      },\n     \
      \ {\n        type: \"math-function-visualizer\",\n        displayName: \"Math\
