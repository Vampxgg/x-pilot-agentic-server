    value: "[\n  {\n    category: \"essential-info\",\n    description:\n      \"\
      Standard tools for presenting text, lists, and basic information clearly.\"\
      ,\n    tools: [\n      {\n        type: \"info-card\",\n        displayName:\
      \ \"Info Card\",\n        concept:\n          \"Use to highlight a single core\
      \ concept or title with a brief description and optional icon. Best for introductions\
      \ or key takeaways.\",\n      },\n      {\n        type: \"key-value-list\"\
      ,\n        displayName: \"Key-Value List\",\n        concept:\n          \"\
      Use to display paired attributes, specs, or profiles (e.g., 'Speed: 100km/h').\
      \ Ideal for technical specifications.\",\n      },\n      {\n        type: \"\
      bullet-points\",\n        displayName: \"Bullet Points\",\n        concept:\n\
      \          \"Use to list steps, features, or multiple items sequentially. Best\
      \ for summaries or agendas.\",\n      },\n      {\n        type: \"quote-block\"\
      ,\n        displayName: \"Quote Block\",\n        concept:\n          \"Use\
      \ to present authoritative definitions, testimonials, or famous quotes.\",\n\
      \      },\n      {\n        type: \"code-block\",\n        displayName: \"Code\
      \ Block\",\n        concept:\n          \"Use to show static code snippets or\
      \ syntax. Essential for technical/programming topics.\",\n      },\n      {\n\
      \        type: \"formula-block\",\n        displayName: \"Formula Block\",\n\
      \        concept:\n          \"Use to render mathematical or chemical formulas\
      \ (LaTeX). Best for academic or scientific explanations.\",\n      },\n    \
      \  {\n        type: \"dialogue-block\",\n        displayName: \"Dialogue Block\"\
      ,\n        concept:\n          \"Use to show a conversation between characters.\
      \ Good for storytelling or scenarios.\",\n      },\n      {\n        type: \"\
      kinetic-typography\",\n        displayName: \"Kinetic Typography (Advanced)\"\
      ,\n        concept:\n          \"Use for high-impact, animated text effects\
      \ (glitch, liquid, reveal). Best for headers, emphatic statements, or energetic\
      \ transitions.\",\n      },\n      {\n        type: \"solution-steps\",\n  \
      \      displayName: \"Solution Steps\",\n        concept:\n          \"Use to\
      \ walk through a problem-solving process or derivation step-by-step.\",\n  \
      \    },\n      {\n        type: \"single-image\",\n        displayName: \"Single\
      \ Image\",\n        concept:\n          \"Use to display one static image with\
      \ a caption. Standard for photo slides.\",\n      },\n      {\n        type:\
      \ \"image-grid\",\n        displayName: \"Image Grid\",\n        concept:\n\
      \          \"Use to display multiple images simultaneously in a grid layout.\
      \ Good for galleries or collections.\",\n      },\n      {\n        type: \"\
      annotated-image\",\n        displayName: \"Annotated Image\",\n        concept:\n\
      \          \"Use to overlay text labels on specific parts of an image. Ideal\
      \ for pointing out features on a product photo.\",\n      },\n      {\n    \
      \    type: \"before-after-comparison\",\n        displayName: \"Before/After\
      \ Comparison\",\n        concept:\n          \"Use to compare two states side-by-side\
      \ (e.g., old vs new, problem vs solution).\",\n      },\n    ],\n  },\n  {\n\
      \    category: \"data-insights\",\n    description:\n      \"Tools for visualizing\
      \ data, numbers, charts, and relationships.\",\n    tools: [\n      {\n    \
      \    type: \"data-table\",\n        displayName: \"Data Table\",\n        concept:\n\
      \          \"Use for structured row/column data presentation. Best when exact\
      \ values matter.\",\n      },\n      {\n        type: \"chart\",\n        displayName:\
      \ \"Chart\",\n        concept:\n          \"Use for statistical visualization\
      \ (bar, line, pie, etc.). Best for showing trends, comparisons, or distributions.\"\
      ,\n      },\n      {\n        type: \"infographic-number\",\n        displayName:\
      \ \"Infographic Number\",\n        concept:\n          \"Use to dramatically\
      \ highlight a single key statistic (Big Number). Best for 'Wow' moments.\",\n\
      \      },\n      {\n        type: \"coordinate-system\",\n        displayName:\
      \ \"Coordinate System\",\n        concept:\n          \"Use to plot mathematical\
      \ functions or vectors on graph paper. Good for math/physics teaching.\",\n\
      \      },\n      {\n        type: \"vector-field-sim\",\n        displayName:\
      \ \"Vector Field Sim (Advanced)\",\n        concept:\n          \"Use to visualize\
