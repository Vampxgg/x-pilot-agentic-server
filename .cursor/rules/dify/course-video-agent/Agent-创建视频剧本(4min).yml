          \            # 场景的 duration 字段保留作为参考 (时长本身不随位置改变)\n            scene[\"\
          absolute_start_time\"] = round(current_absolute_time, 2)\n            \n\
          \            # 3.5 封面图兜底逻辑 (保留原有逻辑)\n            if scene.get(\"type\")\
          \ == \"cover\":\n                 has_image = False\n                 if\
          \ scene.get(\"image\"): has_image = True # 标准结构是 image 对象\n            \
          \     if not has_image and \"background\" in scene and scene[\"background\"\
          ].get(\"type\") == \"image\":\n                     has_image = True\n \
          \                if not has_image and \"components\" in scene:\n       \
          \              for comp in scene[\"components\"]:\n                    \
          \     content = comp.get(\"content\", {})\n                         if \"\
