    - data:
        code: "import json\nimport re\n\ndef main(llm_output: str):\n    \"\"\"\n\
          \    Parse the output from Script Planner (LLM) to extract config and scenes_outline.\n\
          \    Supports robust parsing of JSON blocks embedded in Markdown.\n    \n\
          \    Output Structure:\n    {\n        \"config\": dict,\n        \"config_str\"\
          : str, # New field: JSON string of config for LLM input\n        \"title\"\
          : str,\n        \"scenes_outline\": list,\n        \"error\": str | None,\n\
          \        \"raw_output\": str # New field required for LLM string input compatibility\n\
          \    }\n    \"\"\"\n    # 1. 定义默认输出结构（必须确保所有 Key 存在且类型正确）\n    default_output\
          \ = {\n        \"config\": {},\n        \"config_str\": \"{}\",\n      \
          \  \"title\": \"Untitled\",\n        \"scenes_outline\": [],  # 必须是 List，供\
          \ Iteration 遍历\n        \"error\": None,\n        \"raw_output\": \"\" \n\
          \    }\n\n    try:\n        if not llm_output:\n            raise ValueError(\"\
          Input llm_output is empty\")\n\n        # 2. 尝试提取 JSON Block\n        json_str\
          \ = llm_output\n        # 匹配 ```json ... ``` 或 ``` ... ``` 或直接的 {...}\n\
          \        match = re.search(r'```(?:json)?\\s*(.*?)\\s*```', llm_output,\
          \ re.DOTALL)\n        if match:\n            json_str = match.group(1)\n\
          \        else:\n            # 尝试查找最外层的大括号\n            match_brace = re.search(r'\\\
          {.*\\}', llm_output, re.DOTALL)\n            if match_brace:\n         \
          \       json_str = match_brace.group(0)\n        \n        # 3. 解析 JSON\n\
          \        try:\n            data = json.loads(json_str)\n        except json.JSONDecodeError\
          \ as e:\n            # 尝试修复常见的 JSON 错误（如未转义的换行符）\n            # 这里仅做简单处理，复杂修复可能需要更高级库\n\
          \            raise e\n        \n        # 4. 类型安全检查与回填\n        config_obj\
          \ = data.get(\"config\", {})\n        if not config_obj:\n            config_obj\
          \ = {\n                \"global_strategy\": data.get(\"global_strategy\"\
          , {}),\n                \"visual_direction\": data.get(\"visual_direction\"\
          , {})\n            }\n        \n        result = {\n            \"config\"\
          : config_obj,\n            \"config_str\": json.dumps(config_obj, ensure_ascii=False),\n\
          \            \"title\": str(data.get(\"title\", \"Untitled\")),\n      \
          \      \"scenes_outline\": data.get(\"scenes_outline\", []) if isinstance(data.get(\"\
          scenes_outline\"), list) else [],\n            \"error\": None,\n      \
          \      \"raw_output\": json_str\n        }\n        \n        return result\n\
          \n    except Exception as e:\n        # 5. 错误处理：返回默认结构 + 错误信息\n        #\
          \ 记录详细的异常堆栈或类型\n        import traceback\n        error_msg = f\"Parser\
          \ Critical Error: {str(e)}\"\n        \n        error_output = default_output.copy()\n\
          \        error_output[\"error\"] = error_msg\n        # 在错误情况下，raw_output\
          \ 返回原始输入，以便调试或后备处理\n        error_output[\"raw_output\"] = llm_output if\
          \ llm_output else \"\"\n        return error_output\n"
