    - data:
        code: "# -*- coding: utf-8 -*-\n\"\"\"\n节点ID: 1770193020244\n节点标题: SceneFinalizer\n\
          节点描述: \n节点类型: code\n\"\"\"\n\nimport json\n\ndef main(scene_data: dict,\
          \ tool_output: str = None, tool_output_images: str = None, tool_output_videos:\
          \ str = None):\n    \"\"\"\n    场景终结器：合并 SceneBuilder 的原始数据和工具生成的图片/视频 URL。\n\
          \    \n    Inputs:\n    - scene_data: 原始场景数据\n    - tool_output: (Legacy)\
          \ 混合或单一工具输出\n    - tool_output_images: 图片工具输出\n    - tool_output_videos:\
          \ 视频工具输出\n    \n    Outputs:\n    {\n        \"scene_result\": dict,\n \
          \       \"error\": str | None\n    }\n    \"\"\"\n    result = {\n     \
          \   \"scene_result\": scene_data or {},\n        \"error\": None\n    }\n\
          \    \n    try:\n        # 输入防御\n        if not isinstance(scene_data, dict):\n\
          \            result[\"error\"] = f\"Invalid scene_data type: {type(scene_data)}.\
          \ Expected dict.\"\n            return result\n            \n        # 1.\
          \ 收集所有工具输出\n        all_generated_items = []\n        \n        def parse_tool_output(output_str):\n\
          \            if not output_str: return []\n            try:\n          \
          \      clean = output_str.strip()\n                import re\n         \
          \       match = re.search(r'```(?:json)?\\s*(.*?)\\s*```', clean, re.DOTALL)\n\
          \                if match: clean = match.group(1)\n                \n  \
          \              parsed = json.loads(clean)\n                if isinstance(parsed,\
          \ list): return parsed\n                if isinstance(parsed, dict):\n \
          \                   # Special handling for Veo tool structure\n        \
          \            # Structure: {\"result\": {\"data\": {\"videos\": [{\"public_url\"\
          : \"...\"}]}}}\n                    if \"result\" in parsed and isinstance(parsed[\"\
          result\"], dict):\n                        res = parsed[\"result\"]\n  \
          \                      if \"data\" in res and isinstance(res[\"data\"],\
          \ dict):\n                            data = res[\"data\"]\n           \
          \                 if \"videos\" in data and isinstance(data[\"videos\"],\
          \ list):\n                                # Veo videos list does not have\
          \ ID, we need to map it back or use single item assumption\n           \
          \                     # If the tool input was a list of tasks, the output\
          \ should ideally map back.\n                                # However, if\
          \ Veo tool returns one video per call, we might need to rely on order or\
          \ context.\n                                # Assuming the downstream tool\
          \ returns the original ID if possible, BUT here the example doesn't show\
          \ ID.\n                                # CRITICAL: If Veo tool output doesn't\
          \ carry the ID, we have a matching problem if there are multiple videos.\n\
          \                                # For now, we extract the videos.\n   \
          \                             return data[\"videos\"]\n                \
          \    \n                    # Try to extract list from dict wrapper (Generic)\n\
          \                    for key in [\"updated_array\", \"result\", \"data\"\
          , \"images\", \"output\", \"files\"]:\n                        if key in\
          \ parsed and isinstance(parsed[key], list):\n                          \
          \  return parsed[key]\n                    # Treat dict as single item if\
          \ it has id/url\n                    if (\"id\" in parsed or \"key\" in\
          \ parsed) and (\"url\" in parsed or \"generated_url\" in parsed):\n    \
          \                    return [parsed]\n                return []\n      \
          \      except:\n                return []\n\n        # 解析各路输入\n        all_generated_items.extend(parse_tool_output(tool_output))\n\
          \        all_generated_items.extend(parse_tool_output(tool_output_images))\n\
          \        all_generated_items.extend(parse_tool_output(tool_output_videos))\n\
          \        \n        if not all_generated_items:\n            # 如果没有生成结果，直接返回原数据\
          \ (可能是没有任务，也可能是生成失败)\n            return result\n\n        # 2. 构建 URL 映射表\n\
          \        # 兼容字段名: id/scene_id/key, generated_url/image_url/url/video_url\n\
          \        url_map = {}\n        for item in all_generated_items:\n      \
          \      if not isinstance(item, dict): continue\n            \n         \
          \   # ID 提取\n            item_id = item.get(\"id\") or item.get(\"scene_id\"\
          ) or item.get(\"key\")\n            \n            # URL 提取 - 优先 generated_url,\
          \ 其次 url, 再次 image_url, 再次 video_url, 再次 public_url (Veo)\n            item_url\
          \ = item.get(\"generated_url\") or item.get(\"url\") or item.get(\"image_url\"\
          ) or item.get(\"video_url\") or item.get(\"public_url\")\n            \n\
          \            # 如果是 Dify File Object (type: image/video), 提取 url\n      \
          \      if not item_url and (item.get(\"type\") == \"image\" or item.get(\"\
          type\") == \"video\") and \"url\" in item:\n                 item_url =\
          \ item[\"url\"]\n\n            # Veo Tool Specific: If ID is missing but\
          \ we have a URL, and we know we are looking for a video...\n           \
          \ # This is risky. Ideally, the tool should return the ID.\n           \
          \ # If item_id is missing, we might need to infer it if there's only one\
          \ video task in the scene.\n            if not item_id and \"public_url\"\
          \ in item:\n                 # Fallback: If we can't find an ID, we can't\
          \ map it safely.\n                 # BUT, if the scene only has ONE video\
          \ request, we could try to map it to the first video component.\n      \
          \           # Let's try to pass it with a special key or just skip for now\
          \ to avoid wrong mapping.\n                 pass\n\n            if item_id\
          \ and item_url:\n                url_map[str(item_id)] = item_url # 统一 ID\
          \ 为字符串\n        \n        # 3. 回填数据 (In-place modification of scene_data)\n\
          \        \n        # 特殊处理：如果 url_map 为空但有 Veo 视频且没有 ID，尝试“单视频匹配策略”\n   \
          \     # 场景：Veo 工具返回了视频 URL 但丢了 ID，且当前场景只有一个视频生成任务。\n        unmapped_videos\
          \ = [item.get(\"public_url\") for item in all_generated_items if item.get(\"\
          public_url\") and not (item.get(\"id\") or item.get(\"scene_id\") or item.get(\"\
          key\"))]\n        \n        # 3.1 场景主图\n        scene_id = str(scene_data.get(\"\
          id\", \"scene\"))\n        main_img_id = f\"{scene_id}_main_image\"\n  \
          \      \n        if main_img_id in url_map and \"image\" in scene_data and\
          \ isinstance(scene_data[\"image\"], dict):\n            scene_data[\"image\"\
          ][\"generated_url\"] = url_map[main_img_id]\n            scene_data[\"image\"\
          ][\"url\"] = url_map[main_img_id] # 冗余回填\n            scene_data[\"image\"\
          ][\"source_type\"] = \"ai-generated\" # 确认类型\n            \n        # 3.2\
          \ 组件图片/视频\n        components = scene_data.get(\"components\", [])\n   \
          \     if isinstance(components, list):\n            video_comp_count = 0\n\
          \            video_comps = []\n            for comp in components:\n   \
          \              if isinstance(comp, dict) and \"content\" in comp and \"\
          video\" in comp[\"content\"] and comp[\"content\"][\"video\"].get(\"source_type\"\
          ) == \"ai-video-generated\":\n                     video_comp_count += 1\n\
          \                     video_comps.append(comp)\n\n            for idx, comp\
          \ in enumerate(components):\n                if not isinstance(comp, dict):\
          \ continue\n\n                raw_comp_id = str(comp.get('id', idx))\n \
          \               \n                # 尝试多种组合键查找 (优先级：标准完整ID > 简化ID > 原始ID)\n\
          \                possible_keys = [\n                    f\"{scene_id}_comp_{raw_comp_id}\"\
          ,\n                    f\"{scene_id}_{raw_comp_id}\",\n                \
          \    raw_comp_id\n                ]\n                \n                found_url\
          \ = None\n                for key in possible_keys:\n                  \
          \  if key in url_map:\n                        found_url = url_map[key]\n\
          \                        break\n                \n                # 如果没有通过\
          \ ID 找到，且有未映射的视频，且当前组件是视频组件\n                if not found_url and unmapped_videos\
          \ and video_comp_count == 1:\n                     content = comp.get(\"\
          content\", {})\n                     if isinstance(content, dict) and \"\
          video\" in content and content[\"video\"].get(\"source_type\") == \"ai-video-generated\"\
          :\n                          # 盲猜匹配：只有一个视频任务，且有一个未映射的视频结果 -> 匹配之\n     \
          \                     found_url = unmapped_videos[0]\n                 \
          \         # 移除已使用的（虽然这里只处理一个）\n                          # unmapped_videos.pop(0)\
          \ \n\n                if found_url:\n                    content = comp.get(\"\
          content\", {})\n                    if isinstance(content, dict):\n    \
          \                    # Handle Image\n                        if \"image\"\
          \ in content and isinstance(content[\"image\"], dict):\n               \
          \             content[\"image\"][\"generated_url\"] = found_url\n      \
          \                      content[\"image\"][\"url\"] = found_url\n       \
          \                     content[\"image\"][\"source_type\"] = \"ai-generated\"\
          \n                        # Handle Video\n                        if \"\
          video\" in content and isinstance(content[\"video\"], dict):\n         \
          \                   content[\"video\"][\"generated_url\"] = found_url\n\
          \                            content[\"video\"][\"url\"] = found_url\n \
          \                           content[\"video\"][\"source_type\"] = \"ai-video-generated\"\
          \n        \n        result[\"scene_result\"] = scene_data\n        return\
          \ result\n\n    except Exception as e:\n        result[\"error\"] = f\"\
          Finalizer Critical Error: {str(e)}\"\n        return result"
        code_language: python3
        isInIteration: true
        isInLoop: false
        iteration_id: '1770192476795'
        outputs:
          error:
            children: null
            type: string
          scene_result:
            children: null
            type: object
        selected: false
        title: SceneFinalizer
        type: code
