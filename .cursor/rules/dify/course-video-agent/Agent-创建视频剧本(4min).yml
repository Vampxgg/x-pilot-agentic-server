      simulation-action\",\n    description:\n      \"Tools for simulating real-world\
      \ physics, actions, or software interfaces.\",\n    tools: [\n      {\n    \
      \    type: \"physics-lab-3d\",\n        displayName: \"3D Physics Lab\",\n \
      \       concept:\n          \"Use to simulate physical interactions like gravity,\
      \ collisions, or pendulums. Best for physics experiments.\",\n      },\n   \
      \   {\n        type: \"terminal-simulator\",\n        displayName: \"Terminal\
      \ Simulator\",\n        concept:\n          \"Use to simulate a hacker/developer\
      \ command line interface. Best for coding, cybersecurity, or 'tech' vibes.\"\
      ,\n      },\n      {\n        type: \"ui-action-sequence\",\n        displayName:\
      \ \"UI Action Sequence\",\n        concept:\n          \"Use to simulate user\
      \ interactions (clicks, typing) on a software GUI. Best for tutorials or software\
      \ demos.\",\n      },\n    ],\n  },\n  {\n    category: \"visual-metaphor\"\
      ,\n    description:\n      \"Abstract and generative tools for high-level concepts\
      \ and artistic visualization.\",\n    tools: [\n      {\n        type: \"procedural-canvas\"\
      ,\n        displayName: \"Procedural Canvas (AI Playground)\",\n        concept:\n\
      \          \"THE ULTIMATE TOOL. Use for ANY abstract, dynamic, or particle-based\
      \ visual that doesn't fit elsewhere. Examples: flowing data, biological processes,\
      \ magical effects, dynamic backgrounds. If you can imagine it as code, this\
      \ tool can do it.\",\n      },\n      {\n        type: \"svg-morphing-shape\"\
      ,\n        displayName: \"SVG Morphing Shape\",\n        concept:\n        \
      \  \"Use to smoothly transform one shape/concept into another. Perfect for showing\
      \ 'transformation', 'evolution', or 'change'.\",\n      },\n      {\n      \
      \  type: \"particle-system\",\n        displayName: \"Particle System\",\n \
      \       concept:\n          \"Use for swarms, flows, or accumulations of small\
      \ elements. Good for 'crowds', 'dust', 'energy', or 'data gathering'.\",\n \
      \     },\n      {\n        type: \"data-stream-flow\",\n        displayName:\
      \ \"Data Stream Flow\",\n        concept:\n          \"Use to show high-speed\
      \ data transmission through pipes/cables. Best for 'internet', 'speed', 'connectivity'\
      \ themes.\",\n      },\n    ],\n  },\n]"
    value_type: string
  - description: 统一视觉工具箱字段
