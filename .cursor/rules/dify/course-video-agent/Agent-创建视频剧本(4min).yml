          , \"local-image\"]:\n                              has_image = True\n  \
          \                            break\n                 # 如果真的没图，这里可以插入一个占位逻辑，暂略\n\
          \            \n            processed_scenes.append(scene)\n            \n\
          \            # 3.6 推进时间指针\n            current_absolute_time += scene_duration\n\
          \n        final_script[\"scenes\"] = processed_scenes\n        final_script[\"\
