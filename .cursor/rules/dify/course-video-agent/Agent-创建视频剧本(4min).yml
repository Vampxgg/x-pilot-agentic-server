    value: "{\n  _comment:\n  \"这是权威的、统一的视觉组件工具箱定义。所有生成的剧本都必须使用此处的 'type' 作为组件的唯一标识符。\"\
      ,\n    _definitions: {\n    STANDARD_IMAGE_OBJECT: {\n      description: \"\
