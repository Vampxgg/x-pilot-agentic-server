    - data:
        code: "import re\nimport json\ndef main(arg1: str):\n    \"\"\"\n    针对输入的字符串（支持纯文本、Markdown\
          \ 或 JSON 字符串），\n    查找所有以 'http://' 开头的链接，并在其前面添加指定的 HTTPS 代理前缀。\n    \"\
          \"\"\n    if not arg1:\n        return {\"result\": arg1}\n    # 定义代理前缀\n\
          \    proxy_prefix = \"https://server.x-pilot.ai/proxy?url=\"\n    \n   \
          \ try:\n        # 使用正则表达式匹配 http:// 链接\n        # 匹配规则：匹配以 http:// 开头，直到遇到引号、空格、括号或结尾为止的字符\n\
          \        # 同时使用负向断言 (?<!...) 确保不会对已经添加过代理的链接重复添加\n        \n        # 匹配模式解析:\n\
          \        # (?<!url=) : 确保匹配到的 http 链接前面没有 'url='（防止重复添加代理）\n        # http://[^\\\
          s\"\\'\\)\\>]+ : 匹配 http:// 之后的一串非空、非引号字符\n        url_pattern = r'(?<!url=)http://[^\\\
          s\"\\'\\)\\>]+'\n        def replace_with_proxy(match):\n            original_url\
          \ = match.group(0)\n            return f\"{proxy_prefix}{original_url}\"\
          \n        # 对整个字符串执行替换\n        # 这样无论 URL 是在 JSON 的值里，还是在 Markdown 的文本中，都能被统一处理\n\
          \        modified_data = re.sub(url_pattern, replace_with_proxy, arg1)\n\
          \        return {\"result\": modified_data}\n    except Exception as e:\n\
          \        # 万一发生异常，返回原始字符串，保证系统不崩溃\n        print(f\"Error during proxy addition:\
          \ {e}\")\n        return {\"result\": arg1}\n"
        code_language: python3
        outputs:
          result:
            children: null
            type: string
