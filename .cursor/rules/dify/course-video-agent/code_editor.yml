            4. ❌ 不要写 `interpolate(..., { easing: spring(...) })`（`easing` 必须是函数）\n\
            5. ❌ 不要使用 `Easing.expo`（Remotion 里是 `Easing.exp`；写错会报 `easing is not a\
            \ function`）\n6. ❌ 不要使用 `setInterval`/`setTimeout`（用帧驱动）\n\n\n7. ❌ 不要使用\
            \ CSS Modules 或外部 CSS 文件\n8. ❌ 不要使用纯黑色背景（除非明确需求）\n9. ❌ 不要直接使用 `<Canvas>`\
            \ from `@react-three/fiber`（必须改为 `<FullCanvas>` from `../components`）\n\
               - ❌ 禁止：`import { Canvas } from \"@react-three/fiber\"` 或直接使用 `<Canvas>`\n\
               - ✅ 必须：`import { FullCanvas } from \"../components\"` 然后使用 `<FullCanvas>`\n\
               - 原因：Remotion Studio 预览窗口使用 CSS `transform: scale()` 缩放，直接使用 Canvas\
            \ 会导致 Three.js 渲染器尺寸错误（使用缩放后的容器尺寸而非实际视频尺寸 1920x1080）。FullCanvas 内部使用 `useVideoConfig()`\
            \ 自动设置正确的 Canvas 尺寸，确保在预览和实际渲染中都能正常工作。\n9. ❌ 不要让 `<Subtitle>` 使用 `Math.round(...)`\
            \ / `fps * x` / `sub.*` 等运行时表达式\n\n\n\n---\n\n\n## \U0001F4DA 常用库参考（模板已内置\
            \ & 可直接调用）\n\n\n> **严禁**在输出的 `scene_*.tsx` 里出现任何安装命令：`npm install` / `pnpm\
            \ add` / `yarn add` / `npx`。\n> 生成的代码只能 `import` 本模板项目已内置的依赖（以模板 `package.json`\
            \ 为准）。\n\n\n### 官方文档\n- [Remotion 文档](https://www.remotion.dev/docs)\n\
            - [Remotion 第三方集成](https://www.remotion.dev/docs/third-party)\n\n\n\n\
            ### Remotion 官方扩展（已安装，教学视频强相关）\n- `@remotion/captions`: SRT/字幕轨处理（**用于生成字幕时间轴/样式**）\n\
            - `@remotion/preload`: 预加载图片/视频/音频（**避免首帧闪烁**）\n- `@remotion/fonts`: 自定义字体加载（可选）\n\
            - `@remotion/player`: 网页端播放器（**不要在 scene 里用**，用于外部预览）\n- `@remotion/webcodecs`:\
            \ WebCodecs 加速能力（渲染/编解码相关，通常无需在 scene 中直接调用）\n\n\n\n### 数据可视化\n- [Recharts\
            \ 文档](https://recharts.org) - 简单易用的 React 图表\n- [D3.js 文档](https://d3js.org)\
            \ - 强大的数据可视化\n- [@visx/visx 文档](https://airbnb.io/visx) - Airbnb 可视化库\n\
            \n\n### 3D 与动画\n- [React Three Fiber](https://docs.pmnd.rs/react-three-fiber)\n\
            - [@react-three/drei](https://drei.pmnd.rs) - Three.js 工具集\n- [Framer\
            \ Motion](https://www.framer.com/motion) - 流畅动画\n- [React Spring](https://react-spring.io)\
            \ - 物理动画\n- [GSAP](https://greensock.com/gsap) - 专业动画库\n\n\n### 模板项目已内置第三方库清单（Dify\
            \ 可用）\n\n\n#### Remotion 官方扩展（已内置）\n- `@remotion/captions`：字幕轨/字幕样式生成\n\
            - `@remotion/preload`：图片/视频预加载（避免首帧闪烁）\n- `@remotion/fonts`：字体加载（如需自定义字体，优先走模板内的稳定方案；不要在\
            \ scene 里直接 import `@remotion/google-fonts/*`）\n- `@remotion/transitions`、`@remotion/motion-blur`：转场/运动模糊\n\
            - `@remotion/shapes`、`@remotion/paths`、`@remotion/noise`：形状/路径动画/噪声背景\n\
            - `@remotion/gif`：GIF 渲染\n- `@remotion/layout-utils`：文本测量与排版（`fitText`/`measureText`）\n\
            - `@remotion/skia`：高性能 2D 绘制\n- `@remotion/three`：Three.js 与 Remotion\
            \ 的集成\n\n\n#### 数据可视化（已内置）\n- `recharts`\n- `d3`、`d3-cloud`、`d3-sankey`\n\
            - `@nivo/bar`、`@nivo/line`、`@nivo/heatmap`\n- `@visx/*`：通过 `@visx/visx`\
            \ 预置（推荐按子包引入：`@visx/shape`、`@visx/scale` 等）\n- `chart.js` + `react-chartjs-2`：Chart.js\
            \ 图表（需要先 `ChartJS.register(...)`）\n- `vis-network`：关系网络图/拓扑图\n\n\n####\
            \ 2D/白板绘制（已内置）\n- `react-konva`\n\n\n#### 动画库（已内置）\n- `framer-motion`\n\
            - `react-spring`\n- `gsap`\n- `animejs`\n\n\n#### 3D（已内置）\n- `three`、`@react-three/fiber`、`@react-three/drei`\n\
            - `@react-three/cannon` + `cannon-es`\n\n\n#### 文本/代码演示（已内置）\n- `typed.js`\n\
            - `prismjs`（不要在 scene 里 `import` 外部 CSS）\n\n\n> 如果视觉概念需要未内置库：**不要**在 scene\
            \ 代码里写安装命令；请用上面这些库组合替代实现。\n\n\n\n---\n\n\n## \U0001F3AF 教学视频最佳实践\n\n\n\
            ### 常见场景推荐库\n\n\n| 场景类型 | 推荐库 | 使用场景 |\n|---------|-------|---------|\n\
            | **数据趋势** | Recharts + D3 | 折线图、柱状图、饼图 |\n| **流程图** | react-konva + @remotion/shapes\
            \ | 流程图、思维导图 |\n| **代码演示** | Prism.js + Typed.js | 代码高亮 + 打字效果 |\n| **公式推导**\
            \ | @remotion/paths | 绘制箭头、标注 |\n| **3D 模型** | Three.js + @react-three/drei\
            \ | 几何体、物理模拟 |\n| **图表动画** | Recharts + interpolate | 数据增长动画 |\n| **文字说明**\
            \ | Framer Motion + Lucide | 标题动画 + 图标 |\n| **背景特效** | @remotion/noise\
            \ + GSAP | 粒子、渐变 |\n\n\n---\n\n\n**记住：直接编写标准 React 代码，完全自由！**\n\n\n\n\
