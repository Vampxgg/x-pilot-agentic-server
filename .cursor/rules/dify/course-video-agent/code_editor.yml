            \ } from \"react\";\nimport { AbsoluteFill, useCurrentFrame, interpolate\
            \ } from \"remotion\";\nimport * as d3 from 'd3';\n\n\nexport default\
            \ function Scene4() {\n  const frame = useCurrentFrame();\n  \n  // D3\
            \ 力导向布局（useMemo 避免重复计算）\n  const graph = useMemo(() => {\n    const nodes\
            \ = [\n      { id: 'A', value: 10 },\n      { id: 'B', value: 20 },\n\
                  { id: 'C', value: 15 }\n    ];\n    const links = [\n      { source:\
            \ 'A', target: 'B' },\n      { source: 'B', target: 'C' }\n    ];\n   \
            \ \n    const simulation = d3.forceSimulation(nodes as any)\n      .force('link',\
            \ d3.forceLink(links).id((d: any) => d.id).distance(150))\n      .force('charge',\
            \ d3.forceManyBody().strength(-300))\n      .force('center', d3.forceCenter(960,\
            \ 540))\n      .stop();\n    \n    // 运行 300 次迭代\n    for (let i = 0;\
            \ i < 300; i++) simulation.tick();\n    \n    return { nodes, links };\n\
              }, []);\n  \n  // 淡入动画\n  const opacity = interpolate(frame, [0, 30],\
            \ [0, 1], { extrapolateRight: 'clamp' });\n  \n  return (\n    <AbsoluteFill\
            \ style={{ background: '#0a0a0a' }}>\n      <svg width={1920} height={1080}>\n\
                    {/* 连线 */}\n        {graph.links.map((link: any, i) => (\n   \
            \       <line\n            key={i}\n            x1={link.source.x}\n \
            \           y1={link.source.y}\n            x2={link.target.x}\n     \
            \       y2={link.target.y}\n            stroke=\"rgba(0,200,150,0.3)\"\
            \n            strokeWidth={2}\n            opacity={opacity}\n       \
            \   />\n        ))}\n        \n        {/* 节点 */}\n        {graph.nodes.map((node:\
            \ any) => (\n          <g key={node.id} opacity={opacity}>\n         \
            \   <circle\n              cx={node.x}\n              cy={node.y}\n   \
            \           r={node.value * 2}\n              fill=\"#00C896\"\n     \
            \         stroke=\"white\"\n              strokeWidth={2}\n           \
            \ />\n            <text\n              x={node.x}\n              y={node.y\
            \ + 5}\n              textAnchor=\"middle\"\n              fill=\"white\"\
            \n              fontSize={16}\n            >\n              {node.id}\n\
                        </text>\n          </g>\n        ))}\n      </svg>\n    </AbsoluteFill>\n\
              );\n}\n```\n\n\n---\n\n\n## \U0001F3AF 代码生成规范\n\n\n### 1. 文件结构\n```tsx\n\
            import React from \"react\";\nimport { AbsoluteFill, useCurrentFrame,\
            \ interpolate } from \"remotion\";\nimport { SafeArea, Subtitle } from\
            \ \"../components\";\nimport { useTheme } from \"../contexts/ThemeContext\"\
            ;\n\n\n/**\n * Scene {scene_number}: {visual_concept}\n * Duration: {duration}s\n\
             */\nexport default function Scene{scene_number}() {\n  const frame =\
            \ useCurrentFrame();\n  const theme = useTheme();\n  \n  // 动画逻辑\n  \n\
              return (\n    <AbsoluteFill style={{ background: '...' }}>\n      {/*\
            \ 场景内容 */}\n      \n      {/* 字幕 */}\n      <Subtitle text=\"...\" startFrame={0}\
            \ durationInFrames={...} />\n    </AbsoluteFill>\n  );\n}\n```\n\n\n###\
            \ 2. 动画规范\n- 使用 `useCurrentFrame()` 获取当前帧\n- 使用 `interpolate()` 创建数值动画\n\
            - 使用 `spring()` 创建物理动画（弹簧效果）\n- **关键**：`interpolate(..., { easing })`\
            \ 的 `easing` **必须是函数** `((t: number) => number)`，输入/输出都在 `0..1` 范围\n\n\
            \n  - ✅ 正确：`easing: Easing.out(Easing.cubic)`（先 `import { Easing } from\
            \ \"remotion\"`）\n  - ❌ 错误：`easing: spring(...)`（`spring()` 返回的是数值，不是函数，会直接报\
            \ `easing is not a function`）\n  - ❌ 错误：`easing: Easing.out(Easing.expo)`（`Easing.expo`\
            \ **不存在**，会导致 `easing is not a function`；正确写法是 `Easing.exp`）\n\n\n- **Remotion\
            \ `Easing` 只能使用真实存在的成员**：不要\"猜名字\"。如果你不确定，宁可不写 `easing`（默认线性）或用 `Easing.linear`。\n\
            \n\n#### ✅ Easing API 白名单（只允许这些）\n- `Easing.linear`\n- `Easing.in(Easing.cubic)`\
            \ / `Easing.out(Easing.cubic)` / `Easing.inOut(Easing.cubic)`\n- `Easing.in(Easing.quad)`\
            \ / `Easing.out(Easing.quad)` / `Easing.inOut(Easing.quad)`\n- `Easing.in(Easing.exp)`\
            \ / `Easing.out(Easing.exp)` / `Easing.inOut(Easing.exp)`  // 注意是 `exp`\
            \ 不是 `expo`\n- `Easing.in(Easing.sin)` / `Easing.out(Easing.sin)` / `Easing.inOut(Easing.sin)`\
            \  // 注意是 `sin` 不是 `sine`\n- `Easing.bezier(0.2, 0.9, 0.2, 1)`（自定义曲线）\n\
            \n\n  - ✅ 推荐常用：\n    - `Easing.out(Easing.cubic)`\n    - `Easing.out(Easing.quad)`\n\
                - `Easing.out(Easing.exp)`  // 注意是 `exp` 不是 `expo`\n    - `Easing.inOut(Easing.cubic)`\n\
                - `Easing.bezier(0.2, 0.9, 0.2, 1)`（需要自定义曲线时）\n\n\n- 想要“弹簧 + 位移”的正确范式（**永远不要把\
            \ `spring()` 放进 `easing`**）：\n  - `const p = spring({ fps, frame: frame\
            \ - delay, config: { damping: 12 } }); // p ∈ [0,1]`\n  - `const y = interpolate(p,\
            \ [0, 1], [50, 0]);`\n\n\n- 用 `useMemo` 缓存复杂计算（如 D3 布局/粒子初始状态）\n\n\n####\
            \ ✅ 语法有效性（必须）\n> 生成的 `.tsx` **必须是可解析的 TSX**。一旦出现语法错误（例如变量名里有空格），Remotion\
            \ Studio/打包会直接启动失败或构建失败。\n\n\n- **变量/函数/类型名必须是合法 JS 标识符**：只能用字母/数字/`_`/`$`，且不能包含空格。\n\
