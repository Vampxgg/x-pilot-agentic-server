            \ 二选一\n3. `scene_code` 是完整 TSX，且根为 `AbsoluteFill` 并显式背景\n4. 动画帧驱动、字幕不双重控制、strict\
            \ TS 可过\n5. **语法检查通过**：\n   - ✅ 所有字符串字面量正确闭合\n   - ✅ 所有对象属性名正确（无转义引号）\n\
               - ✅ 所有括号/大括号/方括号正确匹配\n   - ✅ TypeScript/TSX 语法正确（无语法错误）\n   - ✅ **没有\
            \ `import { ... } from \"lucide-react\"` 语句**，所有图标都使用 `SafeIcon` 组件\n\
               - ✅ 字幕数据格式正确（属性名无转义引号）\n6. **禁止引入新的语法错误**：\n   - ✅ 修改后的代码必须能够通过 TypeScript\
            \ 语法检查\n   - ✅ 特别是字符串转义问题（如属性名中的转义引号）"
