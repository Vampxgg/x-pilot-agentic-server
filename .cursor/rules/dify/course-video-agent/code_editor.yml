            \ `text` 必须是字面量字符串，不能是变量引用\n   - ✅ 时间值必须是字面量数字（秒）\n   - ❌ 禁止直接写 `<Subtitle>`\
            \ 组件而不用数组\n\n\n11. ✅ 使用模板已内置第三方库（Recharts, D3, Three.js 等），禁止输出安装命令\n\
            12. ✅ 用 `useMemo` 缓存复杂计算\n13. ✅ 字幕时间使用场景相对秒数（从 0 开始），在 `.map()` 中用 `Math.round(s.start_time_seconds\
            \ * fps)` 转为帧\n14. ✅ 主内容为字幕预留底部空间（例如 `SafeArea paddingBottom={160}`），避免遮挡\n\
            15. ✅ **没有 `import { ... } from \"lucide-react\"` 语句**，所有图标都使用 `SafeIcon`\
            \ 组件\n\n\n\n---\n\n\n## ❌ 禁止事项\n\n\n1. ❌ 不要导入 `src/components` 下的自定义组件（只允许\
            \ `Subtitle` / `SafeArea` / `SafeIcon` / `FullCanvas`）\n2. ❌ **禁止直接导入\
            \ `lucide-react`**（任何图标都不允许）：`import { ... } from \"lucide-react\"` 是硬性错误\n\
               - 必须使用 `SafeIcon` 组件：`import { SafeIcon } from \"../components\";`\
            \ 然后 `<SafeIcon name=\"arrowRight\" size={32} />`\n   - 如果需要的图标不在白名单中，使用\
