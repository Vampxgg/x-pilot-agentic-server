    - data:
        code: "import json\nimport re\nfrom typing import List, Dict, Any, Set\n\n\
          def main(original_data: Any, update_ops: Any, assembly_result: Any) -> Dict[str,\
          \ Any]:\n    \"\"\"\n    智能更新数据结构（支持新增的删除逻辑）\n    1. 完整对象数组 (result_array)\n\
          \    2. JSON字符串 (result_string)\n    3. 纯代码内容字符串数组 (result_code_list)\n\
          \    \"\"\"\n    \n    # --- 1. 数据清洗与标准化 ---\n    def parse_input(data,\
          \ name):\n        if data is None:\n            return []\n        if isinstance(data,\
          \ list):\n            return data\n        if isinstance(data, str):\n \
          \           try:\n                # 尝试清洗 Markdown 标记\n                clean_str\
          \ = re.sub(r'^```(json)?|```$', '', data.strip(), flags=re.MULTILINE).strip()\n\
          \                return json.loads(clean_str)\n            except:\n   \
          \             print(f\"Error parsing {name}\")\n                return []\n\
          \        return []\n\n    data_list = parse_input(original_data, \"original_data\"\
          )\n    ops_list = parse_input(update_ops, \"update_ops\")     # 来自 LLM 的修改/插入结果\n\
          \    plan_list = parse_input(assembly_result, \"assembly_result\") # 来自上游的完整计划（含删除）\n\
          \n    # --- 1.1 预处理删除指令 (NEW) ---\n    # 从 assembly_result 中提取确定的删除索引\n\
          \    delete_indexes: Set[int] = set()\n    for item in plan_list:\n    \
          \    if item.get(\"action\") == \"delete\":\n            idx = item.get(\"\
          scene_index\")\n            # 确保这里的 idx 是有效的数字\n            if idx is not\
          \ None:\n                try:\n                    delete_indexes.add(int(idx))\n\
          \                except:\n                    pass\n\n    # --- 2. 构建插槽\
          \ (Slots) ---\n    slots = []\n    \n    # 注意：这里假设 original_data 的顺序和 index\
          \ 是对应的，或者 index 字段是可信的锚点\n    for i, item in enumerate(data_list):\n   \
          \     # 优先使用 item 里的 index，如果不存在则使用列表下标\n        orig_idx = item.get(\"\
          index\", i) \n        \n        # 判断是否被标记为删除\n        # 注意：需要处理 string/int\
          \ 类型的细微差异，这里统一转 int 比较\n        try:\n            is_deleted = int(orig_idx)\
          \ in delete_indexes\n        except:\n            is_deleted = False\n\n\
          \        slots.append({\n            \"before\": [],          \n       \
          \     \"content\": item.get(\"code_content\", \"\"), \n            \"orig_index\"\
          : orig_idx,\n            \"after\": [],           \n            \"is_updated\"\
          : False,\n            \"is_deleted\": is_deleted  # (NEW) 标记 slots 状态\n\
          \        })\n    \n    append_pool = [] \n\n    # --- 3. 处理指令 (Logic Keep)\
          \ ---\n    # 处理 LLM 返回的 modify 和 insert，原有逻辑保持不变\n    for op in ops_list:\n\
          \        scene_index = op.get(\"scene_index\", -1)\n        scene_code =\
          \ op.get(\"scene_code\", \"\")\n        insert_key = op.get(\"insert_key\"\
          , \"\")\n        \n        # A: 修改 (Modify)\n        if scene_index != -1:\n\
          \            # 安全检查：防止索引越界\n            if 0 <= scene_index < len(slots):\n\
          \                # 即使被标记为删除，如果 LLM 强行生成了修改，我们先更新 content\n             \
          \   # 但最终是否渲染取决于 finish 阶段的 is_deleted 检查\n                # 通常 delete 任务不会传给\
          \ LLM，所以这里主要是防御性更新\n                slots[scene_index][\"content\"] = scene_code\n\
          \                slots[scene_index][\"is_updated\"] = True\n           \
          \ else:\n                # 越界索引视为追加\n                append_pool.append(scene_code)\n\
          \        \n        # B: 插入 (Insert)\n        else:\n            match =\
          \ re.search(r'__insert_(before|after)__:(\\d+)', str(insert_key))\n    \
          \        if match:\n                direction = match.group(1)\n       \
          \         target_idx = int(match.group(2))\n                \n         \
          \       if 0 <= target_idx < len(slots):\n                    # 针对锚点的插入。\n\
          \                    # 即使锚点被删除(deleted)，我们通常依然允许在其位置的前后插入新内容\n         \
          \           # 这样可以实现“删除旧场景，原位替换新场景”的效果\n                    if direction\
          \ == 'before':\n                        slots[target_idx][\"before\"].append(scene_code)\n\
          \                    else:\n                        slots[target_idx][\"\
          after\"].append(scene_code)\n                else:\n                   \
          \ append_pool.append(scene_code)\n            else:\n                append_pool.append(scene_code)\n\
          \n    # --- 4. 组装与重排索引 (Re-indexing) ---\n    final_list = []\n    \n  \
          \  def add_node(content):\n        if content is None: return # 防御空值\n \
          \       final_list.append({\n            \"code_content\": content,\n  \
          \          # 索引重排：基于当前 final_list 的长度自动递增\n            \"index\": len(final_list)\
          \ \n        })\n\n    for slot in slots:\n        # 1. 添加 Before 插入的内容 (即使原节点删除了，前面的过场可能还得要)\n\
          \        for code in slot[\"before\"]: add_node(code)\n        \n      \
          \  # 2. 添加核心内容 (仅当未标记删除时)\n        if not slot[\"is_deleted\"]:\n      \
          \      add_node(slot[\"content\"])\n            \n        # 3. 添加 After\
          \ 插入的内容\n        for code in slot[\"after\"]: add_node(code)\n         \
          \   \n    # 4. 追加末尾池的内容\n    for code in append_pool:\n        add_node(code)\n\
          \n    # --- 5.构建纯字符串数组 ---\n    simple_code_list = [item[\"code_content\"\
          ] for item in final_list]\n\n    return {\n        \"result_array\": final_list,\n\
          \        \"result_string\": json.dumps(final_list, ensure_ascii=False, indent=2),\n\
          \        \"result_code_list\": simple_code_list\n    }\n"
