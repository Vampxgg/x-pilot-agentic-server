            \ `<SafeIcon name=\"play\" />`\n- 如果原代码使用了不在白名单的图标，必须用 SVG 或白名单中的相似图标替代\n\
            \n\n**示例：替代不在白名单的图标**\n```tsx\n// ❌ 错误：直接导入 lucide-react\nimport { TrendingUp,\
