    - data:
        code: "import json\nimport re\n\ndef main(current_code_structure: list | str,\
          \ adjustment_plan: dict | str) -> dict:\n    \"\"\"\n    Args:\n       \
          \ current_code_structure: 原始代码列表\n        adjustment_plan: 包含 delete_indexes\
          \ 和 requirements_by_index 的计划\n    \n    Returns:\n        assembly_result:\
          \ 包含删除指令的全量列表 (用于结构处理)\n        assembly_json: 全量 JSON 字符串\n        no_del_assembly_result:\
          \ 剔除删除指令的列表 (用于 LLM 代码生成)\n        no_del_assembly_json: 剔除删除指令 JSON 字符串\n\
          \    \"\"\"\n\n    # ==========================\n    # 1. 健壮性数据清洗 (ETL)\n\
          \    # ==========================\n    \n    def safe_parse(data):\n   \
          \     if isinstance(data, (dict, list)): return data\n        if data is\
          \ None: return {}\n        s = str(data).strip()\n        s = re.sub(r'^```json\\\
          s*|^```\\s*|```$', '', s, flags=re.MULTILINE).strip()\n        try: return\
          \ json.loads(s)\n        except: return {}\n\n    codes_in = safe_parse(current_code_structure)\n\
          \    if isinstance(codes_in, dict): codes_in = [codes_in]\n    if not isinstance(codes_in,\
          \ list): codes_in = []\n\n    plan_in = safe_parse(adjustment_plan)\n  \
          \  \n    # 提取需求字典\n    requirements_map = plan_in.get(\"requirements_by_index\"\
          , {})\n    # 备用：如果顶层就是 map\n    if not requirements_map and (\"0\" in plan_in\
          \ or any(\"__insert\" in k for k in plan_in.keys())):\n        requirements_map\
          \ = plan_in\n\n    # 提取明确的删除索引列表 (用于双重校验)\n    explicit_delete_ids = plan_in.get(\"\
          delete_indexes\", [])\n    # 确保里面的元素都是字符串，方便比对\n    explicit_delete_ids\
          \ = [str(x) for x in explicit_delete_ids]\n\n    # ==========================\n\
          \    # 2. 构建代码查找表\n    # ==========================\n    \n    scene_map\
          \ = {}\n    for item in codes_in:\n        idx = item.get(\"index\")\n \
          \       content = item.get(\"code_content\", \"\")\n        if idx is not\
          \ None:\n            scene_map[int(idx)] = content\n\n    # ==========================\n\
          \    # 3. 智能组装 (分类处理)\n    # ==========================\n    \n    full_list\
          \ = []      # 包含 Delete\n    llm_work_list = []  # 不含 Delete (Modify + Insert)\n\
          \n    for key, req_data in requirements_map.items():\n        key_str =\
          \ str(key).strip()\n        \n        # 获取动作类型\n        action = req_data.get(\"\
          action\", \"modify\").lower()\n        \n        # 兼容性防御：如果 ID 在 delete_indexes\
          \ 里，强制视为 delete\n        if key_str in explicit_delete_ids:\n          \
          \  action = \"delete\"\n\n        task_base = {\n            \"scene_index\"\
          : -1,\n            \"requirements\": req_data,\n            \"edit_request\"\
          : req_data.get(\"change_summary\", \"\") or req_data.get(\"new_scene_purpose\"\
          , \"\"),\n            \"video\": {}\n        }\n\n        # -----------------------------\n\
          \        # BRANCH A: DELETE (删除)\n        # -----------------------------\n\
          \        if action == \"delete\":\n            # 仅添加到全量列表，跳过 LLM 列表\n  \
          \          task_base.update({\n                \"action\": \"delete\",\n\
          \                \"scene_index\": int(key_str) if key_str.isdigit() else\
          \ -1,\n                # 删除不需要原始代码，只需要知道删谁\n                \"original_scene_code\"\
          : None \n            })\n            full_list.append(task_base)\n     \
          \       continue # <--- 关键：直接进行下一次循环，不加入 no_del 列表\n\n        # -----------------------------\n\
          \        # BRANCH B: MODIFY (修改)\n        # -----------------------------\n\
          \        if key_str.isdigit():\n            idx = int(key_str)\n       \
          \     original_code = scene_map.get(idx, \"\")\n            \n         \
          \   task_base.update({\n                \"action\": \"modify\",\n      \
          \          \"scene_index\": idx,\n                \"original_scene_code\"\
          : original_code\n            })\n            \n            full_list.append(task_base)\n\
          \            llm_work_list.append(task_base)\n\n        # -----------------------------\n\
          \        # BRANCH C: INSERT (插入)\n        # -----------------------------\n\
          \        elif \"__insert\" in key_str:\n            # 解析锚点\n           \
          \ anchor = -1\n            insert_type = \"unknown\"\n            try:\n\
          \                parts = key_str.split(\":\")\n                cmd = parts[0]\n\
          \                anchor = int(parts[1]) if len(parts) > 1 else -1\n    \
          \            if \"after\" in cmd: insert_type = \"after\"\n            \
          \    elif \"before\" in cmd: insert_type = \"before\"\n            except:\
          \ pass\n\n            # 获取上下文\n            before_code = None\n        \
          \    after_code = None\n            if insert_type == \"after\":\n     \
          \           before_code = scene_map.get(anchor)\n                after_code\
          \ = scene_map.get(anchor + 1)\n            elif insert_type == \"before\"\
          :\n                before_code = scene_map.get(anchor - 1)\n           \
          \     after_code = scene_map.get(anchor)\n\n            task_base.update({\n\
          \                \"action\": \"insert\",\n                \"insert_key\"\
          : key_str,\n                \"context\": {\n                    \"before_scene_code\"\
          : before_code,\n                    \"after_scene_code\": after_code\n \
          \               }\n            })\n            \n            full_list.append(task_base)\n\
          \            llm_work_list.append(task_base)\n\n    # ==========================\n\
          \    # 4. 输出封装\n    # ==========================\n\n    return {\n     \
          \   # 原始字段：包含所有操作（含删除），用于结构维护\n        \"assembly_result\": full_list,\n\
          \        \"assembly_json\": json.dumps(full_list, ensure_ascii=False),\n\
          \        \n        # 新增字段：仅包含需要 LLM 处理的操作（不含删除）\n        \"no_del_assembly_result\"\
          : llm_work_list,\n        \"no_del_assembly_json\": json.dumps(llm_work_list,\
          \ ensure_ascii=False)\n    }\n"
        code_language: python3
