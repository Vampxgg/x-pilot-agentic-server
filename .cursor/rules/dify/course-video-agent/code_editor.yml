          \        \"player_url\": None,\n        \"project_id\": str(project_id)\
          \ if project_id else None,\n        \"error\": None,\n        \"next_step\"\
          : None,\n        \"mode\": \"unknown\",         # full_bundle / scenes_only\
          \ / code_array_only\n        \"bundle_status\": \"init\"    # processing\
          \ / active / failed\n    }\n\n    # 2. 参数处理逻辑\n    # 强制固定使用该域名进行前端展示，而不是使用\
          \ server_base_url\n    PUBLIC_PLAY_BASE = \"https://e2b.x-pilot.ai\"\n \
          \   \n    # 优先解析 project_id\n    target_pid = str(project_id).strip() if\
          \ project_id else None\n    if not target_pid and player_url:\n        target_pid\
          \ = _extract_pid_from_url(player_url)\n    \n    if not target_pid:\n  \
          \      output[\"error\"] = \"Missing project_id\"\n        output[\"next_step\"\
          ] = \"Provide project_id or valid player_url\"\n        output[\"bundle_status\"\
          ] = \"failed\"\n        return output\n    \n    output[\"project_id\"]\
          \ = target_pid\n\n    # 3. 数据清洗与模式选择\n    valid_json = _normalize_json_string(json_string)\n\
          \    valid_codes = _normalize_code_array(code_array)\n    \n    if not valid_codes:\n\
          \        output[\"error\"] = \"Empty code_array\"\n        output[\"next_step\"\
          ] = \"AI generation failed to produce code.\"\n        output[\"bundle_status\"\
          ] = \"failed\"\n        return output\n\n    # 【调整】统一Payload结构以支持稳定更新\n\
          \    # 无论是首次创建还是二次编辑，都统一使用 `dify` 结构。\n    # 当 json_string 不存在时（二次编辑），payload\
          \ 应为 {\"dify\": {\"code_array\": [...]}}\n    # 而不是 {\"scenes\": [...]}，这样后端才能利用基线清单(manifest)进行稳定匹配，解决场景错乱问题。\n\
          \    payload = {}\n    if valid_json:\n        output[\"mode\"] = \"full_bundle\"\
          \n        payload = { \"dify\": { \"json_string\": valid_json, \"code_array\"\
          : valid_codes } }\n    else:\n        output[\"mode\"] = \"code_array_only\"\
          \ # 原 \"scenes_only\"\n        payload = { \"dify\": { \"code_array\": valid_codes\
          \ } }\n\n    # 处理 voiceover 参数并注入 payload\n    if voiceover:\n        voice_data\
          \ = {}\n        # 兼容 JSON 字符串或字典\n        if isinstance(voiceover, str)\
          \ and voiceover.strip():\n            try:\n                voice_data =\
          \ json.loads(voiceover)\n            except:\n                voice_data\
          \ = {}\n        elif isinstance(voiceover, dict):\n            voice_data\
          \ = voiceover\n\n        # 映射字段：Dify config -> API fields\n        if voice_data:\n\
          \            ref_id = voice_data.get(\"config.model_id\") or voice_data.get(\"\
          referenceId\")\n            if ref_id:\n                # 【调整】此处从 payload['voiceover']\
          \ 改为 payload['dify']['voiceover'] 可能会更符合结构。\n                # 但根据后端代码，voiceover\
          \ 是在顶层的，所以此处的逻辑维持不变是正确的。\n                payload[\"voiceover\"] = {\n \
          \                   \"referenceId\": str(ref_id),\n                    \"\
          language\": voice_data.get(\"config.language\") or voice_data.get(\"language\"\
          ) or \"zh\",\n                    \"sampleRate\": int(voice_data.get(\"\
          sampleRate\", 44100)),\n                    \"emotion\": str(voice_data.get(\"\
          emotion\", \"neutral\"))\n                }\n\n    # 4. 执行更新 (API Request)\n\
          \    # 注意：API请求地址依然使用 server_base_url (对应内部服务 IP)\n    base = (server_base_url\
          \ or \"\").rstrip(\"/\")\n    api_url = f\"{base}/api/projects/{target_pid}\"\
          \n    \n    # 虽然展示链接不需要 sig，但写入接口(PATCH)通常需要 sig 进行鉴权\n    # 如果输入提供了 sig，为了保险依然透传给后端\
          \ API，但不在最终 URL 中显示\n    if sig and str(sig).strip():\n        # 如果 sig\
          \ 里包含特殊字符，进行 quote\n        api_url += f\"?sig={quote(str(sig).strip())}\"\
          \n    \n    headers = { \"Content-Type\": \"application/json\" }\n    if\
          \ api_token:\n        t = str(api_token).strip()\n        headers[\"Authorization\"\
          ] = t if t.lower().startswith(\"bearer\") else f\"Bearer {t}\"\n\n    retries\
          \ = max(1, int(retry_attempts or 3))\n    resp = {}\n    \n    for i in\
          \ range(1, retries + 1):\n        resp = _request_patch(api_url, payload,\
          \ headers)\n        st = resp.get(\"_status\", 0)\n        # 成功或客户端错误(4xx)不重试，服务端错误(5xx)或超时重试\n\
          \        if (200 <= st < 500) or st == 404 or st == 401:\n            break\n\
          \        time.sleep(0.5 * (2 ** (i-1)))\n\n    # 5. 结果处理\n    http_code\
          \ = resp.get(\"_status\", 0)\n    is_success = http_code in [200, 201, 202]\n\
          \    # 如果 body 显式包含 error，也视为失败\n    if resp.get(\"error\"): is_success\
          \ = False\n\n    output[\"ok\"] = is_success\n    \n    if is_success:\n\
          \        # 成功状态映射\n        output[\"bundle_status\"] = \"processing\" if\
          \ http_code == 202 else \"active\"\n        \n        # 构造最终展示链接：强制用 https://e2b.x-pilot.ai/play\
          \ 且不带 sig\n        final_url = f\"{PUBLIC_PLAY_BASE.rstrip('/')}/play?projectId={target_pid}\"\
          \n        output[\"preview_url\"] = final_url\n        output[\"player_url\"\
          ] = final_url\n    else:\n        output[\"bundle_status\"] = \"failed\"\
          \n        err_raw = resp.get(\"error\") or resp.get(\"message\") or resp.get(\"\
          _status\")\n        output[\"error\"] = f\"Update Failed: {err_raw}\"\n\
          \        output[\"next_step\"] = \"Check server logs or token validity.\"\
          \n\n    return output\n"
        code_language: python3
