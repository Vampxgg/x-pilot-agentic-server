            \n\n### 4. 字幕处理\n\n\n**⚠️ 必须使用数据与渲染分离的模式**\n\n\n```tsx\n// ✅ 正确：先定义 subtitles\
            \ 数组，再用 .map() 渲染\nconst subtitles = [\n  { text: \"这是第一条字幕\", start_time_seconds:\
            \ 0, end_time_seconds: 3 },\n  { text: \"This is the second subtitle\"\
            , start_time_seconds: 3.5, end_time_seconds: 7 },\n  { text: \"第三条字幕内容\"\
            , start_time_seconds: 7.5, end_time_seconds: 11 },\n];\n\n\n// 在 JSX 中\n\
            {subtitles.map((s, i) => (\n  <Subtitle \n    key={i}\n    text={s.text}\n\
                startFrame={Math.round(s.start_time_seconds * fps)}\n    durationInFrames={Math.round((s.end_time_seconds\
            \ - s.start_time_seconds) * fps)}\n  />\n))}\n```\n\n\n```tsx\n// ❌ 错误：text\
            \ 使用变量引用\nconst content = \"字幕内容\";\nconst subtitles = [{ text: content,\
            \ start_time_seconds: 0, end_time_seconds: 3 }];\n\n\n// ❌ 错误：数组名不是 subtitles\n\
            const captions = [{ text: \"...\", start_time_seconds: 0, end_time_seconds:\
            \ 3 }];\n\n\n// ❌ 错误：直接写 <Subtitle> 不用数组\n<Subtitle text=\"...\" startFrame={0}\
            \ durationInFrames={90} />\n```\n\n\n**时间换算示例**：\n- 输入（全片绝对时间）：`{ text:\
            \ \"Hello\", start_time_seconds: 15.0, end_time_seconds: 18.0 }`\n- 场景起始秒：`sceneStartSeconds\
            \ = 15.0`\n- 计算相对时间：`relativeStart = 15.0 - 15.0 = 0`，`relativeEnd = 18.0\
            \ - 15.0 = 3`\n- 输出：`{ text: \"Hello\", start_time_seconds: 0, end_time_seconds:\
            \ 3 }`\n\n\n\n\n---\n\n\n## ✅ 修改前自检（命中禁用规则即重写）\n- 出现 `easing: spring(...)`\
