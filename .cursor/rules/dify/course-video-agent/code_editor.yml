            \ / 元素混乱）\n\n\n#### ✅ 必须遵守的根布局\n- **每个场景根节点必须是**：`<AbsoluteFill>`\n- **必须显式设置背景**：`backgroundColor`\
            \ 或 `background`（禁止依赖透明背景）\n- **建议统一**：`overflow: \"hidden\"` 防止元素跑出画面\n\
            \n\n推荐骨架（所有场景统一使用）：\n```tsx\nimport React from \"react\";\nimport { AbsoluteFill,\
            \ useCurrentFrame, useVideoConfig } from \"remotion\";\nimport { SafeArea,\
            \ Subtitle } from \"../components\";\nimport { useTheme } from \"../contexts/ThemeContext\"\
            ;\n\n\nexport default function Scene{scene_number}() {\n  const frame\
            \ = useCurrentFrame();\n  const { fps, width, height } = useVideoConfig();\n\
              const theme = useTheme();\n\n\n  // 字幕数据（必须命名为 subtitles，使用场景相对时间，单位：秒）\n\
              const subtitles = [\n    { text: \"这是第一条字幕\", start_time_seconds: 0,\
            \ end_time_seconds: 3 },\n    { text: \"This is the second subtitle\"\
            , start_time_seconds: 3.5, end_time_seconds: 7 },\n  ];\n\n\n  return\
            \ (\n    <AbsoluteFill style={{ background: \"#ffffff\", overflow: \"\
            hidden\" }}>\n      {/* 背景层（zIndex:0，pointerEvents:none） */}\n      <AbsoluteFill\
            \ style={{ zIndex: 0, pointerEvents: \"none\" }}>\n        {/* 背景装饰/渐变/噪声等\
            \ */}\n      </AbsoluteFill>\n\n\n      {/* 主内容层（SafeArea，避免贴边；预留字幕空间）\
            \ */}\n      <SafeArea padding={60} paddingBottom={160} style={{ zIndex:\
            \ 1 }}>\n        <div style={{ flex: 1, display: \"flex\", flexDirection:\
            \ \"column\", gap: 32 }}>\n          {/* 主内容尽量用 flex/grid 流式布局，减少 absolute\
            \ */}\n        </div>\n      </SafeArea>\n\n\n      {/* 字幕层（永远放最上层，避免被遮挡）\
            \ */}\n      {subtitles.map((s, i) => (\n        <Subtitle \n         \
            \ key={i}\n          text={s.text}\n          startFrame={Math.round(s.start_time_seconds\
            \ * fps)}\n          durationInFrames={Math.round((s.end_time_seconds\
            \ - s.start_time_seconds) * fps)}\n        />\n      ))}\n    </AbsoluteFill>\n\
              );\n}\n```\n\n\n#### \U0001F6AB 防重叠硬规则\n- **主内容不要用 `position: absolute`**（除非是明确的标注/强调层），优先用\
            \ `flex`/`grid`。\n- 需要叠层时必须设定 **`zIndex` 分层约定**：背景 0、内容 1、强调层 2、字幕 999。\n\
            - 所有卡片/图表必须有 **明确尺寸约束**：`maxWidth` / `width` / `height`，不要让内容自然溢出。\n-\
            \ 任何会动的元素（粒子/3D/噪声）都放在 **背景层** 并 `pointerEvents: \"none\"`。\n\n\n####\
            \ \U0001F3A8 背景错误规避\n- 每个场景 **必须**设置 `background` 或 `backgroundColor`。\n\
            - 禁止使用纯黑 `#000` 作为默认背景（除非视觉概念明确要求）。\n- 渐变背景优先使用 `linear-gradient(...)`\
            \ 并提供兜底纯色。\n\n\n#### \U0001F9FE 字幕输出结构（必须严格遵守）\n\n\n**⚠️ 重要：后端静态提取器只能识别字面量值，无法执行\
            \ JavaScript 代码**\n\n\n字幕必须采用**数据与渲染分离**的模式：先定义 `subtitles` 数组，再用 `.map()`\
            \ 渲染。\n\n\n**唯一正确格式：**\n\n\n```tsx\n// 1. 字幕数据定义（必须在组件函数内、return 之前）\n\
            const subtitles = [\n  { text: \"First subtitle content\", start_time_seconds:\
            \ 0, end_time_seconds: 3 },\n  { text: \"第二条字幕内容\", start_time_seconds:\
            \ 3.5, end_time_seconds: 7 },\n  { text: \"المحتوى الثالث\", start_time_seconds:\
            \ 7.5, end_time_seconds: 11 },\n];\n\n\n// 2. 在 JSX 中渲染（在 return 内）\n\
            {subtitles.map((s, i) => (\n  <Subtitle \n    key={i}\n    text={s.text}\n\
                startFrame={Math.round(s.start_time_seconds * fps)}\n    durationInFrames={Math.round((s.end_time_seconds\
            \ - s.start_time_seconds) * fps)}\n  />\n))}\n```\n\n\n**硬性规则**：\n| 属性\
            \ | 必须是 | 示例 |\n|------|--------|------|\n| `text` | 字面量字符串 | `text: \"\
            字幕文字\"` |\n| `start_time_seconds` | 字面量数字（秒） | `start_time_seconds: 0`\
            \ |\n| `end_time_seconds` | 字面量数字（秒） | `end_time_seconds: 3` |\n\n\n**关键要求**：\n\
            - 数组变量**必须命名为 `subtitles`**（提取器依赖此名称）\n- `text` 必须是字面量字符串，不能是变量引用\n- 时间单位是**秒**，不是帧数\n\
            - 使用场景的相对时间（从 0 开始），不是全片绝对时间\n\n\n**绝对禁止**（会导致字幕提取失败）：\n```tsx\n// ❌ 禁止：text\
            \ 使用变量引用\nconst content = \"字幕内容\";\nconst subtitles = [{ text: content,\
            \ ... }];\n\n\n// ❌ 禁止：数组名不是 subtitles\nconst captions = [{ text: \"...\"\
            , ... }];\n\n\n// ❌ 禁止：时间使用表达式\nconst subtitles = [{ text: \"...\", start_time_seconds:\
            \ startTime + 1, ... }];\n\n\n// ❌ 禁止：直接写 <Subtitle> 不用数组\n<Subtitle text=\"\
            ...\" startFrame={0} durationInFrames={90} />\n```\n\n\n**时间换算指南**：\n\
            1. 输入 JSON 的字幕时间是全片绝对秒（`start_time_seconds`/`end_time_seconds`）\n2. 计算本场景起始秒：`sceneStartSeconds\
            \ = min(timeline_events[].start_time_seconds, subtitles[].start_time_seconds)`\n\
            3. 对每条字幕计算场景相对时间：\n   - `relativeStart = subtitle.start_time_seconds -\
            \ sceneStartSeconds`\n   - `relativeEnd = subtitle.end_time_seconds -\
            \ sceneStartSeconds`\n4. **直接写计算后的秒数**，例如 `start_time_seconds: 0, end_time_seconds:\
            \ 3`\n\n\n**防重叠规则**：\n- 不要让两条字幕在时间上重叠；若存在重叠，后者 `start_time_seconds` 至少比前者\
            \ `end_time_seconds` 多 0.1 秒\n- 没有字幕就不要定义 `subtitles` 数组\n\n\n#### \U0001F5BC\
            ️ 图片/素材加载（云端稳定性关键）\n- **强烈推荐（长期方案）**：管理平台在上传到 E2B 之前，先把远程图片/视频**下载落盘**到项目的\
            \ `public/` 或 `src/assets/`，scene 里只引用本地资源。\n- **现阶段允许使用 `http://` 资源**（你们当前资源就是这一类），但要意识到：E2B\
            \ 预览通常走 HTTPS 反代，浏览器可能会阻止 HTTPS 页面加载 HTTP 图片（Mixed Content），导致加载失败。\n\
              - 若发现加载失败：优先让管理平台做“HTTP→HTTPS 可用性探测 + 代理/落盘”，而不是让 scene 直接依赖外网。\n- **现阶段允许使用短时效签名\
            \ URL**（带 `timestamp/nonce/sign` 这类），但必须假设它可能在播放中途过期 / 云端网络不可达。\n- **强制要求（短期兜底）**：无论远程图是否能加载成功，代码都**不允许因为图片加载失败而崩溃/取消渲染**，必须有失败兜底（例如显示占位、跳过该图片）。\n\
            - **强制要求（语义占位）**：所有图片组件必须提供可读语义（至少一个）：`alt` / `title` / `aria-label` /\
            \ `data-caption`。\n  - 目的：当图片加载失败时，模板会渲染“主题配色的默认占位图”，并把这些语义文案显示在占位卡片上，让画面依然像“成片”。\n\
            - 如果必须用远程 URL：\n  - 优先 HTTPS（能用就用）；\n  - 避免依赖 Referer/Cookie（云端更容易被防盗链拦）；\n\
              - 所有远程图片必须具备失败兜底。\n\n\n\n---\n\n\n### 3. 可用技术栈（教学视频专用）\n\n\n#### \U0001F4CA\
            \ 数据可视化\n```tsx\n// Recharts - React 图表库（推荐教学视频）\nimport { BarChart, Bar,\
            \ LineChart, Line, PieChart, Pie, AreaChart, Area, RadarChart, Radar,\
            \ ScatterChart, Scatter, XAxis, YAxis, CartesianGrid, Tooltip, Legend,\
            \ ResponsiveContainer } from 'recharts';\n\n\n// D3.js - 高级数据可视化\nimport\
            \ * as d3 from 'd3';\nimport * as d3Cloud from 'd3-cloud'; // 词云\nimport\
            \ * as d3Sankey from 'd3-sankey'; // 桑基图\n\n\n// Chart.js + React Chart.js\
            \ 2（模板已内置）\nimport {\n  Chart as ChartJS,\n  CategoryScale,\n  LinearScale,\n\
