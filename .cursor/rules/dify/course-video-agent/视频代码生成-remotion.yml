    - data:
        code: "import requests\n\ndef is_url_reachable(url):\n    \"\"\"\n    检查 URL\
          \ 是否可达\n    \"\"\"\n    try:\n        # 使用 head 请求比 get 更快，因为它只下载响应头\n \
          \       # timeout 设置为 3 秒，避免脚本长时间卡住\n        # allow_redirects=True 处理重定向链接\n\
          \        response = requests.head(url, timeout=3, allow_redirects=True)\n\
          \        # 状态码在 200-399 之间认为可达\n        return 200 <= response.status_code\
          \ < 400\n    except Exception:\n        # 捕获所有请求异常（超时、连接失败等）\n        return\
          \ False\n\ndef main(arg1):\n    # 初始化输出结果，添加必须输出的 title 字段\n    result =\
          \ {\n        \"cover_url\": \"\",\n        \"title\": \"\"\n    }\n  \n\
          \    try:\n        if not isinstance(arg1, list):\n            return result\n\
          \      \n        for scene in arg1:\n            # 找到 type 为 cover 的场景\n\
          \            if isinstance(scene, dict) and scene.get(\"type\") == \"cover\"\
          :\n                \n                # --- 新增逻辑：提取 title ---\n         \
          \       title_text = scene.get(\"title\")\n                # 只有当 title 存在且为字符串时才赋值，否则保持初始化的空字符串\n\
          \                if isinstance(title_text, str):\n                    result[\"\
          title\"] = title_text\n                # -------------------------\n\n \
          \               # 获取 image 字段的内容\n                image_data = scene.get(\"\
          image\", {})\n              \n                if isinstance(image_data,\
          \ dict):\n                    possible_url = None\n                    \n\
          \                    # 优先检查 'source_type'\n                    source_type\
          \ = image_data.get(\"source_type\")\n                    \n            \
          \        if source_type == \"external-url\":\n                        #\
          \ 情况A: 用户提供了现成图片的URL\n                        possible_url = image_data.get(\"\
          url\")\n                    elif source_type == \"ai-generated\":\n    \
          \                    # 情况B: AI现场生成的图片，真正的链接在 'generated_url' 字段\n      \
          \                  possible_url = image_data.get(\"generated_url\")\n\n\
          \                    # 1. 验证是否获取到了字符串类型的 URL\n                    if not\
          \ isinstance(possible_url, str):\n                        # 如果没有找到有效的URL，跳出循环（此时\
          \ title 已经提取完毕）\n                        break \n\n                    #\
          \ 2. 验证是否以 http:// 或 https:// 开头\n                    if not (possible_url.startswith(\"\
          http://\") or possible_url.startswith(\"https://\")):\n                \
          \        break\n                  \n                    # 3. 验证链接的可达性（仅当URL有效且以http(s)开头时才进行）\n\
          \                    if is_url_reachable(possible_url):\n              \
          \          result[\"cover_url\"] = possible_url\n                  \n  \
          \                  # 找到封面图块后，逻辑上都不应再处理后续场景\n                    break\n\
          \                  \n    except Exception:\n        # 发生任何未预料的逻辑错误均返回预置的空字符串结果\n\
          \        pass\n      \n    return result\n"
        code_language: python3
