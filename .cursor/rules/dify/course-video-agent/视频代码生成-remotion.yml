    - data:
        code: "# -*- coding: utf-8 -*-\n\"\"\"\n节点ID: 1770209999999\n节点标题: ThemeExtractor\n\
          节点描述: 从剧本（Redis 存储的 JSON 字符串）中提取 theme，输出 API 兼容的 theme 参数\n节点类型: code\n\
          \"\"\"\n\n\"\"\"Extract theme from script content (Redis value, string type)\
          \ for x-pilot-e2b-server API.\n\nInput: script_content (str) - 剧本 JSON 字符串，通常从\
          \ Redis 获取\nOutput: theme (str), theme_id (str) - theme 始终为 string 类型，预设\
          \ id 直接输出，custom 输出 JSON 字符串\n\n注意：Dify 运行时会包装代码，不能使用 from __future__ import\
          \ annotations\n\"\"\"\n\nimport json\nfrom typing import Any, Dict, Optional\n\
          \nPRESET_IDS = frozenset([\n    \"tech\", \"cyberpunk\", \"elegant\", \"\
          warm\", \"nature\", \"minimal\", \"ocean\", \"sunset\"\n])\n\n\ndef _get_config(obj:\
          \ Any) -> Optional[Dict]:\n    \"\"\"Extract config from script/manifest\
          \ structure.\"\"\"\n    if not isinstance(obj, dict):\n        return None\n\
          \    return obj.get(\"config\") or obj\n\n\ndef _color_palette_to_custom_theme(cp:\
          \ Dict) -> Dict:\n    \"\"\"Convert legacy color_palette to customTheme\
          \ format for API. 补全 ThemeColors 所需字段。\"\"\"\n    prim = cp.get(\"primary_color\"\
          ) or cp.get(\"primary\") or \"#00d4ff\"\n    sec = cp.get(\"secondary_color\"\
          ) or cp.get(\"secondary\") or \"#0099ff\"\n    acc = cp.get(\"accent_color\"\
          ) or cp.get(\"accent\") or \"#00ff88\"\n    bg = cp.get(\"background_base\"\
          ) or cp.get(\"background\") or \"#0a0a0a\"\n    txt = cp.get(\"text_color\"\
          ) or cp.get(\"text\") or \"#ffffff\"\n    return {\n        \"id\": \"custom\"\
          ,\n        \"name\": \"自定义\",\n        \"colors\": {\n            \"primary\"\
          : prim,\n            \"secondary\": sec,\n            \"accent\": acc,\n\
          \            \"background\": bg,\n            \"text\": txt,\n         \
          \   \"textSecondary\": cp.get(\"textSecondary\") or \"#aaaaaa\",\n     \
