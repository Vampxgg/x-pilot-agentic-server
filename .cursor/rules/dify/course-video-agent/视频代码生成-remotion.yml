            \ 自行设计\n3. **视觉重点**：根据 `target` 和 `subtitles` 确定画面核心是什么（图表？文字？3D 模型？）。\n\
            4. **动画策略**：决定使用哪种进场动画（Fade/Slide/Pop）和持续动画（Float/Rotate），且全部必须由 `useCurrentFrame()`\
            \ + `interpolate/spring` 驱动。\n5. **布局规划**：决定使用 Flex 还是 Grid，如何预留字幕空间。\n\
            6. **镜头语言（降低 Slides 感）**：至少选 1 个\"镜头动作\"并落地到帧驱动样式（2D：轻微 push-in/pan/parall\n\
            7. **Sequence 编排（强制）**：使用 Remotion `Sequence` 将关键节拍与组件进出场对齐 `subtitles`/`timeline_events`（如果存在），避免静态堆叠。\n\
            8. **节奏与防空走**：把 `subtitles` 的时间段当成节拍点：每条字幕至少对应 1 个可见的视觉变化（高亮/标注/生长/切换视图）。如果字幕结束早于场景时长，必须用\"\
            收束/回顾/总结卡\"消化尾段，禁止静态空跑。\n9. **可读性自检**：检查文字与背景对比度；如果可能同色，必须添加 scrim（半透明遮罩）、描边或阴影兜底。\n\
            然后输出唯一的 `.tsx` 代码块。**输出中不得包含平台占位符**（如 `{{#...}}`），只输出纯 `<thought>` 与 TSX\
