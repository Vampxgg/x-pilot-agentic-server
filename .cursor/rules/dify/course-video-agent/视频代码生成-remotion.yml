            \                        {/* 图表 */}            <div\n        style={{\n\
            \          flex: 1,\n          display: \"flex\",\n          alignItems:\
            \ \"center\",\n          justifyContent: \"center\",\n          background:\
            \ \"rgba(255, 255, 255, 0.1)\",\n          backdropFilter: \"blur(20px)\"\
            ,\n          borderRadius: 24,\n          padding: 40,\n        }}\n \
            \     >\n                               {\" \"}\n        <BarChart width={1200}\
            \ height={600} data={animatedData}>\n                                 \
            \      {\" \"}\n          <CartesianGrid strokeDasharray=\"3 3\" stroke=\"\
            rgba(255,255,255,0.2)\" />\n                              <XAxis dataKey=\"\
            name\" stroke=\"white\" />\n                              <YAxis stroke=\"\
            white\" />\n                              <Tooltip />                 \
            \   <Bar\n            dataKey=\"value\"\n            fill=\"#00C896\"\n\
            \            radius={[8, 8, 0, 0]}\n            isAnimationActive={false}\n\
            \            animationDuration={0}\n          />                     \
