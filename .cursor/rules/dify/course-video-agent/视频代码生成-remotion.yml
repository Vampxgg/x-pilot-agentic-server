          \ str] = {}\n    if api_token and str(api_token).strip():\n        tok =\
          \ str(api_token).strip()\n        headers[\"Authorization\"] = tok if tok.lower().startswith(\"\
          bearer \") else f\"Bearer {tok}\"\n\n    try:\n        timeout_sec_int =\
          \ int(timeout_sec)\n    except Exception:\n        timeout_sec_int = 90\n\
          \n    if wait_for_ready and timeout_sec_int < 210:\n        timeout_sec_int\
          \ = 210\n\n    try:\n        attempts_int = int(retry_attempts)\n    except\
          \ Exception:\n        attempts_int = 3\n    attempts_int = max(1, min(8,\
          \ attempts_int))\n\n    resp: Dict[str, Any] = {}\n    \n    # --- 3. Execute\
          \ with Retry ---\n    \n    ssl_ctx = None\n    if not verify_ssl:\n   \
          \     ssl_ctx = ssl.create_default_context()\n        ssl_ctx.check_hostname\
          \ = False\n        ssl_ctx.verify_mode = ssl.CERT_NONE\n\n    for attempt\
          \ in range(1, attempts_int + 1):\n        resp = _post_json(url, payload,\
          \ headers=headers, timeout_sec=timeout_sec_int, ssl_context=ssl_ctx)\n \
          \       if not _should_retry_response(resp) or attempt == attempts_int:\n\
          \            break\n        _sleep_backoff(attempt, retry_base_delay_sec)\n\
          \n\n    # --- 4. Parse Results --\n    \n    player_url = resp.get(\"playerUrl\"\
          ) or resp.get(\"player_url\")\n    legacy_preview_url = resp.get(\"previewUrl\"\
          ) or resp.get(\"preview_url\")\n    preview_url = player_url or legacy_preview_url\n\
          \n    preview_allowed = resp.get(\"previewAllowed\")\n    preview_blocked_reason\
          \ = resp.get(\"previewBlockedReason\")\n\n    server_ok = resp.get(\"ok\"\
          )\n    if server_ok is None:\n        server_ok = resp.get(\"success\")\n\
          \n    # Determine \"ok\" status\n    if isinstance(server_ok, bool):\n \
          \       base_ok = bool(server_ok) and bool(preview_url) and not resp.get(\"\
          _http_error\")\n    else:\n        base_ok = bool(preview_url) and not resp.get(\"\
          _http_error\") and (preview_allowed is not False)\n\n    # Check developer\
          \ bundle status\n    if player_url:\n        dev_ok = True\n    else:\n\
          \        dev_ok = not (resp.get(\"devServerReachable\") is False or resp.get(\"\
          devBundleReachable\") is False)\n\n    is_success = bool(base_ok and dev_ok)\n\
          \    \n    # Common extracted fields\n    resp_proj_id = resp.get(\"projectId\"\
          ) or resp.get(\"project_id\")\n    resp_status = resp.get(\"bundleStatus\"\
          ) or resp.get(\"bundle_status\")\n    resp_mode = resp.get(\"mode\")\n \
          \   resp_sandbox_id = resp.get(\"sandboxId\")\n\n    # --- 5. Determine\
          \ specifics (Error vs Success) using unified response builder ---\n\n  \
          \  # Case A: HTTP/Network Error\n    if resp.get(\"_http_error\"):\n   \
          \     http_status = resp.get(\"_http_status\")\n        err_type = resp.get(\"\
          _error_type\") or \"http\"\n        err_detail = _truncate(resp.get(\"_error\"\
          ) or resp.get(\"message\")or resp.get(\"error\") or resp.get(\"raw\"))\n\
          \n        if http_status == 401:\n            error_msg = \"unauthorized\
          \ (401)\"\n            next_step_msg = \"The server has API_TOKEN enabled.\
          \ Pass api_token (raw token or 'Bearer <token>') and retry.\"\n        elif\
          \ err_type == \"network\":\n            error_msg = f\"network error: {err_detail\
          \ or 'unknown'}\"\n            next_step_msg = \"Check server_base_url reachability\
          \ (network/firewall/allowlist), port 7780, and whether the server expects\
          \ http vs https.\"\n        else:\n            error_msg = f\"request failed\
          \ ({err_type}): HTTP {http_status}\"\n            next_step_msg = f\"Verify\
          \ request payload. Server detail: {err_detail or 'n/a'}\"\n\n        return\
          \ _build_response(\n            ok=False,\n            error=error_msg,\n\
          \            next_step=next_step_msg,\n            project_id=resp_proj_id,\n\
          \            bundle_status=resp_status,\n            mode=resp_mode,\n \
          \           sandbox_id_val=resp_sandbox_id\n        )\n\n    # Case B: Preview\
          \ Blocked (Preflight)\n    if preview_allowed is False:\n        scene_error,\
          \ scene_next = _build_scene_focused_guidance(resp)\n        error_msg =\
          \ scene_error or f\"preview blocked: {preview_blocked_reason or 'unknown'}\"\
          \n        next_step_msg = scene_next or \"Fix the failing scene based on\
          \ preflight output. Then push again.\"\n        \n        return _build_response(\n\
          \            ok=False,\n            error=error_msg,\n            next_step=next_step_msg,\n\
          \            project_id=resp_proj_id,\n            bundle_status=resp_status,\n\
          \            mode=resp_mode,\n            sandbox_id_val=resp_sandbox_id\n\
          \        )\n\n    # Case C: No Preview URL\n    if not preview_url:\n  \
          \      scene_error, scene_next = _build_scene_focused_guidance(resp)\n \
          \       error_msg = scene_error or \"missing previewUrl in response\"\n\
          \        next_step_msg = scene_next or \"Try wait_for_ready=True. Inspect\
          \ server logs.\"\n\n        return _build_response(\n            ok=False,\n\
          \            error=error_msg,\n            next_step=next_step_msg,\n  \
          \          project_id=resp_proj_id,\n            bundle_status=resp_status,\n\
          \            mode=resp_mode,\n            sandbox_id_val=resp_sandbox_id\n\
          \        )\n\n    # Case D: Not Reachable (White Screen)\n    error_msg\
          \ = None\n    next_step_msg = None\n    if not dev_ok:\n        s1 = resp.get(\"\
          devServerStatus\")\n        s2 = resp.get(\"devBundleStatus\")\n       \
          \ error_msg = \"previewUrl returned but not reachable yet\"\n        next_step_msg\
          \ = (\n            f\"The server returned preview_url, but public endpoint\
          \ not ready. Probe: /={s1}, /bundle={s2}. \"\n            \"Set wait_for_ready=True\
          \ and retry.\"\n        )\n        # Even if not dev_ok, we might still\
          \ return ok=False but provide the raw URLs, \n        # but logically if\
          \ dev_ok is false, is_success is already False above.\n\n    # Case E: Success\
          \ (or soft failure with URLs)\n    return _build_response(\n        ok=is_success,\n\
          \        preview_url=preview_url,\n        player_url=player_url,\n    \
          \    project_id=resp_proj_id,\n        bundle_status=resp_status,\n    \
          \    mode=resp_mode,\n        error=error_msg,\n        next_step=next_step_msg,\n\
          \        sandbox_id_val=resp_sandbox_id\n    )"
