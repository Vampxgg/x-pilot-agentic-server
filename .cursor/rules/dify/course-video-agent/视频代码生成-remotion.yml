            \ `random` 函数并传入 seed。\n    - ❌ 错误：`const val = useRandom();`\n    - ✅\
            \ 正确：`import { random } from \"remotion\"; const val = random(\"seed-string\"\
            );`\n- **发现 `import { ... } from \"lucide-react\"` → 立即删除该导入，改用 `SafeIcon`\
            \ 组件**\n- **发现 `import { Canvas } from \"@react-three/fiber\"` 或 `<Canvas>`\
            \ 标签且没有使用 `FullCanvas` → 立即删除 Canvas 导入，改为使用 `FullCanvas` from `../components`**\n\
            \      - 必须删除：`import { Canvas } from \"@react-three/fiber\"`\n      -\
            \ 必须添加：`import { FullCanvas } from \"../components\"`\n      - 必须替换：`<Canvas>`\
            \ → `<FullCanvas>`，`</Canvas>` → `</FullCanvas>`\n\n## ✅ 语法自检（生成后必须检查，语法错误会导致场景无法加载）\n\
            \n生成代码后，必须进行以下语法检查，确保代码能够通过 TypeScript/TSX 编译：\n\n1. **字符串字面量检查**：\n \
            \        - ✅ 所有字符串字面量必须正确闭合（单引号、双引号、模板字符串）\n         - ❌ 禁止：`\"未闭合的字符串`\
            \ 或 `'未闭合的字符串`\n         - ❌ 禁止：字符串中包含未转义的引号导致提前闭合\n\n2. **括号/大括号/方括号匹配检查**：\n\
            \         - ✅ 所有 `()`、`{}`、`[]` 必须正确匹配\n         - ✅ 确保没有遗漏的闭合符号\n    \
