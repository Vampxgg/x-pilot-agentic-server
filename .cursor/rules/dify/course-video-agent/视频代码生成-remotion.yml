    - data:
        code: "# ==============================================================================\n\
          #  Dify 知识库代码节点：智能 JSON 解析器 (Remotion 视频场景专用版)\n#  Author: Optimized Version\n\
          #  Version: 3.1\n#\n#  核心功能:\n#  1. 智能提取并修复格式不规范的 JSON (支持单引号、尾逗号、注释等)\n\
          #  2. 数据清洗：确保所有嵌套列表转换为字典，防止下游 .items() 报错\n#  3. 灵活的场景数据提取，支持多种 JSON 结构\n\
          #\n#  输入输出:\n#  - 输入: main(json_str: str)\n#  - 输出: {\"result\": [...]}\
          \  (保持原有结构不变)\n# ==============================================================================\n\
          \nimport json\nimport re\nfrom typing import Any, Dict, List, Union\n\n\
          # 确保已在 Dify 的\"依赖管理\"中添加了 json-repair 依赖\n# pip install json-repair\nimport\
          \ json_repair\n\n\n# ==============================================================================\n\
          #  核心 JSON 提取逻辑 (高鲁棒性)\n# ==============================================================================\n\
          def _extract_most_significant_json(text: str) -> Union[Dict, List]:\n  \
          \  \"\"\"\n    智能地从可能包含噪音、注释或多个 JSON 片段的文本中提取最主要的 JSON 对象或列表。\n\n    智能性体现在：\n\
          \    1.  **分层解析**: 优先使用快速修复库，失败后才进行候选者提取。\n    2.  **候选者识别**: 即使文本中散落着多个\
          \ JSON 片段，也能识别出它们。\n    3.  **信息量最大原则**: 通过比较大小和复杂性，选择最可能符合用户意图的那个 JSON\
          \ 对象。\n    4.  **鲁棒性**: 结合预处理和强大的修复库，最大化解析成功率。\n    \"\"\"\n\n    # ---\
          \ 阶段1: 快速通道 - 尝试直接修复解析 ---\n    try:\n        result = json_repair.loads(text)\n\
          \        # 确保返回的是 dict 或 list，而非原始字符串\n        if isinstance(result, (dict,\
          \ list)):\n            return result\n    except Exception:\n        pass\n\
          \n    # --- 阶段2: 高级提取 - 寻找并评估候选 JSON ---\n    # 使用正则匹配所有潜在的 JSON 块 (对象或数组)\n\
          \    potential_json_strings = re.findall(r'(\\{[\\s\\S]*\\}|\\[[\\s\\S]*\\\
          ])', text)\n\n    if not potential_json_strings:\n        raise ValueError(\"\
          在输入文本中未能找到任何潜在的 JSON 结构 (即 {...} 或 [...] 块)\")\n\n    valid_jsons = []\n\
          \    for candidate in potential_json_strings:\n        try:\n          \
          \  parsed_json = json_repair.loads(candidate)\n            if isinstance(parsed_json,\
          \ (dict, list)):\n                valid_jsons.append(parsed_json)\n    \
          \    except Exception:\n            continue\n\n    if not valid_jsons:\n\
          \        raise ValueError(\"找到了潜在的 JSON 结构，但没有一个可以被成功修复和解析\")\n\n    # ---\
          \ 智能决策：选择信息量最大的 JSON ---\n    most_significant_json = max(valid_jsons, key=lambda\
          \ x: len(json.dumps(x, ensure_ascii=False)))\n\n    return most_significant_json\n\
          \n\n# ==============================================================================\n\
          #  场景数据提取 (Remotion 专用)\n# ==============================================================================\n\
          def _extract_scenes(data: Union[Dict, List]) -> List:\n    \"\"\"\n    从解析后的数据中提取\
          \ scenes 列表。\n    支持多种数据结构：\n    1. {\"scenes\": [...]} - 标准结构\n    2. [...]\
          \ - 直接就是场景列表\n    3. {\"result\": {\"scenes\": [...]}} - 嵌套结构\n    4. {\"\
          data\": {\"scenes\": [...]}} - 另一种嵌套结构\n    \"\"\"\n    if isinstance(data,\
          \ list):\n        return data\n    \n    if isinstance(data, dict):\n  \
          \      # 尝试直接获取 scenes\n        if \"scenes\" in data:\n            return\
          \ data[\"scenes\"]\n        \n        # 尝试从 result 中获取\n        if \"result\"\
          \ in data:\n            result = data[\"result\"]\n            if isinstance(result,\
          \ list):\n                return result\n            if isinstance(result,\
          \ dict) and \"scenes\" in result:\n                return result[\"scenes\"\
          ]\n        \n        # 尝试从 data 字段中获取\n        if \"data\" in data:\n  \
          \          inner_data = data[\"data\"]\n            if isinstance(inner_data,\
          \ list):\n                return inner_data\n            if isinstance(inner_data,\
          \ dict) and \"scenes\" in inner_data:\n                return inner_data[\"\
          scenes\"]\n        \n        # 如果没有 scenes 键，检查是否整个 dict 就是一个场景\n      \
          \  # (包含典型场景字段如 narration, visual, duration 等)\n        scene_fields = {\"\
          narration\", \"visual\", \"duration\", \"scene\", \"audio\", \"text\", \"\
          image\"}\n        if any(field in data for field in scene_fields):\n   \
          \         return [data]\n    \n    return []\n\n\n# ==============================================================================\n\
          #  数据清洗逻辑 (防止下游 .items() 报错)\n# ==============================================================================\n\
          def _sanitize_data(data: Any) -> Any:\n    \"\"\"\n    递归清洗数据：\n    如果发现\
          \ '列表里的元素还是列表' (比如矩阵行)，\n    就把它强制转换成字典 {\"0\": val1, \"1\": val2}。\n  \
          \  这样下游程序调用 .items() 就安全了。\n    \"\"\"\n    if isinstance(data, dict):\n\
