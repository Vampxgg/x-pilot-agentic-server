            \ args={[...]} />`、`<coneGeometry args={[...]} />`，对应 Three.js 的 `BoxGeometry`、`SphereGeometry`\
            \ 等。\n- **材质**：`MeshBasicMaterial`、`MeshStandardMaterial`、`MeshPhongMaterial`（R3F\
            \ 中 `<meshBasicMaterial />` 等）。\n- **数学/工具**：`Vector3`、`Color`、`Group`、`Object3D`；曲线见\
