            \ 的高级组件（AnimatePresence 等可能导致问题），仅限基础动画。\n8. ❌ **禁止在 `useFrame` 中调用 React\
            \ State 更新**：\n      - ❌ 错误：`useFrame(() => setCount(c => c + 1))` ——\
            \ 会导致无限重渲染崩溃（Error #185）。\n      - ✅ 正确：只修改 `ref.current` 的属性（如 `ref.current.rotation.x\
            \ += 0.01`）。\n9. ❌ **禁止给 Drei `<Text>` 组件的 `font` 属性传 CSS 字体名**（如 `theme.fonts.heading`）。\n\
            \      - 这会导致 `bidiFactory is not a function` 崩溃。\n      - ✅ 必须：使用 2D\
            \ DOM (`<div className=\"...\">`) 显示文字，或者不传 `font` 属性使用默认 3D 字体。\n10.\
            \ ❌ 不要把 `interpolate()` 的 `inputRange` 写成降序（例如 `[height, 0]` 或 `[1, 0.5]`）；inputRange\
            \ 的**数组**必须按数值升序（如 `[0.5, 1]`）。需要「输入大 → 输出小」时只改 `outputRange`（如 `[0.95,\
            \ 1]`），否则会报错：`inputRange must be strictly monotonically increasing`。\n\
            11. ❌ 不要写 `interpolate(x, [a, b], [p, q, r])` 这种 inputRange 长度 2、outputRange\
            \ 长度 3 的写法；两边长度必须一致，例如三点插值写 `interpolate(x, [a, b, c], [p, q, r])`，否则运行时报错：`inputRange\
            \ (2) and outputRange (3) must have the same length`。\n12. ❌ **不要用 interpolate()\
            \ 的 outputRange 做颜色或字符串插值**：`outputRange` 只允许数字；禁止 `interpolate(progress,\
            \ [0, 1], [theme.colors.a, theme.colors.b])` 这种直接插颜色。颜色随进度过渡统一用 Remotion\
            \ 的 **interpolateColors()** 或「先插数值再选颜色」的写法（详见前文「Remotion 插值（interpolate\
            \ / interpolateColors）」小节）。\n13. ❌ 不要使用 `setInterval`/`setTimeout`（用帧驱动）\n\
            14. ❌ 不要使用 CSS Modules 或外部 CSS 文件\n15. ❌ 不要使用纯黑色背景（除非明确需求）\n16. ❌ 不要直接使用\
            \ `<Canvas>` from `@react-three/fiber`（必须改为 `<FullCanvas>` from `../components`）\n\
            \           - ❌ 禁止：`import { Canvas } from \"@react-three/fiber\"` 或直接使用\
            \ `<Canvas>`\n           - ✅ 必须：`import { FullCanvas } from \"../components\"\
            ` 然后使用 `<FullCanvas>` - 原因：Remotion Studio 预览窗口使用 CSS `transform: scale()`\
            \ 缩放，直接使用 Canvas 会导致 Three.js 渲染器尺寸错误（使用缩放后的容器尺寸而非实际视频尺寸 1920x1080）。FullCanvas\
            \ 内部使用 `useVideoConfig()` 自动设置正确的 Canvas 尺寸，确保在预览和实际渲染中都能正常工作。\n17. ❌\
            \ **禁止在 FullCanvas/Canvas 外部使用 useThree、useFrame、useLoader 等 R3F Hook**：这些\
            \ Hook 依赖 R3F 的 context，只能在 `<FullCanvas>`（或 `<Canvas>`）的子组件内调用；在外部调用会得到\
            \ null，解构 `camera` 等会报错：`Cannot destructure property 'camera' of ... as\
            \ it is null`。自定义相机控制等逻辑必须写在 FullCanvas 内部的子组件中。\n18. ❌ **禁止在场景中直接使用 drei\
            \ 的 `<Float>`**：本模板未在入口 extend Float，会报错 `R3F: Float is not part of the\
            \ THREE namespace!`。悬浮效果须用 **`useCurrentFrame()` + `interpolate()`** 驱动\
            \ `<group>` 的 position/rotation（与 [Remotion 3d 规则](https://github.com/remotion-dev/remotion/blob/main/packages/skills/skills/remotion/rules/3d.md)\
            \ 一致，禁止用 useFrame 做动画）。\n19. ❌ **不要将 mesh 组件作为 `<Instances>` 的直接子元素**：drei\
            \ 的 `<Instances>` 要求前两子元素为**几何体**和**材质**原语（如 `<torusGeometry />`、`<meshStandardMaterial\
            \ />`）。若把 `<Torus>`、`<Box>`、`<Cylinder>` 等完整 mesh 组件放在 `<Instances>` 内作为第一子元素，会致\
            \ geometry 为 null，报 `Cannot read properties of null (reading 'attributes')`。须改用对应\
            \ geometry 原语 + material，实例的旋转等用 `<Instance rotation={[...]} />` 设置。\n\
            20. ❌ **不要对 useTheme() 解构**：须写 `const theme = useTheme();`。禁止从返回值中解构出\
            \ theme（本模板 useTheme 直接返回 Theme 对象，解构会得到 undefined，进而导致 reading 'colors'、'heading'\
            \ 等多种运行时错误）。\n    - ✅ 正确：`{ end_time_seconds: 18.5, text: \"hello\" }`\n\
            \    - 若在画面中展示 JSON/代码片段，应放在字符串或模板字符串内作为内容，不受本条限制。\n21. ❌ **不要在 JSX 文本内容中直接写\
            \ `>` 或 `<`**：会被解析为标签，报 **TS1382: Unexpected token. Did you mean `{'>'}`\
            \ or `&gt;`?**。须转义：`>` → `&gt;` 或 `{'>'}`，`<` → `&lt;` 或 `{'<'}`。例如 \"\
            Click here ->\" 写为 \"Click here -&gt;\"（[TypeScript JSX](https://www.typescriptlang.org/docs/handbook/jsx.html)、[React](https://react.dev/learn#writing-markup-with-jsx)）。\n\
            22. ❌ **不要在 Remotion 场景中使用 Recharts 的 `<ResponsiveContainer>`**：与每帧重渲染叠加会触发\
            \ React #185。Recharts/Chart.js 均须**固定尺寸**（如 `useVideoConfig()` 的 width/height），并**关闭库自带动画**（Recharts：`<Bar\
            \ isAnimationActive={false} animationDuration={0} />`；Chart.js：`options={{\
            \ animation: false }}`），动画由 useCurrentFrame() 驱动。\n23. ❌ **禁止用 useFrame()\
            \ 做 3D 动画**：Remotion 官方要求动画仅由 `useCurrentFrame()` 驱动（[3d.md](https://github.com/remotion-dev/remotion/blob/main/packages/skills/skills/remotion/rules/3d.md)）。旋转、位移、缩放、悬浮等须用\
            \ `frame` + `interpolate()` 在 JSX 中写，不得在 useFrame 里改 position/rotation\
            \ 做动画。\n24. ❌ **不要在 FullCanvas 内使用未设置 `layout=\"none\"` 的 `<Sequence>`**：Sequence\
            \ 默认渲染为 div，不能放在 3D 画布内，须写 `<Sequence layout=\"none\">`（[three-canvas](https://www.remotion.dev/docs/three-canvas)）。\n\
            25. ❌ **不要向 CatmullRomCurve3、TubeGeometry 或 drei 的 Line/曲线 传入含 undefined\
            \ 的 points 数组**：Three.js 要求 points 每项为 Vector3 或 [x,y,z]，否则 getPoint 会报\
            \ `Cannot read properties of undefined (reading 'x')`。生成 points 时须过滤 undefined\
            \ 并保证至少 2 个点（[CatmullRomCurve3](https://threejs.org/docs/#api/en/extras/curves/CatmullRomCurve3)）。\n\
            \n---\n\n## \U0001F4DA 常用库参考（模板已内置 & 可直接调用）\n\n> **严禁**在输出的 `scene_*.tsx`\
            \ 里出现任何安装命令：`npm install` / `pnpm add` / `yarn add` / `npx`。\n> 生成的代码只能\
            \ `import` 本模板项目已内置的依赖（以模板 `package.json` 为准）。\n\n### 官方文档\n\n- [Remotion\
            \ 文档](https://www.remotion.dev/docs)\n- [Remotion 第三方集成](https://www.remotion.dev/docs/third-party)\n\
            \n### Remotion 官方扩展（已安装，教学视频强相关）\n\n- `@remotion/captions`: SRT/字幕轨处理（**用于生成字幕时间轴/样式**）\n\
            - `@remotion/preload`: 预加载图片/视频/音频（**避免首帧闪烁**）\n- `@remotion/fonts`: 自定义字体加载（可选）\n\
            - `@remotion/player`: 网页端播放器（**不要在 scene 里用**，用于外部预览）\n- `@remotion/webcodecs`:\
            \ WebCodecs 加速能力（渲染/编解码相关，通常无需在 scene 中直接调用）\n\n### 数据可视化\n\n- [Remotion\
            \ Charts 规则](https://github.com/remotion-dev/remotion/blob/main/packages/skills/skills/remotion/rules/charts.md)\
            \ - 官方图表规范：_Disable all animations from third party libraries; drive all\
            \ animations from useCurrentFrame()._ 固定尺寸、禁止 ResponsiveContainer。\n-\
            \ [Remotion Paths](https://www.remotion.dev/docs/paths) - 折线/路径动画（`evolvePath`、`getPointAtLength`\
            \ 等），可选安装：`npx remotion add @remotion/paths`\n- [Recharts API](https://recharts.org/en-US/api)\
            \ - React 图表；Remotion 中须 `isAnimationActive={false}`、`animationDuration={0}`，固定尺寸\n\
            - [Chart.js 文档](https://www.chartjs.org/docs/latest/) / [Animations](https://www.chartjs.org/docs/latest/configuration/animations.html)\
            \ - Remotion 中须 `options={{ animation: false }}`，固定尺寸，动画由 frame 驱动\n-\
            \ [D3.js 文档](https://d3js.org) - 强大的数据可视化\n- [@visx/visx 文档](https://airbnb.io/visx)\
            \ - Airbnb 可视化库\n\n### 3D 与动画\n\n- [Remotion 3D 规则 (3d.md)](https://github.com/remotion-dev/remotion/blob/main/packages/skills/skills/remotion/rules/3d.md)\
            \ - 官方规范：动画仅由 `useCurrentFrame()` 驱动，禁止 `useFrame()` 做动画。\n- [Remotion\
