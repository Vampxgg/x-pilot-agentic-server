    - data:
        code: "import re\n\ndef main(input_str: str) -> dict:\n    \"\"\"\n    清洗字符串，移除\
          \ ```json ... ``` 包裹，提取核心内容。\n    具有高健壮性：处理前缀文本、不规范的换行、不同语言标签等。\n    \"\"\
          \"\n    \n    # 1. 空值与类型安全检查\n    if input_str is None:\n        return\
          \ {\"result\": \"\"}\n    \n    if not isinstance(input_str, str):\n   \
          \     # 如果传入的是 dict 或 list，尝试转为 str，防止报错\n        return {\"result\": str(input_str)}\n\
          \n    cleaned_text = input_str.strip()\n\n    # 2. 核心策略：使用正则提取 Markdown\
          \ 代码块中的内容\n    # 解释：\n    # ```         匹配开始的三个反引号\n    # (?:\\w+)?    非捕获组，匹配可选的语言标签\
          \ (如 json, JSON, xml 等)\n    # \\s*         匹配标签后的空字符（换行或空格）\n    # (.*?)\
          \       非贪婪捕获组，提取我们要的实际内容\n    # ```         匹配结束的三反引号\n    # re.DOTALL\
          \   让 . 可以匹配换行符，确保多行 JSON 能被提取\n    pattern = r\"```(?:\\w+)?\\s*(.*?)```\"\
          \n    \n    match = re.search(pattern, cleaned_text, re.DOTALL)\n\n    if\
          \ match:\n        # 场景 A: 找到了完整的代码块 (无论前后是否有废话，如 \"Here is the code: ```...\"\
          )\n        # 直接提取核心部分\n        final_output = match.group(1).strip()\n \
          \   else:\n        # 场景 B: 没有找到成对的 ```...``` \n        # 可能情况：\n       \
          \ # 1. 本来就是纯 JSON 字符串，没有 Markdown 包装。\n        # 2. Markdown 未闭合（例如只有开头没有结尾）。\n\
          \        \n        # 备用清洗逻辑：手动去除开头的 ```xxx 和结尾的 ```\n        final_output\
          \ = cleaned_text\n        \n        # 去除开头的 ```json 或 ```\n        final_output\
          \ = re.sub(r\"^```\\w*\\s*\", \"\", final_output)\n        \n        # 去除结尾可能的\
          \ ```\n        final_output = final_output.rstrip(\"`\").strip()\n\n   \
          \ return {\n        \"result\": final_output\n    }\n"
        code_language: python3
        outputs:
          result:
            children: null
            type: string
