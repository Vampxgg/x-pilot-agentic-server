            \ 数组格式 → 必须重写为数组 + .map() 模式\n- `subtitles` 数组中的 `text` 不是字面量字符串 → 必须改为字面量\n\
            - `subtitles` 数组中缺少 `start_time_seconds/end_time_seconds` → 必须补齐\n- 数组变量名不是\
            \ `subtitles` → 必须改为 `subtitles`\n- 直接写 `<Subtitle>` 组件而不用数组 → 必须改为数组\
