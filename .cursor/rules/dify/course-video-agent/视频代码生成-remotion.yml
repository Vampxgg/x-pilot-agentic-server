            \      </div>                  {/* 字幕 */}            {subtitles.map((s,\
            \ i) => (\n        <Subtitle\n          key={i}\n          text={s.text}\n\
            \          startFrame={Math.round(s.start_time_seconds * fps)}\n     \
            \     durationInFrames={Math.round(\n            (s.end_time_seconds -\
            \ s.start_time_seconds) * fps\n          )}\n        />\n      ))}   \
            \          {\" \"}\n    </AbsoluteFill>\n  );\n}\n```\n\n---\n\n### 模板\
