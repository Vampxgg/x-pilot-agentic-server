          \ isinstance(brand_logo_url, str):\n                    payload[\"watermark\"\
          ] = {\n                        \"imageUrl\": brand_logo_url,\n         \
          \               \"opacity\": 0.8,\n                        \"bottom\": 60,\n\
          \                        \"right\": 40,\n                        \"scale\"\
          : 1,\n                    }\n        except Exception:\n            # Ignore\
          \ if brand_kit is not valid JSON\n            pass\n\n    # theme: 优先使用传入的\
