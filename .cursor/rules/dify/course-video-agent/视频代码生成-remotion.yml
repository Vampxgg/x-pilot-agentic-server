            \  const animatedData = rawData.map((item) => ({\n    ...item,\n    value:\
            \ interpolate(frame, [0, 60], [0, item.value], {\n      extrapolateRight:\
            \ \"clamp\",\n    }),\n  })); // 标题动画\n  const titleOpacity = interpolate(frame,\
            \ [0, 20], [0, 1], {\n    extrapolateRight: \"clamp\",\n  });\n  return\
