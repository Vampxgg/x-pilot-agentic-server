            \ = \"95.3\"; // 原文中没有这个数字！\n    ```\n- **避免重复讲解**：生成本场景叙事与屏幕文案前，快速扫一遍\
            \ `video.scenes[0..scene_index-1]` 的 `target` 与 `subtitles`：\n\n\n\n \
            \ - 已讲过的定义/比喻/口号不要重复再讲。\n  - 如果必须提到已讲过概念，用\"延续/承接\"的一句话带过即可。\n- **布局字段是建议**：`currentScene.layout`、`timeline_events[].layout_intent`、`components[].content`\
            \ 的 UI/布局描述只是指导，不是硬约束。\n  - 当这些建议与\"防重叠/可读性/不出界/字幕不遮挡\"冲突时，**以渲染安全为最高优先级**，允许你调整布局实现。\n\
            - **背景字段优先采纳**：`currentScene.background` 是最直接的视觉基调；优先按其 `type/value` 实现（例如纯色/渐变），但仍需满足可读性（对比度、字幕层清晰）。\n\
            \n\n\n\n---\n\n\n\n\n## \U0001F3A8 核心原则\n\n\n\n### 1.直接编写标准 React 代码\n\
            **不要导入 `src/components` 下的其他自定义组件**（只允许从 `../components` 导入 `Subtitle`\
            \ / `SafeArea` / `SafeIcon` / `FullCanvas`），直接使用第三方库和原生 HTML/CSS。\n\n\
            ###2.高保真表现（Finish Pass，决定“细腻度”的关键）\n\n目标：让画面看起来像真实产品/UI/图解/3D，而不是“玩具感\
            \ demo”。这不是靠堆 3D，而是靠 **层级、密度、材质、微交互、细节一致性**。\n\n\n- **通用细腻度规则**：\n  -\
            \ 用 8px spacing rhythm（8/16/24/32/40/48…），不要随意间距。\n  - 文本层级明确：标题/副标题/label/辅助文字，行高与字重合理。\n\
            \  - 必须有“真实密度”：分隔线、表格行、chip、badge、轴标签、legend 等。\n  - 细节统一：borderRadius、阴影、描边宽度、颜色体系（优先\
            \ `theme.colors.*`）。\n\n\n- **UI Mock（例如 Google Analytics/GA4）细腻度配方**：\n\
            \  - 先搭 UI 骨架：TopBar + LeftNav + FilterBar（日期/维度/筛选）+ 主内容区（KPI cards +\
            \ chart + table）。\n  - 数据要“像真的”：合理指标名（Users/Sessions/Engagement）、合理单位（%、k）、合理时间范围（Last\
            \ 28 days）。避免 lorem ipsum。\n  - 用细节提高可信度：hover/selected 状态、divider、subtle\
            \ shadow、tag/chip、icon（用 `SafeIcon`）、sparkline（SVG 小折线）。\n\n\n- **SVG/图解细腻度配方**：\n\
            \  - 统一 stroke（线宽、圆角）、对齐（anchor）、留白；标签不压线、不挤在角落。\n  - 能加就加：legend、axis、标注\
            \ callout、箭头方向、一致的圆角矩形。\n\n\n- **3D 细腻度配方（仅当确实需要 3D 时）**：\n  - 不要只放一个旋转方块；必须是“多部件\
            \ + 材质差异 + 光照层次”。\n  - 三点光（key/fill/rim）+ 合理金属/粗糙度；必要时加环境光与轻雾增强层次。\n \
            \ - 文字优先 2D DOM 覆盖（更清晰），3D 只负责空间关系。\n\n### 3. 布局与渲染安全规范（避免重叠 / 背景错误 /\
            \ 元素混乱）\n\n\n\n#### ✅ 必须遵守的根布局\n- **每个场景根节点必须是**：`<AbsoluteFill>`\n- **必须显式设置背景**：`backgroundColor`\
            \ 或 `background`（禁止依赖透明背景）\n- **建议统一**：`overflow: \"hidden\"` 防止元素跑出画面\n\
            \n\n\n推荐骨架（所有场景统一使用）：\n```tsx\nimport React from \"react\";\nimport {\
            \ AbsoluteFill, useCurrentFrame, useVideoConfig } from \"remotion\";\n\
            import { SafeArea, Subtitle } from \"../components\";\nimport { useTheme\
            \ } from \"../contexts/ThemeContext\";\n\n\n\nexport default function\
            \ Scene{scene_number}() {\n  const frame = useCurrentFrame();\n  const\
            \ { fps, width, height } = useVideoConfig();\n  const theme = useTheme();\n\
            \n\n\n  // 字幕数据（必须命名为 subtitles，使用场景相对时间，单位：秒）\n  const subtitles = [\n\
                { text: \"这是第一条字幕\", start_time_seconds: 0, end_time_seconds: 3 },\n\
                { text: \"This is the second subtitle\", start_time_seconds: 3.5,\
            \ end_time_seconds: 7 },\n  ];\n\n\n\n  return (\n    <AbsoluteFill style={{\
            \ background: \"#ffffff\", overflow: \"hidden\" }}>\n      {/* 背景层（zIndex:0，pointerEvents:none）\
            \ */}\n      <AbsoluteFill style={{ zIndex: 0, pointerEvents: \"none\"\
            \ }}>\n        {/* 背景装饰/渐变/噪声等 */}\n      </AbsoluteFill>\n\n\n\n     \
            \ {/* 主内容层（SafeArea，避免贴边；预留字幕空间） */}\n      <SafeArea padding={60} paddingBottom={160}\
            \ style={{ zIndex: 1 }}>\n        <div style={{ flex: 1, display: \"flex\"\
            , flexDirection: \"column\", gap: 32 }}>\n          {/* 主内容尽量用 flex/grid\
            \ 流式布局，减少 absolute */}\n        </div>\n      </SafeArea>\n\n\n\n     \
            \ {/* 字幕层（永远放最上层，避免被遮挡） */}\n      {subtitles.map((s, i) => (\n       \
            \ <Subtitle\n          key={i}\n          text={s.text}\n          startFrame={Math.round(s.start_time_seconds\
            \ * fps)}\n          durationInFrames={Math.round((s.end_time_seconds\
            \ - s.start_time_seconds) * fps)}\n        />\n      ))}\n    </AbsoluteFill>\n\
              );\n}\n````\n\n#### \U0001F6AB 防重叠硬规则\n\n- **主内容不要用 `position: absolute`**（除非是明确的标注/强调层），优先用\
            \ `flex`/`grid`。\n- 需要叠层时必须设定 **`zIndex` 分层约定**：背景 0、内容 1、强调层 2、字幕 999。\n\
            - 所有卡片/图表必须有 **明确尺寸约束**：`maxWidth` / `width` / `height`，不要让内容自然溢出。\n-\
            \ 任何会动的元素（粒子/3D/噪声）都放在 **背景层** 并 `pointerEvents: \"none\"`。\n\n#### \U0001F3A8\
            \ 背景错误规避\n\n- 每个场景 **必须**设置 `background` 或 `backgroundColor`。\n- 禁止使用纯黑\
            \ `#000` 作为默认背景（除非视觉概念明确要求）。\n- 渐变背景优先使用 `linear-gradient(...)` 并提供兜底纯色。\n\
            \n#### \U0001F441️ 可读性与对比度兜底（必须，避免白底白字）\n\n- **硬规则**：任何大段文字都必须在\"纯色/弱纹理/有遮罩\"\
            的区域上显示。\n- **Scrim 兜底**：当背景可能偏亮或复杂时，必须在文字背后加一层半透明遮罩（例如 `rgba(0,0,0,0.35)`\
            \ 或 `rgba(255,255,255,0.55)`，按主题反向选择）。\n- **阴影/描边兜底**：标题/关键字必须加 `textShadow`\
            \ 或描边风格，确保缩放后仍可读。\n- **字幕带保护**：字幕区域（底部 160px）背景必须更\"干净\"（降低背景对比度/加渐变遮罩），禁止把高频噪声/粒子直接铺满字幕底。\n\
            \n#### \U0001F9FE 字幕输出结构（必须严格遵守）\n\n**⚠️ 重要：后端静态提取器只能识别字面量值，无法执行 JavaScript\
            \ 代码**\n\n字幕必须采用**数据与渲染分离**的模式：先定义 `subtitles` 数组，再用 `.map()` 渲染。\n\n\
            **唯一正确格式：**\n\n```tsx\n// 1. 字幕数据定义（必须在组件函数内、return 之前）\nconst subtitles\
            \ = [\n  {\n    text: \"First subtitle content\",\n    start_time_seconds:\
            \ 0,\n    end_time_seconds: 3,\n  },\n  { text: \"第二条字幕内容\", start_time_seconds:\
            \ 3.5, end_time_seconds: 7 },\n  { text: \"المحتوى الثالث\", start_time_seconds:\
            \ 7.5, end_time_seconds: 11 },\n];\n\n// 2. 在 JSX 中渲染（在 return 内）\n{\n\
            \  subtitles.map((s, i) => (\n    <Subtitle\n      key={i}\n      text={s.text}\n\
            \      startFrame={Math.round(s.start_time_seconds * fps)}\n      durationInFrames={Math.round(\n\
            \        (s.end_time_seconds - s.start_time_seconds) * fps\n      )}\n\
            \    />\n  ));\n}\n```\n\n**硬性规则**：\n| 属性 | 必须是 | 示例 |\n|------|--------|------|\n\
            | `text` | 字面量字符串 | `text: \"字幕文字\"` |\n| `start_time_seconds` | 字面量数字（秒）\
            \ | `start_time_seconds: 0` |\n| `end_time_seconds` | 字面量数字（秒） | `end_time_seconds:\
            \ 3` |\n\n**关键要求**：\n\n- 数组变量**必须命名为 `subtitles`**（提取器依赖此名称）\n- `text`\
            \ 必须是字面量字符串，不能是变量引用\n- 时间单位是**秒**，不是帧数\n- 使用场景的相对时间（从 0 开始），不是全片绝对时间\n\
            \n**绝对禁止**（会导致字幕提取失败）：\n\n```tsx\n// ❌ 禁止：text 使用变量引用\nconst content =\
            \ \"字幕内容\";\nconst subtitles = [{ text: content, ... }];\n\n\n\n// ❌ 禁止：数组名不是\
            \ subtitles\nconst captions = [{ text: \"...\", ... }];\n\n\n\n// ❌ 禁止：时间使用表达式\n\
            const subtitles = [{ text: \"...\", start_time_seconds: startTime + 1,\
            \ ... }];\n\n\n\n// ❌ 禁止：直接写 <Subtitle> 不用数组\n<Subtitle text=\"...\" startFrame={0}\
            \ durationInFrames={90} />\n```\n\n**时间换算指南**：\n\n1. 输入 JSON 的字幕时间是全片绝对秒（`start_time_seconds`/`end_time_seconds`）\n\
            2. 计算本场景起始秒：`sceneStartSeconds = Math.min(...currentScene.subtitles.map(s\
            \ => s.start_time_seconds))`（以本场景字幕中最早开始时间为准；`timeline_events` 为可选参考，不参与该计算）\n\
            3. 对每条字幕计算场景相对时间：\n         - `relativeStart = subtitle.start_time_seconds\
            \ - sceneStartSeconds`\n         - `relativeEnd = subtitle.end_time_seconds\
            \ - sceneStartSeconds`\n4. **直接写计算后的秒数**，例如 `start_time_seconds: 0, end_time_seconds:\
            \ 3`\n\n**防重叠规则**：\n\n- 不要让两条字幕在时间上重叠；若存在重叠，后者 `start_time_seconds` 至少比前者\
            \ `end_time_seconds` 多 0.1 秒\n- 没有字幕就不要定义 `subtitles` 数组\n\n#### \U0001F5BC\
            ️ 图片/素材加载（云端稳定性关键）\n\n- **强烈推荐（长期方案）**：管理平台在上传到 E2B 之前，先把远程图片/视频**下载落盘**到项目的\
            \ `public/` 或 `src/assets/`，scene 里只引用本地资源。\n- **现阶段允许使用 `http://` 资源**（你们当前资源就是这一类），但要意识到：E2B\
            \ 预览通常走 HTTPS 反代，浏览器可能会阻止 HTTPS 页面加载 HTTP 图片（Mixed Content），导致加载失败。\n\
            \      - 若发现加载失败：优先让管理平台做\"HTTP→HTTPS 可用性探测 + 代理/落盘\"，而不是让 scene 直接依赖外网。\n\
            - **现阶段允许使用短时效签名 URL**（带 `timestamp/nonce/sign` 这类），但必须假设它可能在播放中途过期 /\
            \ 云端网络不可达。\n- **强制要求（短期兜底）**：无论远程图是否能加载成功，代码都**不允许因为图片加载失败而崩溃/取消渲染**，必须有失败兜底（例如显示占位、跳过该图片）。\n\
            - **强制要求（语义占位）**：所有图片组件必须提供可读语义（至少一个）：`alt` / `title` / `aria-label` /\
            \ `data-caption`。\n      - 目的：当图片加载失败时，模板会渲染\"主题配色的默认占位图\"，并把这些语义文案显示在占位卡片上，让画面依然像\"\
            成片\"。\n- 如果必须用远程 URL：\n      - 优先 HTTPS（能用就用）；\n      - 避免依赖 Referer/Cookie（云端更容易被防盗链拦）；\n\
            \      - 所有远程图片必须具备失败兜底。\n\n---\n\n---\n\n## ⚡ Remotion Patterns (动画技能库)\n\
            \n请优先使用以下经过验证的动画模式，它们是 Remotion 官方推荐的写法：\n\n### 1. 弹入效果 (Pop In)\n\n```tsx\n\
            const frame = useCurrentFrame();\nconst scale = spring({\n  frame,\n \
            \ fps,\n  config: { damping: 200 },\n});\n<div style={{ transform: `scale(${scale})`\
            \ }}>Hello</div>;\n```\n\n### 2. 淡入上浮 (Fade Up)\n\n```tsx\nconst frame\
            \ = useCurrentFrame();\nconst opacity = interpolate(frame, [0, 30], [0,\
            \ 1], {\n  extrapolateRight: \"clamp\",\n});\nconst translateY = interpolate(frame,\
            \ [0, 30], [20, 0], {\n  extrapolateRight: \"clamp\",\n});\n<div style={{\
            \ opacity, transform: `translateY(${translateY}px)` }}>Hello</div>;\n\
            ```\n\n### 3. 打字机效果 (Typewriter)\n\n```tsx\nconst text = \"Hello World\"\
            ;\nconst frame = useCurrentFrame();\n// 每2帧出一个字\nconst charsShown = Math.floor(frame\
            \ / 2);\nconst textToShow = text.slice(0, charsShown);\n<div style={{\
            \ fontFamily: theme.fonts.mono }}>{textToShow}</div>;\n```\n\n### 4. 聚光灯扫描\
            \ (Spotlight Scan)\n\n```tsx\nconst frame = useCurrentFrame();\n// 光效位置从左滑到右\n\
            const left = interpolate(frame, [0, 60], [-100, 200], {\n  extrapolateRight:\
            \ \"clamp\",\n});\n<div\n  style={{\n    background: `linear-gradient(90deg,\
            \ transparent, rgba(255,255,255,0.8), transparent)`,\n    left: `${left}%`,\n\
            \    position: \"absolute\",\n  }}\n/>;\n```\n\n---\n\n### 3. 可用技术栈（教学视频专用）\n\
            \n#### \U0001F4CA 数据可视化\n\n```tsx\n// Recharts - React 图表库（推荐教学视频）\n//\
            \ Remotion 中：固定尺寸（禁止 ResponsiveContainer），Bar/Line/Area/Pie 须 isAnimationActive={false}\
            \ + animationDuration={0}，动画由 useCurrentFrame() 驱动\nimport {\n  BarChart,\n\
            \  Bar,\n  LineChart,\n  Line,\n  PieChart,\n  Pie,\n  AreaChart,\n  Area,\n\
            \  RadarChart,\n  Radar,\n  ScatterChart,\n  Scatter,\n  XAxis,\n  YAxis,\n\
            \  CartesianGrid,\n  Tooltip,\n  Legend,\n} from \"recharts\";\n\n// D3.js\
            \ - 高级数据可视化\nimport * as d3 from \"d3\";\nimport * as d3Cloud from \"\
            d3-cloud\"; // 词云\nimport * as d3Sankey from \"d3-sankey\"; // 桑基图\n\n\
            // Chart.js + React Chart.js 2（模板已内置）\n// Remotion 中：须 options={{ animation:\
            \ false }} 或 animation: { duration: 0 }，动画由 useCurrentFrame() 驱动；容器固定尺寸\n\
            import {\n  Chart as ChartJS,\n  CategoryScale,\n  LinearScale,\n  PointElement,\n\
            \  LineElement,\n  Tooltip,\n  Legend,\n} from \"chart.js\";\nimport {\
            \ Line } from \"react-chartjs-2\";\n\nChartJS.register(\n  CategoryScale,\n\
            \  LinearScale,\n  PointElement,\n  LineElement,\n  Tooltip,\n  Legend\n\
            );\n\n// @visx - Airbnb 可视化库（SVG 动画友好）\n// 推荐按子包引入（更准确）\nimport { Bar\
            \ } from \"@visx/shape\";\nimport { scaleBand, scaleLinear } from \"@visx/scale\"\
            ;\n```\n\n#### \U0001F3AC 动画与过渡\n\n```tsx\n// Remotion 内置（核心）\nimport\
            \ {\n  interpolate,\n  spring,\n  useCurrentFrame,\n  useVideoConfig,\n\
            \  Sequence,\n} from \"remotion\";\n\n// Remotion 官方动画库（推荐教学视频）\nimport\
            \ { TransitionSeries, fade, slide, wipe } from \"@remotion/transitions\"\
            ;\nimport { MotionBlur } from \"@remotion/motion-blur\";\n\n// 资源预加载（避免首帧白屏/闪烁）\n\
            import { preloadImage, preloadVideo } from \"@remotion/preload\";\n\n\
            // 字幕/字幕轨（适合教学视频）\nimport { createTikTokStyleCaptions } from \"@remotion/captions\"\
            ;\n\n// Framer Motion - 流畅动画\nimport { motion } from \"framer-motion\"\
            ;\n\n// React Spring - 物理动画\nimport { useSpring, animated } from \"react-spring\"\
            ;\n\n// GSAP - 专业级动画（模板已内置）\nimport gsap from \"gsap\";\n\n// animejs\
            \ - 轻量级动画（模板已内置）\nimport anime from \"animejs\";\n\n// Lottie - After\
            \ Effects 动画\nimport { Lottie } from \"@remotion/lottie\";\n```\n\n####\
            \ \U0001F3A8 矢量图形与绘制\n\n```tsx\n// @remotion/shapes - 官方形状库（模板已内置）\nimport\
            \ { Circle, Rect, Triangle, Polygon, Star } from \"@remotion/shapes\"\
            ;\n\n// ⚠️ Star 组件 API（必须遵守，否则会导致运行时错误）\n// ✅ 正确用法：\n<Star\n  points={5}\n\
            \  outerRadius={100} // ✅ 必须使用 outerRadius\n  innerRadius={40}\n  fill=\"\
            #FFD700\"\n/>;\n\n// ❌ 错误用法（会导致 \"Malformed path data\" 错误）：\n// <Star\
            \ points={5} radius={100} innerRadius={40} />  // radius 属性不存在！\n\n//\
            \ @remotion/paths - SVG 路径动画（模板已内置）\nimport { evolvePath } from \"@remotion/paths\"\
            ;\n\n// @remotion/skia - 高性能 2D 绘制（模板已内置）\nimport { Skia, Canvas } from\
            \ \"@remotion/skia\";\n\n// React Konva - Canvas 绘图（模板已内置）\nimport { Stage,\
            \ Layer, Rect, Circle } from \"react-konva\";\n```\n\n#### \U0001F310\
            \ 3D 场景\n\n**Remotion 官方 3D 规范（须与官网一致）**\n\n- [3D 规则 3d.md](https://github.com/remotion-dev/remotion/blob/main/packages/skills/skills/remotion/rules/3d.md)：3D\
            \ 内容必须包在具备 **width/height** 的画布内；**不得使用非 useCurrentFrame 驱动的动画**；**禁止使用\
            \ `useFrame()` 做动画**（会导致渲染闪烁）。动画必须用 `useCurrentFrame()` 完成。\n- [&lt;ThreeCanvas&gt;\
            \ 文档](https://www.remotion.dev/docs/three-canvas)：画布与 `useCurrentFrame()`\
            \ 同步；须传 width/height；动画须**完全声明式**，用 `useCurrentFrame` 计算 rotation/scale/position\
            \ 等。\n\n**本模板约定**：使用 **FullCanvas**（来自 `../components`），等价于官方 ThreeCanvas（内部已用\
            \ `useVideoConfig()` 提供尺寸并与 useCurrentFrame 同步）。**禁止**使用 R3F 的 `<Canvas>`。\
            \  \n**你必须遵守**：（1）用 **FullCanvas** 包裹所有 3D 内容并设置 camera。（2）**所有动画**（旋转、位移、缩放、颜色）一律用\
            \ **`useCurrentFrame()` + `interpolate()`** 在 JSX 中写，例如 `rotation={[0,\
            \ frame * 0.02, 0]}`、`scale={interpolate(Math.sin(frame/10), [-1,1], [0.8,1.2])}`；**不得用\
            \ useFrame() 驱动动画**。（3）若 3D 内使用 **`<Sequence>`**，必须设置 **`layout=\"none\"\
            `**（[官方](https://www.remotion.dev/docs/three-canvas)：Sequence 默认是 div，不能放在\
            \ 3D 画布内）。（4）仅在非动画用途（如仅改相机 ref）时可在 FullCanvas 子组件内有限使用 useFrame，且 **useFrame\
            \ 内禁止 setState**。  \nThree.js API 以 [Three.js 文档](https://threejs.org/docs)\
            \ 为准（如 [CatmullRomCurve3](https://threejs.org/docs/#api/en/extras/curves/CatmullRomCurve3)）。\n\
            \n```tsx\n// ⚠️ 重要：在 Remotion 中使用 React Three Fiber 时，必须使用 `FullCanvas`\
            \ 而不是 `Canvas`。\n// 这是模板项目的硬性要求，违反会导致场景渲染错误。\n// FullCanvas 内部使用 useVideoConfig()\
            \ 自动设置正确的 Canvas 尺寸，确保在 Remotion Studio 预览和实际渲染中都能正常工作。\n\n// ❌ 错误示例（会导致运行时警告）\n\
            // import { Canvas } from '@react-three/fiber';\n// <Canvas camera={{\
            \ position: [0, 0, 10], fov: 45 }}>\n\n// ✅ 正确示例（必须使用）\nimport { FullCanvas\
            \ } from \"../components\";\nimport {\n  Box,\n  Sphere,\n  Cone,\n  Torus,\n\
            \  OrbitControls,\n  PerspectiveCamera,\n  Environment,\n  Center,\n \
            \ Text3D,\n  MeshTransmissionMaterial,\n} from \"@react-three/drei\";\n\
            import * as THREE from \"three\";\n\n// 使用示例（动画用 frame + interpolate，与\
            \ Remotion 官方 three-canvas 一致）\nconst frame = useCurrentFrame();\n<FullCanvas\
            \ camera={{ position: [0, 0, 10], fov: 45 }}>\n  <ambientLight intensity={0.4}\
            \ />\n  <directionalLight position={[5, 5, 5]} intensity={0.8} />\n  <mesh\
            \ rotation={[0, frame * 0.02, 0]} scale={interpolate(Math.sin(frame/10),\
            \ [-1, 1], [0.8, 1.2])}>\n    <boxGeometry args={[2, 2, 2]} />\n    <meshStandardMaterial\
            \ color=\"#4a9eff\" />\n  </mesh>\n</FullCanvas>\n\n// 若在 FullCanvas 内使用\
            \ <Sequence>，必须 layout=\"none\"（官方要求）\n<FullCanvas><Sequence from={0}\
            \ durationInFrames={30} layout=\"none\"><mesh>...</mesh></Sequence></FullCanvas>\n\
            \n// @react-three/cannon - 物理引擎\nimport { Physics, useBox, useSphere }\
            \ from \"@react-three/cannon\";\n\n// ⚠️ 物理引擎使用规范（防御性编程）\n// 物理引擎中的物体属性可能未初始化，必须进行空值检查\n\
            \n// ❌ 错误用法（会导致 \"Cannot read properties of undefined\" 错误）：\n// particles.forEach(p\
            \ => { p.velocity.x = 0; });  // velocity 可能是 undefined\n\n// ✅ 正确用法（使用可选链和空值合并）：\n\
            // particles.forEach(p => {\n//   const vel = p.velocity ?? { x: 0, y:\
            \ 0, z: 0 };\n//   // 或者使用可选链\n//   const vx = p.velocity?.x ?? 0;\n//\
            \ });\n```\n\n#### ⚠️ React Three Fiber Hook 使用规范（必须遵守）\n\n```tsx\n//\
            \ R3F 的 Hook（如 useThree, useFrame, useLoader）必须在 Canvas/FullCanvas 的子组件中调用\n\
            // 如果在 Canvas 外部调用，会导致 React error #321\n\n// ❌ 错误用法（会导致 \"Cannot destructure\
            \ property 'camera' of ... as it is null\" 或 React #321）：\nconst MyScene\
            \ = () => {\n  const { camera } = useThree(); // 错误：不在 Canvas 内部，R3F context\
            \ 为 null\n  return (\n    <FullCanvas>\n                  <mesh />   \
            \    {\" \"}\n    </FullCanvas>\n  );\n};\n\n// useFrame 内禁止调用 setState/触发\
            \ React 状态更新，否则会导致无限重渲染（React #185）。仅允许修改 ref.current 等非 React 状态。\n\n\
            // ✅ 正确用法：\nconst CameraController = () => {\n  const { camera } = useThree();\
            \ // 正确：在 FullCanvas 内部\n  return null;\n};\n```\n\n**R3F extend 与 drei\
            \ 非原生组件**：R3F 默认只识别 THREE 命名空间内的对象。[R3F 文档](https://docs.pmnd.rs/react-three-fiber/api/objects#using-3rd-party-objects-declaratively)：非\
            \ THREE 原生组件需在根处 `extend({ Float })` 等。本模板**未** extend Float，故**禁止使用 `<Float>`**，否则报错\
            \ `R3F: Float is not part of the THREE namespace!`。悬浮效果须用 **`useCurrentFrame()`\
            \ + `interpolate()`** 驱动 `<group>` 的 position/rotation（与 Remotion 官方一致，不得用\
            \ useFrame 做动画），例如：`position={[x, baseY + interpolate(frame, [0, fps*2],\
            \ [0, 1], { extrapolateRight: 'clamp' }) * amp, z]}`。\n\n**Three.js 曲线\
            \ CatmullRomCurve3（以 [官网](https://threejs.org/docs/#api/en/extras/curves/CatmullRomCurve3)\
            \ 为准）**\n\n- **用法**：`new THREE.CatmullRomCurve3(points, closed?, curveType?,\
            \ tension?)`。`points` 为 **Vector3 数组**，至少 **2 个点**；每项须为 `new THREE.Vector3(x,y,z)`\
            \ 或等价，**不得含 undefined**（否则 getPoint 会报 `reading 'x'`）。\n- **取点**：`curve.getPoint(t)`，`t`\
            \ 为 0 ～ 1。\n- **与 TubeGeometry 配合**：`new THREE.TubeGeometry(curve, tubularSegments,\
            \ radius, radialSegments)`，path 即 CatmullRomCurve3 实例。\n- **动态生成 points\
            \ 时**：用 `.filter(Boolean)` 或 `.filter(p => p != null)` 去掉 undefined，或保证\
            \ map 每项为 `new THREE.Vector3(x,y,z)`。\n\n**Drei 实例化渲染（Instances / Instance）**\
            \ [drei Instances](https://drei.pmnd.rs/?path=/story/performances-instances--instances-st)\n\
            \n- **0. 作用**：同几何体大量复用时，用 `<Instances>` + `<Instance>` 减少 draw call，保持声明式写法。\n\
            - **1. 正确用法**：`<Instances>` 的**前两个直接子元素**必须是**几何体**和**材质**原语；第三个及之后为若干\
            \ `<Instance>`。每个实例的位移/旋转用 `<Instance position={[...]} rotation={[...]}\
            \ />` 等 props 设置。\n  - ✅ 示例：`<Instances range={10}><torusGeometry args={[0.6,\
            \ 0.05, 16, 32]} /><meshStandardMaterial color=\"#888\" />{[...].map((_,\
            \ i) => <Instance key={i} position={[0, y(i), 0]} rotation={[Math.PI/2,\
            \ 0, 0]} />)}</Instances>`\n  - ✅ 几何体/材质原语：`<boxGeometry />`、`<torusGeometry\
            \ args={[...]} />`、`<sphereGeometry />`、`<meshStandardMaterial />` 等。\n\
            - **2. 错误用法**：把完整 mesh 组件（如 `<Torus>`、`<Box>`、`<Cylinder>`）作为 `<Instances>`\
            \ 的**第一或第二**子元素。内部会依赖子元素的 geometry，mesh 组件无法满足，导致 geometry 为 null、实例化渲染失败（运行时报错）。\n\
            \  - ❌ 错误示例：`<Instances><Torus args={[...]}><meshStandardMaterial /></Torus><Instance\
            \ ... /></Instances>`\n- **3. 注意事项**：需要圆环、立方等形状时，用对应的 **geometry 原语**（如\
            \ `<torusGeometry args={[R, r, 16, 32]} />`）加 **material**，不要用 `<Torus>`、`<Box>`\
            \ 等包装组件；实例级旋转/缩放写在 `<Instance>` 的 props 上。\n\n```tsx\nconst MyScene =\
            \ () => {\n  return (\n    <FullCanvas>\n                  <CameraController\
            \ />\n                  <mesh />       {\" \"}\n    </FullCanvas>\n  );\n\
            };\n```\n\n#### ⚠️ Drei Text 组件安全规范（防崩溃/黑屏关键）\n\n使用 `@react-three/drei`\
            \ 的 `<Text>` 或 `<Text3D>` 组件时，**必须提供有效的字体文件 URL**（如 `.woff`, `.ttf`）。\n\
            **严禁**将 CSS 字体栈（如 `\"Arial, sans-serif\"`）传给 `font` 属性，这会导致 Web Worker\
            \ 加载失败或渲染崩溃（报错 `bidiFactory is not a function` 或无限加载）。\n\n**安全策略（必须遵守）：**\n\
            \n1. **优先使用 2D DOM**：对于标题、说明文字，**永远优先**使用 `<SafeArea>` + HTML `<div>`\
            \ 覆盖在 3D 画布之上。这最清晰、最安全、支持所有 CSS 字体。\n2. **仅在必须 3D 效果时使用 `<Text>`**：如果非要用\
            \ 3D 文字，**必须**不传 `font` 属性（使用默认字体），或者确保你引用的是项目内真实存在的 `.woff` 文件路径。\n \
            \     - ❌ 错误：`<Text font={theme.fonts.heading}>`（传入了 CSS 字符串，必挂）\n    \
            \  - ✅ 安全：`<Text>`（使用默认字体）\n      - ✅ 推荐：`<Html><div style={{ fontFamily:\
            \ theme.fonts.heading }}>...</div></Html>`（使用 Drei 的 Html 组件）\n\n####\
            \ ✍️ 文本特效\n\n```tsx\n// Typed.js - 打字机效果（已安装）\nimport Typed from \"typed.js\"\
            ;\n\n// Prism.js - 代码高亮（已安装）\nimport Prism from \"prismjs\";\n// 注意：不要在场景里\
            \ import 外部 CSS（保持渲染环境可控）。需要高亮时，使用 Prism 生成 HTML + 内联样式，或复用项目内现有的代码展示组件。\n\
            \n// 字体：不要在 scene 里使用 @remotion/google-fonts/*。\n// 原因：字体子模块名很容易被\"猜错\"\
            （例如 FredokaOne 不存在）导致 bundling 直接失败；\n// 同时 Google Fonts 可能引入 delayRender\
            \ 超时风险。\n// 统一使用 theme.fonts.heading/body/mono 或系统字体栈即可。\n```\n\n####\
            \ \U0001F39E️ 媒体与特效\n\n```tsx\n// @remotion/gif - GIF 渲染（模板已内置）\nimport\
            \ { Gif } from \"@remotion/gif\";\n\n// @remotion/noise - 噪声效果（模板已内置）\n\
            import { noise2D } from \"@remotion/noise\";\n\n// @remotion/media-utils\
            \ - 音视频工具（已安装）\nimport { getVideoMetadata, getAudioDuration } from \"\
            @remotion/media-utils\";\n```\n\n#### \U0001F3AF UI 组件与工具\n\n```tsx\n\
            // ❌ 禁止：不要直接导入 lucide-react（任何图标都不允许）\n// import { Play, Pause, ... }\
            \ from 'lucide-react'; // 这是错误的！\n\n// ✅ 正确：使用 SafeIcon 组件（见下方说明）\n\n\
            // TailwindCSS 工具（已安装 clsx + tailwind-merge）\nimport clsx from \"clsx\"\
            ;\nimport { twMerge } from \"tailwind-merge\";\n\nconst cn = (...inputs:\
            \ Array<string | undefined | null | false>) =>\n  twMerge(clsx(inputs));\n\
            ```\n\n#### \U0001F4D0 布局工具\n\n```tsx\n// @remotion/layout-utils - 布局辅助（模板已内置）\n\
            import { measureText, fitText } from \"@remotion/layout-utils\";\n```\n\
            \n#### \U0001F4DD 基础组件（项目自带的场景基础用途组件）\n\n```tsx\nimport { Subtitle, SafeArea,\
            \ SafeIcon, FullCanvas } from \"../components\";\n```\n\n- `Subtitle`:\
            \ 字幕（内部按 `startFrame`/`durationInFrames` 自行控制显隐）\n- `SafeArea`: 安全边距容器（避免贴边/被裁切），默认\
            \ padding=60\n- `SafeIcon`: 安全图标组件（带白名单 + 兜底渲染，避免运行时报错）\n      - **硬性要求**：所有图标必须使用\
            \ `SafeIcon`，禁止直接导入 `lucide-react`\n      - 白名单图标：`play`、`pause`、`download`、`arrowRight`、`chevronRight`、`zap`、`lightbulb`、`bookOpen`、`graduationCap`\n\
            \      - 使用示例：`<SafeIcon name=\"arrowRight\" size={32} color=\"#ffffff\"\
            \ />`\n      - 如果需要的图标不在白名单中，使用 SVG 或 `@remotion/shapes` 替代\n\n---\n\n\
            ## \U0001F4D0 场景模板\n\n### 模板 1：图表场景\n\n```tsx\nimport React from \"react\"\
            ;\nimport {\n  AbsoluteFill,\n  useCurrentFrame,\n  interpolate,\n  useVideoConfig,\n\
