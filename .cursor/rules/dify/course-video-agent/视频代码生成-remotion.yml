            \ 模板 4：D3 自定义可视化\n\n```tsx\nimport React, { useMemo } from \"react\";\n\
            import { AbsoluteFill, useCurrentFrame, interpolate } from \"remotion\"\
            ;\nimport * as d3 from \"d3\";\n\nexport default function Scene4() {\n\
            \  const frame = useCurrentFrame(); // D3 力导向布局（useMemo 避免重复计算）\n  const\
            \ graph = useMemo(() => {\n    const nodes = [\n      { id: \"A\", value:\
            \ 10 },\n      { id: \"B\", value: 20 },\n      { id: \"C\", value: 15\
            \ },\n    ];\n    const links = [\n      { source: \"A\", target: \"B\"\
            \ },\n      { source: \"B\", target: \"C\" },\n    ];\n    const simulation\
            \ = d3\n      .forceSimulation(nodes as any)\n      .force(\n        \"\
            link\",\n        d3\n          .forceLink(links)\n          .id((d: any)\
            \ => d.id)\n          .distance(150)\n      )\n      .force(\"charge\"\
            , d3.forceManyBody().strength(-300))\n      .force(\"center\", d3.forceCenter(960,\
            \ 540))\n      .stop(); // 运行 300 次迭代\n    for (let i = 0; i < 300; i++)\
            \ simulation.tick();\n    return { nodes, links };\n  }, []); // 淡入动画\n\
            \  const opacity = interpolate(frame, [0, 30], [0, 1], {\n    extrapolateRight:\
            \ \"clamp\",\n  });\n  return (\n    <AbsoluteFill style={{ background:\
            \ \"#0a0a0a\" }}>\n                       {\" \"}\n      <svg width={1920}\
            \ height={1080}>\n                        {/* 连线 */}               {\"\
            \ \"}\n        {graph.links.map((link: any, i) => (\n          <line\n\
            \            key={i}\n            x1={link.source.x}\n            y1={link.source.y}\n\
            \            x2={link.target.x}\n            y2={link.target.y}\n    \
            \        stroke=\"rgba(0,200,150,0.3)\"\n            strokeWidth={2}\n\
            \            opacity={opacity}\n          />\n        ))}\n           \
            \                     {/* 节点 */}                {graph.nodes.map(\n  \
            \        (node: any) => (\n            <g key={node.id} opacity={opacity}>\n\
            \                                                 {\" \"}\n          \
            \    <circle\n                cx={node.x}\n                cy={node.y}\n\
            \                r={node.value * 2}\n                fill=\"#00C896\"\n\
            \                stroke=\"white\"\n                strokeWidth={2}\n \
            \             />\n                                                  <text\n\
            \                x={node.x}\n                y={node.y + 5}\n        \
            \        textAnchor=\"middle\"\n                fill=\"white\"\n     \
            \           fontSize={16}\n              >\n                         \
            \                   {node.id}                     \n                 {\"\
            \ \"}\n              </text>                               {\" \"}\n \
            \           </g>\n          )\n        )}                   {\" \"}\n\
            \      </svg>\n                   {\" \"}\n    </AbsoluteFill>\n  );\n\
            }\n```\n\n---\n\n## \U0001F3AF 代码生成规范\n\n### 1. 文件结构\n\n```tsx\nimport\
            \ React from \"react\";\nimport { AbsoluteFill, useCurrentFrame, interpolate\
            \ } from \"remotion\";\nimport { SafeArea, Subtitle } from \"../components\"\
            ;\nimport { useTheme } from \"../contexts/ThemeContext\";\n\n\n\n/**\n\
             * Scene {scene_number}: {visual_concept}\n * Duration: {duration}s\n\
             */\nexport default function Scene{scene_number}() {\n  const frame =\
            \ useCurrentFrame();\n  const theme = useTheme();\n \n  // 动画逻辑\n \n \
            \ return (\n    <AbsoluteFill style={{ background: '...' }}>\n      {/*\
            \ 场景内容 */}\n     \n      {/* 字幕：必须用 const subtitles = [...] + .map() 渲染\
            \ */}\n      {subtitles.map((s, i) => (\n        <Subtitle key={i} text={s.text}\
            \ startFrame={Math.round(s.start_time_seconds * fps)} durationInFrames={Math.round((s.end_time_seconds\
            \ - s.start_time_seconds) * fps)} />\n      ))}\n    </AbsoluteFill>\n\
              );\n}\n```\n\n### 2. 动画规范\n\n#### ✅ 防空走（节奏落地规则）\n\n- **字幕驱动事件**：每条字幕对应至少一个\"\
            可见变化\"（高亮/下划线/指示箭头/卡片切换/图表生长/镜头轻推）。\n- **禁止静态 hold**：除非明确是\"停顿强调\"，否则不要让画面完全静止超过\
            \ ~2 秒；至少保持一个很轻的确定性运动（例如背景微漂移、呼吸缩放、光晕扫过）。\n- **尾段收束**：如果字幕结束但场景仍有剩余时长，必须添加总结/回顾/要点卡的收束动画，而不是空走。\n\
            \n- 使用 `useCurrentFrame()` 获取当前帧\n\n- 使用 `interpolate()` 创建数值动画（[官方 API](https://www.remotion.dev/docs/interpolate)：四参数\
            \ input, inputRange, outputRange, options；outputRange 仅允许数字）\n- 使用 `spring()`\
            \ 创建物理动画（弹簧效果）\n- **关键**：`interpolate()` 的 `inputRange` **必须严格单调递增**（例如\
            \ `[0, height]`）；反向效果只改 `outputRange`（如 `[45, 0]`），**不要**写 `[height, 0]`，否则报错：`inputRange\
            \ must be strictly monotonically increasing`。\n- **关键**：`inputRange` 与\
            \ `outputRange` **长度必须一致**（官方示例：`[0, 20, durationInFrames-20, durationInFrames]`\
            \ 配 `[0, 1, 1, 0]`）。若不一致会报错：`inputRange (2) and outputRange (3) must have\
            \ the same length`。先淡入再淡出须多点对应，如 `interpolate(progress, [0.4, 0.5, 0.6],\
            \ [0, 1, 0])`；❌ 错误：`interpolate(progress, [0.4, 0.6], [0, 1, 0])`。\n-\
            \ **关键**：`interpolate(..., { easing })` 的 `easing` **必须是函数**（官方默认 `(x)\
            \ => x`），见 [Easing 文档](https://www.remotion.dev/docs/easing)\n\n- ✅ 正确：`easing:\
            \ Easing.out(Easing.cubic)`（先 `import { Easing } from \"remotion\"`）\n\
            \    - ❌ 错误：`easing: spring(...)`（`spring()` 返回的是数值，不是函数，会直接报 `easing\
            \ is not a function`）\n    - ❌ 错误：`easing: Easing.out(Easing.expo)`（`Easing.expo`\
            \ **不存在**，会导致 `easing is not a function`；正确写法是 `Easing.exp`）\n    - ❌\
            \ 错误：`easing: Easing.inOut(Easing.sine)`（`Easing.sine` **不存在**，会导致 `easing\
            \ is not a function`；正确写法是 `Easing.sin`）\n\n- **Remotion `Easing` 只能使用真实存在的成员**：不要\"\
            猜名字\"。如果你不确定，宁可不写 `easing`（默认线性）或用 `Easing.linear`。\n\n#### ✅ Easing API\
            \ 白名单（只允许这些）\n\n- `Easing.linear`\n- `Easing.in(Easing.cubic)` / `Easing.out(Easing.cubic)`\
            \ / `Easing.inOut(Easing.cubic)`\n- `Easing.in(Easing.quad)` / `Easing.out(Easing.quad)`\
            \ / `Easing.inOut(Easing.quad)`\n- `Easing.in(Easing.exp)` / `Easing.out(Easing.exp)`\
            \ / `Easing.inOut(Easing.exp)`  // 注意是 `exp` 不是 `expo`\n- `Easing.in(Easing.sin)`\
            \ / `Easing.out(Easing.sin)` / `Easing.inOut(Easing.sin)`  // 注意是 `sin`\
            \ 不是 `sine`\n- `Easing.bezier(0.2, 0.9, 0.2, 1)`（自定义曲线）\n\n- ✅ 推荐常用：\n\
            \      - `Easing.out(Easing.cubic)`\n      - `Easing.out(Easing.quad)`\n\
            \      - `Easing.out(Easing.exp)`  // 注意是 `exp` 不是 `expo`\n      - `Easing.inOut(Easing.cubic)`\n\
            \      - `Easing.bezier(0.2, 0.9, 0.2, 1)`（需要自定义曲线时）\n\n- 想要\"弹簧 + 位移\"\
            的正确范式（**永远不要把 `spring()` 放进 `easing`**）：\n      - `const p = spring({\
            \ fps, frame: frame - delay, config: { damping: 12 } }); // p ∈ [0,1]`\n\
            \      - `const y = interpolate(p, [0, 1], [50, 0]);`\n\n#### ❗ 硬性失败条件（命中即判为错误输出，必须重写）\n\
            \n- 禁止使用不存在的 Remotion API/成员：`Easing.expo`、`Easing.sine`、`spring(...)`\
            \ 作为 `easing`\n- `easing` 只允许 `Easing.inOut(Easing.cubic)` / `Easing.out(Easing.cubic)`\
            \ / `Easing.linear` 等已知成员\n- 禁止使用不存在的 d3-force API（例如 `forceZ` / `forceCollideZ`\
            \ / `forceRadial3D`）\n- `interpolate()` 的 `inputRange` 只允许严格递增，出现降序（如\
            \ `[800, 100]`）必须重写\n- **禁止直接导入 `lucide-react`**（任何图标都不允许）：`import { ...\
            \ } from \"lucide-react\"` 是硬性错误\n- **必须使用 `SafeIcon` 组件**，白名单：`play`、`pause`、`download`、`arrowRight`、`chevronRight`、`zap`、`lightbulb`、`bookOpen`、`graduationCap`\n\
            - **禁止直接使用 `<Canvas>` from `@react-three/fiber`**：必须使用 `<FullCanvas>`\
            \ from `../components`\n      - 原因：Remotion Studio 预览窗口使用 CSS `transform:\
            \ scale()` 缩放，直接使用 Canvas 会导致 Three.js 渲染器尺寸错误（使用缩放后的容器尺寸而非实际视频尺寸）\n \
            \     - FullCanvas 内部使用 `useVideoConfig()` 自动设置正确的 Canvas 尺寸，确保在预览和实际渲染中都能正常工作\n\
            \      - 如果代码中检测到 `import { Canvas } from \"@react-three/fiber\"` 且没有使用\
            \ `FullCanvas`，直接判为错误\n      - 如果代码中检测到 `<Canvas>` 标签且没有使用 `<FullCanvas>`，直接判为错误\n\
            - **`@remotion/shapes` Star 组件必须使用 `outerRadius`**：\n      - ✅ 正确：`<Star\
            \ points={5} outerRadius={100} innerRadius={40} />`\n      - ❌ 错误：`<Star\
            \ points={5} radius={100} innerRadius={40} />`（`radius` 属性不存在，会导致 \"Malformed\
            \ path data: M was expected to have numbers afterwards\" 错误）\n\n#### ✅\
            \ d3-force 允许白名单（仅允许这些）\n\n- `forceSimulation` / `forceCenter` / `forceManyBody`\
            \ / `forceCollide`\n- `forceLink` / `forceX` / `forceY` / `forceRadial`\n\
            \n#### ✅ 不确定 API 回退规则（必须执行）\n\n- 只要不确定某 API 是否存在，必须回退为\"静态布局 / 无动画\"版本\n\
            - 宁可删除该效果，也不要输出不确定 API\n\n#### ✅ 反向动画唯一正确写法（必须遵守）\n\n- 反向效果只能通过反转 `outputRange`\
            \ 实现，`inputRange` 仍保持递增\n  - ✅ `inputRange: [0, 1]`, `outputRange: [800,\
            \ 100]`\n  - ❌ `inputRange: [800, 100]`\n- **inputRange 数组必须按数值升序排列**，与「输入变量随时间先增后减还是先减后增」无关。若输入变量从\
            \ 1 变到 0.5、希望输出从 1 变到 0.95，应写 `interpolate(x, [0.5, 1], [0.95, 1])`（inputRange\
            \ 写 [0.5, 1] 升序）；❌ 错误：`interpolate(x, [1, 0.5], [1, 0.95])`（[1, 0.5] 降序会报\
            \ `inputRange must be strictly monotonically increasing`）。\n\n#### ✅ interpolate\
            \ 安全模板（只允许这一种写法）\n\n**Remotion 插值（interpolate / interpolateColors）**\n\
            \n- **0. 作用**：用数值驱动动画/布局（位置、透明度、缩放等），根据输入帧或进度在一段区间内平滑映射到另一段数值区间；颜色过渡用\
            \ `interpolateColors`。\n- **1. 正确用法**：`interpolate()` 的 `outputRange`\
            \ **只能是数字数组**（如 `[0, 1]`、`[10, 40]`、`[0.8, 1, 0.8]`），用于位置/透明度/缩放等数值；颜色过渡统一用\
            \ `interpolateColors(progress, [0, 1], [theme.colors.a, theme.colors.b])`\
            \ 或先插一个 0~1 的数再自己算颜色/阈值切换。\n- **2. 错误用法**：在 `outputRange` 中放入任意**字符串或颜色**（如\
            \ `theme.colors.xxx`、`\"10px\"`、`\"rgba(...)\"`），会触发 `outputRange must\
            \ contain only numbers`；或者 `inputRange` 长度与 `outputRange` 不一致、`inputRange`\
            \ 写成降序 `[1, 0.5]`。\n- **3. 注意事项**：`inputRange` 必须严格单调递增，长度与 `outputRange`\
            \ 一一对应；输入可能超出范围时用 `extrapolateLeft/Right: 'clamp'`；需要字符串输出（如 `\"0px\"\
            `）时，先用 `interpolate` 得到数字，再在 JSX 里拼接。\n\n**API 概览（[官方文档](https://www.remotion.dev/docs/interpolate)）**：`interpolate(input,\
            \ inputRange, outputRange, options?)` 共 4 个参数：(1) 输入值；(2) 输入取值范围（数组，须严格单调递增）；(3)\
            \ 输出取值范围（数组，**仅允许数字**，长度与 inputRange 一致）；(4) 可选配置：`extrapolateLeft` /\
            \ `extrapolateRight`（默认 `'extend'`，可设为 `'clamp'` 限制在 output 范围内）、`easing`（默认\
            \ `(x) => x` 线性，须为函数，见 [Easing](https://www.remotion.dev/docs/easing)）。\n\
            \n- **两点线性插值**：建议把输入归一化成 `t ∈ [0, 1]`，`inputRange` 用 `[0, 1]`。**多点插值**（如「先淡入再淡出」）：inputRange\
            \ 用具体进度点，如 `[0.4, 0.5, 0.6]` 或按帧 `[0, 20, durationInFrames - 20, durationInFrames]`，与\
            \ outputRange 一一对应（官方示例：`[0, 1, 1, 0]`）。\n- **inputRange 与 outputRange\
            \ 长度必须一致**（2 对 2、4 对 4，不能 2 对 3）。Remotion 要求每个 output 都有唯一对应的 input 点。\n\
            - **inputRange 必须严格单调递增**（数组数值升序）。反向效果只能改 `outputRange`（如 `[1, 0]`），禁止把\
            \ inputRange 写成降序。\n- `outputRange` **必须只包含数字**（官方 API：output 为数值映射）。❌\
            \ 禁止：`[\"0px\", \"100px\"]`、任何颜色或字符串。\n- ❌ **禁止在 interpolate() 的 outputRange\
            \ 中使用颜色或任何字符串**：会报 `outputRange must contain only numbers`。颜色过渡请用 **interpolateColors()**（[文档](https://www.remotion.dev/docs/interpolate-colors)），例如\
            \ `interpolateColors(progress, [0, 1], [theme.colors.a, theme.colors.b])`。\n\
            - 需要字符串（如 `\"0px\"`）时：先 `interpolate` 得到数字，再在 JSX 中拼接 `${y}px`。\n- **防止输出超出范围**：输入可能超出\
            \ inputRange 时，使用 `extrapolateRight: 'clamp'` / `extrapolateLeft: 'clamp'`（[官方示例](https://www.remotion.dev/docs/interpolate)）。\n\
            \n```tsx\n// 两点线性（官方示例：fade-in）\nconst opacity = interpolate(frame, [0,\
            \ 20], [0, 1]);\n// 或归一化进度 t ∈ [0,1]\nconst t = Math.min(1, Math.max(0,\
            \ frame / durationFrames));\nconst y = interpolate(t, [0, 1], [startValue,\
            \ endValue]);\n```\n\n```tsx\n// 先淡入再淡出：按帧（官方写法）或按进度，inputRange 与 outputRange\
            \ 长度必须一致\nconst { durationInFrames } = useVideoConfig();\nconst opacity\
            \ = interpolate(\n  frame,\n  [0, 20, durationInFrames - 20, durationInFrames],\n\
            \  [0, 1, 1, 0]\n);\n// 或按进度（中间有峰）：三点对三点\nconst opacity2 = interpolate(morphProgress,\
            \ [0.4, 0.5, 0.6], [0, 1, 0], {\n  extrapolateRight: \"clamp\",\n});\n\
            ```\n\n```tsx\n// 防止输出超出 output 范围（官方示例）\nconst scale = interpolate(frame,\
            \ [0, 20], [0, 1], {\n  extrapolateRight: \"clamp\",\n});\n```\n\n```tsx\n\
            // 弹簧 + 位移：先用 spring 得到 0~1，再 interpolate 到目标范围（官方推荐）\nconst driver =\
            \ spring({ frame, fps });\nconst marginLeft = interpolate(driver, [0,\
            \ 1], [0, 200]);\n```\n\n**官方参考**：[interpolate()](https://www.remotion.dev/docs/interpolate)（四参数、extrapolate、easing）、[Easing](https://www.remotion.dev/docs/easing)、[interpolateColors()](https://www.remotion.dev/docs/interpolate-colors)（颜色过渡）。\n\
            \n**根因说明（为何会出现 inputRange/outputRange 长度不一致）**：  \n当需求是「在某一小段进度内先淡入再淡出」（opacity\
            \ 0→1→0）时，容易只写两个输入点 `[0.4, 0.6]` 配三个输出 `[0, 1, 0]`，导致运行时报错 `inputRange\
            \ (2) and outputRange (3) must have the same length`。Remotion 要求每个 output\
            \ 都有唯一对应的 input 点，因此「先升后降」必须写成**三个 input 点 + 三个 output 点**，中间点（如 0.5）表示「峰值」出现的时间。\n\
            \n**根因说明（为何会出现 inputRange 降序 [1, 0.5]）**：  \n当需求是「输入变量从 1 变到 0.5 时，输出从\
            \ 1 变到 0.95」时，容易按“变化顺序”写成 `interpolate(x, [1, 0.5], [1, 0.95])`。Remotion\
            \ 要求 inputRange **数组本身**必须数值升序，与输入变量随时间先增后减无关。正确写法：`interpolate(x, [0.5,\
            \ 1], [0.95, 1])`。\n\n**根因说明（为何会出现 outputRange 含颜色/字符串）**：  \n当需求是「随进度从灰变红」时，容易写\
            \ `interpolate(progress, [0, 1], [theme.colors.textSecondary, theme.colors.error])`。Remotion\
            \ 的 **interpolate()** 只支持**数字** outputRange（[文档](https://www.remotion.dev/docs/interpolate)），颜色是字符串，会报\
            \ `outputRange must contain only numbers`。正确做法：**颜色过渡用 interpolateColors()**（[文档](https://www.remotion.dev/docs/interpolate-colors)），例如\
            \ `interpolateColors(progress, [0, 1], [theme.colors.a, theme.colors.b])`，支持\
            \ hex/rgb/hsl/颜色名；若只需阈值切换可用数字进度再选色。\n\n#### ✅ 音频规范（必须，避免 `<Html5Audio\
            \ />` 数量超限）\n\n- **禁止在 scene 代码里使用任何音频标签/组件**：\n      - ❌ 禁止：`import {\
            \ Audio } from \"remotion\"`、`<Audio />`、`<audio />`\n      - 原因：本模板会在\
            \ `VideoComposition` 按 `manifest.scenes[].props.audio` **统一注入 voiceover/bgm/sfx**。\n\
            \      - 你在 scene 里再挂音频，会叠加音轨，导致 Player/Studio 报错：`Tried to simultaneously\
            \ mount N <Html5Audio /> tags...`。\n- 如果需要\"跟旁白同步\"的效果：用 `currentScene.subtitles[]`\
            \ 的时间轴 + `frame/interpolate/spring` 驱动画面，不要自己播放音频。\n- **场景代码不应该假设音频文件一定存在**：\n\
            \      - 如果音频文件缺失，场景仍应该能够渲染（只是没有声音）\n      - 不要添加音频文件存在性检查（这由构建系统处理）\n\
            \n- 用 `useMemo` 缓存复杂计算（如 D3 布局/粒子初始状态）\n\n#### ✅ 语法有效性（必须）\n\n> 生成的 `.tsx`\
            \ **必须是可解析的 TSX**。一旦出现语法错误（例如变量名里有空格），Remotion Studio/打包会直接启动失败或构建失败。\n\
            \n- **变量/函数/类型名必须是合法 JS 标识符**：只能用字母/数字/`_`/`$`，且不能包含空格。\n      - ❌ 错误：`const\
            \ left removalY = ...`\n      - ✅ 正确：`const leftRemovalY = ...`\n- **命名规则**：统一用\
            \ `camelCase`（变量/函数）与 `PascalCase`（组件）。不要\"拼接字符串\"生成变量名。\n- **不要输出未闭合的括号/引号/JSX\
            \ 标签**；不要留残缺的 `,` / `}` / `)`。\n- **JSX 文本中的 `<` 与 `>` 必须转义**（与 [TypeScript\
            \ JSX](https://www.typescriptlang.org/docs/handbook/jsx.html)、[React 文档](https://react.dev/learn#writing-markup-with-jsx)\
            \ 一致）：在 JSX 子节点的**文本内容**里，字符 `>` 会被解析为标签结束符、`<` 会被解析为标签开始，导致 **TS1382:\
            \ Unexpected token. Did you mean `{'>'}` or `&gt;`?**。要显示箭头或比较符号时须转义：`>`\
            \ 写成 `{'>'}` 或 `&gt;`，`<` 写成 `{'<'}` 或 `&lt;`。例如 `Click here ->` 应写为 `Click\
            \ here -&gt;` 或 `Click here -{'>'}`；`a < b` 应写为 `a &lt; b` 或 `a {'<'}\
            \ b`。\n\n#### ✅ 纯帧驱动动画（避免 flicker）\n\n> Remotion 渲染必须是确定性的：同一帧渲染多次结果必须一致。\n\
            \n- **禁止使用 CSS `transition` / `animation`** 来做动效（这类动效不是 `useCurrentFrame()`\
            \ 驱动，容易触发 flicker 警告）。\n      - ✅ 用 `frame` + `interpolate/spring` 计算\
            \ `opacity/transform` 等样式值。\n\n#### ✅ TypeScript 严格模式（生成代码必须能过 `strict`）\n\
            \n> 本项目开启了 TypeScript `strict`，并且 scenes 代码经常会被本地/CI 的校验脚本扫描。\n\n- **不要写隐式\
            \ `any`**：所有函数参数、局部组件 props 都要有类型。\n      - ✅ 推荐：先定义 `type`/`interface`，再写组件：\n\
            \        - `type WeightProps = { color: string; label: string; position:\
            \ [number, number, number]; scale?: number };`\n        - `const Weight:\
            \ React.FC<WeightProps> = ({ color, label, position, scale = 1 }) => {\
            \ ... }`\n- **不要引入未使用的变量/导入**：只 `import` 实际使用到的符号；不要为了\"看起来完整\"随手 import。\n\
            - **不要为 JSX 额外 `import React from \"react\"`**：本项目 `jsx` 是 `react-jsx`，普通\
            \ JSX 不需要 React 默认导入。\n\n#### ✅ Theme 对象结构（必须遵守）\n\n- **useTheme() 的写法（必须遵守）**：本模板的\
            \ `useTheme()` **直接返回 Theme 对象**（类型为 `Theme`），不是 `{ theme: Theme }`。**唯一正确写法**：`const\
            \ theme = useTheme();`。禁止对返回值做对象解构（例如从返回值里取 `theme` 属性），否则得到的变量为 undefined，后续访问\
            \ `theme.colors`、`theme.fonts` 等会触发多种运行时错误（如 reading 'colors'、reading\
            \ 'heading' 等）。子组件若需 theme，由父组件传入 `theme={theme}`，或在子组件内同样写 `const theme\
            \ = useTheme();`。\n\n`useTheme()` 返回的 Theme 对象结构：\n\n```typescript\n{\n\
            \  colors: {\n    primary: string;\n    secondary: string;\n    background:\
            \ string;\n    text: string;\n    textSecondary: string;\n    success:\
            \ string;\n    warning: string;\n    error: string;\n    surface: string;\n\
            \    surfaceLight: string; // ... 其他颜色\n  }\n  fonts: {\n    heading:\
            \ string;\n    body: string;\n    mono: string;\n  }\n}\n```\n\n- ✅ 正确：`theme.colors.primary`、`theme.colors.background`、`theme.colors.text`\n\
            - ❌ 错误：`theme.colorPalette.primary_color`、`theme.primary_color`、`theme.backgroundBase`、`theme.background_base`\n\
            \n**重要**：Dify JSON 中的 `color_palette.primary_color` 和 `color_palette.background_base`\
            \ 只是输入数据，生成代码时应该直接使用 `theme.colors.primary` 和 `theme.colors.background`，不要尝试访问\
            \ `colorPalette`。\n\n#### ✅ 主题字体 API（不要瞎猜字段名）\n\n- `theme.fonts` 只有 3\
            \ 个字段：\n      - `theme.fonts.heading`\n      - `theme.fonts.body`\n   \
            \   - `theme.fonts.mono`\n- ❌ 不要使用 `theme.fonts.data` / `theme.fonts.code`\
            \ 这类\"猜测字段\"。\n\n#### ✅ Recharts formatter 类型兼容（避免 TS2322）\n\n- 当你写 `formatter`（比如\
            \ `LabelList`）时，参数类型往往是 `unknown | string | number | ...`。\n- ✅ 正确做法：用\
            \ `unknown` + `typeof` 守卫：\n  - `const fmt = (v: unknown) => (typeof v\
            \ === \"number\" ? `${v.toFixed(1)}%` : String(v ?? \"\"));`\n\n#### ✅\
            \ Recharts 与 Chart.js 在 Remotion 中的统一规则（与 [Remotion 官方 Charts 规则](https://github.com/remotion-dev/remotion/blob/main/packages/skills/skills/remotion/rules/charts.md)\
            \ 一致）\n\n**官方原文**：_\"Disable all animations from third party libraries\
            \ - they cause flickering. Drive all animations from useCurrentFrame().\"\
            _（禁用所有第三方图表库的自带动画，会导致闪烁；所有动画由 useCurrentFrame() 驱动。）\n\n**三条统一规则（Recharts、Chart.js\
            \ 均须遵守）：**\n\n1. **固定尺寸，禁止 ResponsiveContainer**  \n   Remotion 每帧重渲染整棵组件树；ResponsiveContainer\
            \ 内部通过 ResizeObserver/订阅更新宽高并 setState，与每帧渲染叠加会触发 **React #185 (Maximum\
            \ update depth exceeded)**。✅ 必须使用**固定尺寸**：`const { width, height } = useVideoConfig();`\
            \ 后 `<BarChart width={width * 0.6} height={height - 280} ... />` 或 `<BarChart\
            \ width={800} height={400} ... />`，禁止 `<ResponsiveContainer>`。Chart.js\
            \ 同理：给容器或 canvas 父级设明确宽高。\n\n2. **关闭库自带动画，由 useCurrentFrame() 驱动**  \n\
            \   所有图表动画（柱子高度、折线绘制、饼图扇形等）必须由 `useCurrentFrame()` + `interpolate` / `spring`\
            \ 计算后传入 data 或 SVG，不要依赖库的内置动画做主驱动。\n\n   - **Recharts**（[Recharts API](https://recharts.org/en-US/api)）：在\
            \ **每个系列组件**上设置 `isAnimationActive={false}` 和 `animationDuration={0}`（否则会有默认\
            \ 1500ms 延迟）。例如：`<Bar isAnimationActive={false} animationDuration={0}\
            \ ... />`、`<Line isAnimationActive={false} animationDuration={0} ... />`、`<Area\
            \ isAnimationActive={false} animationDuration={0} ... />`、`<Pie isAnimationActive={false}\
            \ animationDuration={0} ... />`。数据用 frame 计算：`data={data.map((d, i) =>\
            \ ({ ...d, value: interpolate(frame, [i*5, 60], [0, d.value], { extrapolateRight:\
            \ \"clamp\" }) }))}` 等。\n   - **Chart.js**（[Chart.js Animations](https://www.chartjs.org/docs/latest/configuration/animations.html)）：在\
            \ options 中关闭动画：`options={{ animation: false }}` 或 `options={{ animation:\
            \ { duration: 0 } }}`。数据由 frame 计算后传入 `data`，不要依赖 Chart.js 的 transition\
            \ 做动画。\n\n3. **容器挂载与 ref**  \n   若使用依赖 DOM ref 的图表（如 Chart.js 的 canvas），在\
            \ useEffect/useLayoutEffect 内对容器做 connect/addEventListener 前，先判断 `ref.current\
            \ != null`，并在 cleanup 中移除监听；图表放在**有明确尺寸的父节点**内，避免条件未稳定时挂载。\n\n**柱状图 /\
            \ 饼图 / 折线 推荐模式**（与官方 skill 一致）：柱状图用 `spring({ frame, fps, delay: i * STAGGER_DELAY,\
            \ config: { damping: 200 } })` 做 stagger 后乘到 value；饼图用 SVG `<circle>`\
            \ 的 `strokeDasharray`/`strokeDashoffset` 从 12 点方向动画；折线/路径可用 `@remotion/paths`（[文档](https://www.remotion.dev/docs/paths)）的\
            \ `evolvePath`、`getPointAtLength` 等，或 SVG path + 自算 dashoffset。\n\n####\
            \ ❗ 图标/组件导入（硬性约束，避免 \"Element type is invalid: got undefined\"）\n\n这是生成场景最常见的运行时报错之一：**导入了不存在的命名导出**（例如图标名、组件名\"\
            猜错\"），编译可能不报错，但运行时 JSX 渲染会得到 `undefined`。\n\n**权威规则入口**：以「\U0001F4DD 基础组件」与「❗\
            \ 硬性失败条件」为准。\n\n\n- **图标**：禁止任何形式的 `lucide-react` 导入；必须使用 `SafeIcon`（白名单同上）。不在白名单时，用\
            \ SVG 或 `@remotion/shapes` 替代。\n- **组件**：仅允许从 `../components` 导入 `Subtitle`\
            \ / `SafeArea` / `SafeIcon` / `FullCanvas`。\n\n\n#### ✅ Three.js / Drei\
            \ 文本（避免运行时字体加载问题）\n\n- Drei 的 `<Text>` 组件的 `font` **期望的是字体文件 URL/路径**（例如\
            \ `.woff/.ttf`），不是 CSS 的 `font-family` 字符串。\n      - ❌ 错误：`<Text font={theme.fonts.heading}\
            \ />`\n      - ✅ 做法：\n        - **优先**把文本放到 2D UI 层（普通 `<div>` + `fontFamily:\
            \ theme.fonts.heading`）\n        - 或者 **省略** `font` 属性，让 Drei 用默认字体\n\n\
            #### ✅ Drei 异步组件最佳实践（Suspense 已正确支持）\n\n`FullCanvas` 组件已内置 Suspense 包装（与\
            \ `@remotion/three` 的 `ThreeCanvas` 行为一致），以下 drei 组件可正常使用：\n\n**已支持的异步组件：**\n\
            \n- `<Environment preset=\"...\" />` - 加载 HDR 环境贴图\n- `<Text>` / `<Text3D>`\
            \ - 加载字体文件\n- `<Cloud />` - 云朵效果\n- `useLoader`, `useGLTF`, `useTexture`\
            \ 等 Hook\n\n**最佳实践建议：**\n\n1. **Environment 组件**：\n         - ✅ 可以使用 `<Environment\
            \ preset=\"park\" />` 等预设\n         - ⚠️ 注意：preset 依赖外部 CDN (polyhaven.org)，在网络不稳定环境可能加载较慢\n\
            \         - \U0001F4A1 推荐：对于简单场景，优先使用基础灯光组合（更稳定、无外部依赖）：\n           `tsx\n\
                 <ambientLight intensity={0.8} />\n     <directionalLight position={[10,\
            \ 10, 5]} intensity={1.2} castShadow />\n     `\n\n2. **Text/Text3D 组件**：\n\
            \         - ✅ 可以使用 drei 的 `<Text>` 组件\n         - \U0001F4A1 推荐：对于重要的\
            \ UI 文字，优先放在 2D 层（更清晰、更可控）：\n           `tsx\n     <SafeArea>\n       <div\
            \ style={{ fontFamily: theme.fonts.heading, fontSize: 48 }}>标题文字</div>\n\
                 </SafeArea>\n     `\n\n3. **模型加载**：\n         - ✅ 可以使用 `useGLTF`、`useTexture`\
            \ 等加载资源\n         - \U0001F4A1 建议：对于大型资源，考虑使用预加载 `useGLTF.preload('/model.glb')`\n\
            \n### 3. 布局方式\n\n```tsx\n// Flexbox（推荐）\n<AbsoluteFill style={{\n  display:\
            \ 'flex',\n  flexDirection: 'column',\n  padding: 60,\n  gap: 40\n}}>\n\
              <div style={{ flex: 1 }}>上半部分</div>\n  <div style={{ flex: 1 }}>下半部分</div>\n\
            </AbsoluteFill>\n\n\n\n// Grid\n<AbsoluteFill style={{\n  display: 'grid',\n\
              gridTemplateColumns: '1fr 1fr',\n  gap: 40,\n  padding: 60\n}}>\n  <div>左侧</div>\n\
              <div>右侧</div>\n</AbsoluteFill>\n\n\n\n// 绝对定位\n<AbsoluteFill>\n  <div\
            \ style={{ position: 'absolute', top: 60, left: 60 }}>标题</div>\n  <div\
            \ style={{ position: 'absolute', bottom: 60, right: 60 }}>内容</div>\n</AbsoluteFill>\n\
            ```\n\n### 4. 字幕处理\n\n**⚠️ 必须使用数据与渲染分离的模式**\n\n```tsx\n// ✅ 正确：先定义 subtitles\
            \ 数组，再用 .map() 渲染\nconst subtitles = [\n  { text: \"这是第一条字幕\", start_time_seconds:\
            \ 0, end_time_seconds: 3 },\n  {\n    text: \"This is the second subtitle\"\
            ,\n    start_time_seconds: 3.5,\n    end_time_seconds: 7,\n  },\n  { text:\
            \ \"第三条字幕内容\", start_time_seconds: 7.5, end_time_seconds: 11 },\n];\n\n\
            // 在 JSX 中\n{\n  subtitles.map((s, i) => (\n    <Subtitle\n      key={i}\n\
            \      text={s.text}\n      startFrame={Math.round(s.start_time_seconds\
            \ * fps)}\n      durationInFrames={Math.round(\n        (s.end_time_seconds\
            \ - s.start_time_seconds) * fps\n      )}\n    />\n  ));\n}\n```\n\n```tsx\n\
            // ❌ 错误：text 使用变量引用\nconst content = \"字幕内容\";\nconst subtitles = [\n\
            \  { text: content, start_time_seconds: 0, end_time_seconds: 3 },\n];\n\
            \n// ❌ 错误：数组名不是 subtitles\nconst captions = [{ text: \"...\", start_time_seconds:\
            \ 0, end_time_seconds: 3 }];\n\n// ❌ 错误：直接写 <Subtitle> 不用数组\n<Subtitle\
            \ text=\"...\" startFrame={0} durationInFrames={90} />;\n```\n\n**时间换算示例**：\n\
            \n- 输入（全片绝对时间）：`{ text: \"Hello\", start_time_seconds: 15.0, end_time_seconds:\
            \ 18.0 }`\n- 场景起始秒：`sceneStartSeconds = 15.0`\n- 计算相对时间：`relativeStart\
            \ = 15.0 - 15.0 = 0`，`relativeEnd = 18.0 - 15.0 = 3`\n- 输出：`{ text: \"\
            Hello\", start_time_seconds: 0, end_time_seconds: 3 }`\n\n---\n\n## ✅\
            \ 生成前自检（命中禁用规则即重写）\n\n- 出现 `easing: spring(...)` / `Easing.expo` / `Easing.sine`\
            \ → 立即重写为安全写法或移除 easing\n- 出现 `forceZ` / `forceCollideZ` 等未在白名单的 d3-force\
            \ API → 立即移除或回退为静态布局\n- 不确定 API 是否存在 → 必须回退为\"无动画/无 d3-force\"版本\n- 发现\
            \ `inputRange` 降序（如 `[800, 100]`）→ 立即改为递增输入范围，反向效果改用 `outputRange`\n-\
