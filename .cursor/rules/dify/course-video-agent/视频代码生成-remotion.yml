            \ 3D 画布；须传 width/height，与 useCurrentFrame 同步。\n- [React Three Fiber](https://docs.pmnd.rs/react-three-fiber)\
            \ - 本模板使用 `FullCanvas`（来自 `../components`）而非 R3F 的 `Canvas`，违反会导致渲染尺寸错误。\n\
            - [@react-three/drei](https://drei.pmnd.rs) - Three.js 工具集\n- [Three.js\
            \ 文档](https://threejs.org/docs) - 如 [CatmullRomCurve3](https://threejs.org/docs/#api/en/extras/curves/CatmullRomCurve3)\
            \ 等，API 以官网为准。\n- [Framer Motion](https://www.framer.com/motion) - 流畅动画\n\
            - [React Spring](https://react-spring.io) - 物理动画\n- [GSAP](https://greensock.com/gsap)\
            \ - 专业动画库\n\n#### ⚠️ 严禁使用的库（未安装）\n\n- ❌ `@react-three/postprocessing`：**未安装**。禁止使用\
