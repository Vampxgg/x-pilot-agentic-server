            \ 中提取**，而非自行发挥。\n  - **溯源验证**：如果需要展示具体数字/定义/因果结论，检查 `scene_knowledge.resolved_references[]`\
            \ 中是否有对应内容：\n    - ✅ **有依据**：直接使用 `extracted_content` 中的原文\n    - ⚠️ **无依据**：改写为示意性/定性描述，避免编造具体数值\n\
