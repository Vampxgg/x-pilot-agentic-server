            \ \"flex\",\n        flexDirection: \"column\",\n      }}\n    >\n   \
            \                     {/* 标题 */}           {\" \"}\n      <div style={{\
            \ opacity: titleOpacity, marginBottom: 40 }}>\n                       \
            \        {\" \"}\n        <h1\n          style={{\n            color:\
            \ \"white\",\n            fontSize: 64,\n            fontFamily: theme.fonts.heading,\n\
