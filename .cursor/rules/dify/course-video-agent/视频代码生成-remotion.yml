    - data:
        code: "import re\n\ndef main(llm_ouput: str) -> dict:\n    \"\"\"\n    功能：\n\
          \    1. 移除 <thought>...</thought> 思考过程\n    2. 提取 ```tsx ... ``` 包裹的代码块（如果存在）\n\
          \    3. 异常兜底：如果处理失败，原样返回输入\n\n    输入变量: llm_ouput (注意保持与你 Dify 变量名一致)\n\
          \    输出字段: result\n    \"\"\"\n    try:\n        # 1. 安全判空\n        if not\
          \ llm_ouput:\n            return {\"result\": \"\"}\n\n        content =\
          \ llm_ouput\n\n        # 2. 移除 <thought> 标签及其内容\n        # r'<thought>[\\\
          s\\S]*?</thought>' : 匹配 <thought> 开始，到 </thought> 结束的所有内容\n        content\
          \ = re.sub(r'<thought>[\\s\\S]*?</thought>', '', content)\n\n        # 3.\
          \ 尝试提取 Markdown 代码块\n        # 策略：优先寻找闭合的代码块；若无，则寻找未闭合的代码块（应对截断情况）\n   \
          \     \n        valid_blocks = []\n        \n        # 3.1 查找闭合块 (```...```)\n\
          \        # 使用非贪婪匹配 ([\\s\\S]*?) 找到所有完整的块\n        # 增强正则：(?:\\w+)? 匹配任意语言标识\
          \ (如 python, tsx, json 等)\n        closed_pattern = r'```(?:\\w+)?\\s*([\\\
          s\\S]*?)```'\n        \n        for m in re.finditer(closed_pattern, content):\n\
          \            block_content = m.group(1).strip()\n            # 过滤过短的块（可能是残留的空标记）\n\
          \            if len(block_content) > 10:\n                valid_blocks.append(block_content)\n\
          \        \n        # 3.2 如果没有找到有效的闭合块，尝试查找未闭合块\n        # 这种情况通常发生在 LLM\
          \ 输出因为 token 限制被截断\n        if not valid_blocks:\n            # 匹配 ``` 开头，直到字符串结束\n\
          \            unclosed_pattern = r'```(?:\\w+)?\\s*([\\s\\S]*)'\n       \
          \     m = re.search(unclosed_pattern, content)\n            if m:\n    \
          \            block_content = m.group(1).strip()\n                if len(block_content)\
          \ > 10:\n                    valid_blocks.append(block_content)\n\n    \
          \    # 4. 结果决策\n        if valid_blocks:\n            # 选择最长的块作为最终结果，稳健性最高\n\
          \            final_result = max(valid_blocks, key=len)\n        else:\n\
          \            # 如果没找到任何代码块，回退到去除 thought 后的全文\n            final_result =\
          \ content.strip()\n\n        return {\n            \"result\": final_result\n\
          \        }\n\n    except Exception as e:\n        # 4. 鲁棒性处理：发生任何错误（如正则超限、类型错误等），返回原始内容\n\
          \        # 确保后续节点依然有数据可用，而不是中断工作流\n        return {\n            \"result\"\
          : llm_ouput\n        }"
        code_language: python3
        isInIteration: true
        isInLoop: false
