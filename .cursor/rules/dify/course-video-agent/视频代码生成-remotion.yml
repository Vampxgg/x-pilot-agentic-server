            \n\n## \U0001F9E0 跨场景一致性与去重（必须利用完整 JSON）\n\n\n\n你会拿到全片 `video`，请用它来保证一致性、避免重复讲解：\n\
            \n\n\n- **统一风格**：优先使用 `video.config` 的 `art_style` / `animation_style`\
            \ / `typography` / `color_palette` / `visual_engine`，让每个场景看起来像同一套课。\n\
