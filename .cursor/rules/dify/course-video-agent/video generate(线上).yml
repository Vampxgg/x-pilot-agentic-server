    - data:
        code: "import requests\nimport json\nimport re\nimport os\nimport time\nfrom\
          \ typing import List, Dict, Any, Tuple\nfrom urllib.parse import urlparse\n\
          import concurrent.futures\nimport threading\nfrom requests.adapters import\
          \ HTTPAdapter\nfrom urllib3.util.retry import Retry\n\n# ==============================================================================\n\
          # ----------------------------> 用户配置区 <---------------------------------\n\
          # ==============================================================================\n\
          CONFIG = {\n    \"API_BASE_URL\": \"https://server.x-pilot.ai/static\",\n\
          \n    \"AUTH_DETAILS\": {\n        \"login\": \"xt666666\",\n        \"\
          password\": \"123456\",\n        \"initial_token\": \"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjIwMjAxMDExLCJyb2xlIjoxLCJpYXQiOjE3NjE3Mjg1NTAsImV4cCI6MTc2MTgxNDk1MH0.4YTszVwCiSZ3AgLPGM-DvvcCYPmIBoTOppnKBu9IpxguA0\"\
          \n    },\n\n    \"ENDPOINTS\": {\n        # 【修改点】接口变为复数 uploads\n      \
          \  \"upload\": \"/file/uploads\", \n        \"sign_in\": \"/auth/sign_in\"\
          \n    },\n\n    # 【修改点】每批次上传的文件数量 (你要求最多5个)\n    \"BATCH_SIZE\": 5,\n  \
          \  \n    # 下载并发数\n    \"MAX_DOWNLOAD_WORKERS\": 20,\n    # 上传并发数 (指同时上传多少个批次)\n\
          \    \"MAX_UPLOAD_WORKERS\": 4, \n\n    # 超时设置 (连接, 读取)\n    \"DOWNLOAD_TIMEOUT\"\
          : (5, 30),\n    \"UPLOAD_TIMEOUT\": (10, 60)\n}\n\n# ==============================================================================\n\
          # --------------------------> Session 连接池 <---------------------------------\n\
          # ==============================================================================\n\
          class SessionManager:\n    _session = None\n    _lock = threading.Lock()\n\
          \n    @classmethod\n    def get_session(cls):\n        with cls._lock:\n\
          \            if cls._session is None:\n                cls._session = requests.Session()\n\
          \                retries = Retry(\n                    total=3,\n      \
          \              backoff_factor=0.3,\n                    status_forcelist=[500,\
          \ 502, 503, 504],\n                    allowed_methods=[\"HEAD\", \"GET\"\
          , \"POST\"]\n                )\n                adapter = HTTPAdapter(\n\
          \                    pool_connections=20, \n                    pool_maxsize=20,\n\
          \                    max_retries=retries\n                )\n          \
          \      cls._session.mount('http://', adapter)\n                cls._session.mount('https://',\
          \ adapter)\n            return cls._session\n\n# ==============================================================================\n\
          # ---------------------------> 认证管理 <-------------------------------------\n\
          # ==============================================================================\n\
          class AuthManager:\n    _instance = None\n    _lock = threading.Lock()\n\
          \n    def __new__(cls):\n        with cls._lock:\n            if cls._instance\
          \ is None:\n                cls._instance = super(AuthManager, cls).__new__(cls)\n\
          \                cls._instance._initialized = False\n            return\
          \ cls._instance\n\n    def __init__(self):\n        if self._initialized:\
          \ return\n        self.api_base_url = CONFIG[\"API_BASE_URL\"]\n       \
          \ self.sign_in_endpoint = CONFIG[\"ENDPOINTS\"][\"sign_in\"]\n        self.credentials\
          \ = CONFIG[\"AUTH_DETAILS\"]\n        self._token = self.credentials.get(\"\
          initial_token\")\n        self._token_lock = threading.Lock()\n        self._initialized\
          \ = True\n\n    @property\n    def token(self):\n        with self._token_lock:\
          \ return self._token\n\n    @token.setter\n    def token(self, value):\n\
          \        with self._token_lock: self._token = value\n\n    def get_headers(self)\
          \ -> Dict[str, str]:\n        return {'Authorization': f'Bearer {self.token}'}\n\
          \n    def refresh_token(self, session):\n        with self._token_lock:\n\
          \            print(\">>> 正在刷新 Token ...\")\n            url = f\"{self.api_base_url}{self.sign_in_endpoint}\"\
          \n            payload = {'login': self.credentials['login'], 'password':\
          \ self.credentials['password']}\n            try:\n                resp\
          \ = session.post(url, data=payload, headers={'Content-Type': 'application/x-www-form-urlencoded'},\
          \ timeout=10)\n                resp.raise_for_status()\n               \
          \ data = resp.json()\n                if data.get(\"status\") is True and\
          \ 'data' in data:\n                    self.token = data['data']['token']\n\
          \                    print(\">>> Token 刷新成功\")\n                else:\n\
          \                    print(f\"Token刷新失败: {data}\")\n            except Exception\
          \ as e:\n                print(f\"Token刷新异常: {e}\")\n\n# ==============================================================================\n\
          # ---------------------------> 工具函数 <-------------------------------------\n\
          # ==============================================================================\n\
          \ndef get_file_info(url: str) -> Tuple[str, str]:\n    \"\"\"提取文件名和MIME\"\
          \"\"\n    parsed = urlparse(url)\n    filename = os.path.basename(parsed.path)\n\
          \    if not filename or '.' not in filename:\n        # 使用时间戳防重\n      \
          \  filename = f\"img_{int(time.time()*1000)}_{str(id(url))[-4:]}.jpg\"\n\
          \    \n    ext = os.path.splitext(filename)[1].lower()\n    mime_map = {\n\
          \        '.jpg': 'image/jpeg', '.jpeg': 'image/jpeg',\n        '.png': 'image/png',\
          \ '.gif': 'image/gif',\n        '.webp': 'image/webp', '.svg': 'image/svg+xml'\n\
          \    }\n    return filename, mime_map.get(ext, 'application/octet-stream')\n\
          \n# ==============================================================================\n\
          # ---------------------------> 核心逻辑拆分 <---------------------------------\n\
          # ==============================================================================\n\
          \n# 1. 独立下载函数\ndef download_image(url: str, session: requests.Session) ->\
          \ Dict[str, Any] | None:\n    try:\n        filename, mime_type = get_file_info(url)\n\
          \        # 强制设置 timeout\n        resp = session.get(url, stream=False, timeout=CONFIG[\"\
          DOWNLOAD_TIMEOUT\"])\n        resp.raise_for_status()\n        \n      \
          \  return {\n            \"original_url\": url,\n            \"filename\"\
          : filename,\n            \"content\": resp.content,\n            \"mime_type\"\
          : mime_type\n        }\n    except Exception as e:\n        # print(f\"\
          下载失败 {url[:30]}... : {e}\")\n        return None\n\n# 2. 批量上传函数\ndef upload_batch(\n\
          \    img_data_list: List[Dict[str, Any]], \n    auth: AuthManager, \n  \
          \  upload_url: str, \n    session: requests.Session\n) -> Dict[str, str]:\n\
          \    \"\"\"\n    接收一组图片数据，调用一次接口上传\n    返回: {original_url: new_url} 的映射字典\n\
          \    \"\"\"\n    if not img_data_list:\n        return {}\n\n    # 构建 requests\
          \ 需要的 files 结构: [('files', (filename, content, mime)), ...]\n    files_payload\
          \ = []\n    # 用于映射 response 中的 originalname 回 original_url\n    filename_to_url_map\
          \ = {}\n\n    for item in img_data_list:\n        files_payload.append(\n\
          \            ('files', (item['filename'], item['content'], item['mime_type']))\n\
          \        )\n        filename_to_url_map[item['filename']] = item['original_url']\n\
          \n    try:\n        def do_request():\n            return session.post(\n\
          \                upload_url, \n                headers=auth.get_headers(),\
          \ \n                files=files_payload, # requests 会自动处理 multipart/form-data\n\
          \                timeout=CONFIG[\"UPLOAD_TIMEOUT\"]\n            )\n\n \
          \       resp = do_request()\n\n        # Token 401 重试\n        if resp.status_code\
          \ == 401:\n            auth.refresh_token(session)\n            resp = do_request()\
          \ # 文件流是 bytes，可以直接重试\n\n        resp.raise_for_status()\n        res_json\
          \ = resp.json()\n\n        # 解析返回结果\n        batch_result = {}\n       \
          \ if res_json.get(\"status\") is True and isinstance(res_json.get(\"data\"\
          ), list):\n            for file_info in res_json[\"data\"]:\n          \
          \      # 接口返回的 originalname 应该和我们上传时的 filename 一致\n                ret_name\
          \ = file_info.get(\"originalname\")\n                new_url = file_info.get(\"\
          url\")\n                \n                if ret_name in filename_to_url_map\
          \ and new_url:\n                    origin_url = filename_to_url_map[ret_name]\n\
          \                    batch_result[origin_url] = new_url\n        \n    \
          \    return batch_result\n\n    except Exception as e:\n        print(f\"\
          批量上传失败: {str(e)}\")\n        return {}\n\n# ==============================================================================\n\
          # ---------------------------> 主流程 <---------------------------------------\n\
          # ==============================================================================\n\
          \ndef main(arg1: Any) -> Dict[str, str]:\n    # 1. 解析入参\n    input_text\
          \ = \"\"\n    if isinstance(arg1, str):\n        try:\n            data\
          \ = json.loads(arg1)\n            input_text = data.get(\"arg1\", arg1)\
          \ if isinstance(data, dict) else arg1\n        except:\n            input_text\
          \ = arg1\n    elif isinstance(arg1, dict):\n        input_text = arg1.get(\"\
          arg1\", \"\")\n    else:\n        return {\"result\": str(arg1)}\n\n   \
          \ if not input_text:\n        return {\"result\": \"\"}\n\n    # 2. 提取并去重链接\n\
          \    pattern = r'!\\[(?P<alt>.*?)\\]\\((?P<url>[^\\s)]+?)\\s*(?:\"(?P<title>.*?)\"\
          )?\\)'\n    unique_urls = list(set(m.group('url') for m in re.finditer(pattern,\
          \ input_text)))\n    \n    if not unique_urls:\n        return {\"result\"\
          : input_text}\n\n    print(f\"共发现 {len(unique_urls)} 个唯一图片链接，准备处理...\")\n\
          \    \n    session = SessionManager.get_session()\n    auth = AuthManager()\n\
          \    upload_url = f\"{CONFIG['API_BASE_URL']}{CONFIG['ENDPOINTS']['upload']}\"\
          \n    \n    # 3. 阶段一：并发下载所有图片\n    # 将成功的下载结果保存在内存中\n    downloaded_images\
          \ = [] # List[Dict]\n    \n    start_time = time.time()\n    with concurrent.futures.ThreadPoolExecutor(max_workers=CONFIG[\"\
          MAX_DOWNLOAD_WORKERS\"]) as executor:\n        future_to_url = {executor.submit(download_image,\
          \ url, session): url for url in unique_urls}\n        \n        for future\
          \ in concurrent.futures.as_completed(future_to_url):\n            result\
          \ = future.result()\n            if result:\n                downloaded_images.append(result)\n\
          \    \n    print(f\"下载完成: {len(downloaded_images)}/{len(unique_urls)} (耗时\
          \ {time.time()-start_time:.2f}s)\")\n\n    # 4. 阶段二：将下载好的图片分批次 (Batching)\n\
          \    batches = []\n    batch_size = CONFIG[\"BATCH_SIZE\"]\n    for i in\
          \ range(0, len(downloaded_images), batch_size):\n        batches.append(downloaded_images[i\
          \ : i + batch_size])\n\n    # 5. 阶段三：并发上传批次\n    # 这一步极大减少 HTTP 请求数。例如 50\
          \ 张图，每批 5 张，只需 10 次请求。\n    # 还可以同时并发这 10 次请求。\n    final_url_map = {} \n\
          \    \n    with concurrent.futures.ThreadPoolExecutor(max_workers=CONFIG[\"\
          MAX_UPLOAD_WORKERS\"]) as executor:\n        future_to_batch = {\n     \
          \       executor.submit(upload_batch, batch, auth, upload_url, session):\
          \ batch \n            for batch in batches\n        }\n        \n      \
          \  for future in concurrent.futures.as_completed(future_to_batch):\n   \
          \         batch_res = future.result()\n            final_url_map.update(batch_res)\n\
          \n    print(f\"上传完成，成功转换 {len(final_url_map)} 张图片链接。\")\n\n    # 6. 全文替换\n\
          \    def replacer(match):\n        orig_url = match.group('url')\n     \
          \   if orig_url in final_url_map:\n            new_url = final_url_map[orig_url]\n\
          \            alt = match.group('alt') or \"\"\n            title = match.group('title')\n\
          \            base = f\"![{alt}]({new_url}\"\n            return f\"{base}\
          \ \\\"{title}\\\")\" if title else f\"{base})\"\n        return match.group(0)\
          \ # 保留原样\n\n    final_text = re.sub(pattern, replacer, input_text)\n   \
          \ \n    return {\"result\": final_text}\n"
