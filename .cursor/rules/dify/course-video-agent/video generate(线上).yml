    value: '[{"id":"S1_SUB1","text":"这是一个经典的鸡兔同笼问题。","start_time_seconds":1.5,"end_time_seconds":4.1,"audio_path":"https://server.x-pilot.ai/static/meta-doc/video/721f65b7-092b-47f0-b0ff-565a1f95ad4f/audio/audio_000_1.5s_to_4.1s.mp3"},{"id":"S1_SUB2","text":"已知笼子里，头一共有35个，","start_time_seconds":4.6,"end_time_seconds":7.3,"audio_path":"https://server.x-pilot.ai/static/meta-doc/video/721f65b7-092b-47f0-b0ff-565a1f95ad4f/audio/audio_001_4.6s_to_7.3s.mp3"},{"id":"S1_SUB3","text":"脚一共有94只。","start_time_seconds":7.5,"end_time_seconds":9.3,"audio_path":"https://server.x-pilot.ai/static/meta-doc/video/721f65b7-092b-47f0-b0ff-565a1f95ad4f/audio/audio_002_7.5s_to_9.3s.mp3"},{"id":"S1_SUB4","text":"那么，鸡和兔到底各有多少只呢？","start_time_seconds":9.8,"end_time_seconds":13,"audio_path":"https://server.x-pilot.ai/static/meta-doc/video/721f65b7-092b-47f0-b0ff-565a1f95ad4f/audio/audio_003_9.8s_to_13.0s.mp3"},{"id":"S2_SUB1","text":"解决这个问题的关键，是使用“假设法”。","start_time_seconds":13.8,"end_time_seconds":17,"audio_path":"https://server.x-pilot.ai/static/meta-doc/video/721f65b7-092b-47f0-b0ff-565a1f95ad4f/audio/audio_004_13.8s_to_17.0s.mp3"},{"id":"S2_SUB2","text":"我们先大胆假设，这35只动物全都是鸡。","start_time_seconds":17.5,"end_time_seconds":20.8,"audio_path":"https://server.x-pilot.ai/static/meta-doc/video/721f65b7-092b-47f0-b0ff-565a1f95ad4f/audio/audio_005_17.5s_to_20.8s.mp3"},{"id":"S2_SUB3","text":"那么脚的总数应该是70只。但这比实际的94只少了24只。","start_time_seconds":21.3,"end_time_seconds":26.5,"audio_path":"https://server.x-pilot.ai/static/meta-doc/video/721f65b7-092b-47f0-b0ff-565a1f95ad4f/audio/audio_006_21.3s_to_26.5s.mp3"},{"id":"S2_SUB4","text":"为什么会少呢？因为我们把兔子也当成了鸡。","start_time_seconds":27,"end_time_seconds":30.5,"audio_path":"https://server.x-pilot.ai/static/meta-doc/video/721f65b7-092b-47f0-b0ff-565a1f95ad4f/audio/audio_007_27.0s_to_30.5s.mp3"},{"id":"S3_SUB1","text":"用总的脚数差额，除以每只鸡兔的脚数差额，","start_time_seconds":31.2,"end_time_seconds":35.2,"audio_path":"https://server.x-pilot.ai/static/meta-doc/video/721f65b7-092b-47f0-b0ff-565a1f95ad4f/audio/audio_008_31.2s_to_35.2s.mp3"},{"id":"S3_SUB2","text":"就能得出兔子的数量是12只。","start_time_seconds":35.5,"end_time_seconds":37.9,"audio_path":"https://server.x-pilot.ai/static/meta-doc/video/721f65b7-092b-47f0-b0ff-565a1f95ad4f/audio/audio_009_35.5s_to_37.9s.mp3"},{"id":"S3_SUB3","text":"再用总头数减去兔子数，就得到了鸡的数量，23只。","start_time_seconds":38.4,"end_time_seconds":43.1,"audio_path":"https://server.x-pilot.ai/static/meta-doc/video/721f65b7-092b-47f0-b0ff-565a1f95ad4f/audio/audio_010_38.4s_to_43.1s.mp3"}]'
