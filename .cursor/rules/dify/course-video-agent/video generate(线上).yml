      : \"双栏对比\",\n            \"background\": {\n                \"type\": \"颜色 (color)\"\
      ,\n                \"value\": \"#FDF6E3\"\n            },\n            \"components\"\
      : [\n                {\n                    \"id\": \"assumption_card\",\n \
      \                   \"category\": \"text-and-information\",\n              \
      \      \"type\": \"信息卡片 (info-card)\",\n                    \"content\": {\n\
      \                        \"title\": \"第一步：大胆假设\",\n                        \"\
      description\": \"假设笼子里全是鸡。\",\n                        \"icon\": \"lightbulb\"\
      \n                    },\n                    \"initial_state_desc\": \"隐藏 (hidden)\"\
      \n                },\n                {\n                    \"id\": \"assumption_calculation\"\
      ,\n                    \"category\": \"text-and-information\",\n           \
      \         \"type\": \"公式块 (formula-block)\",\n                    \"content\"\
      : {\n                        \"title\": \"计算假设脚数\",\n                      \
      \  \"formula_latex\": \"35 \\\\text{ (只鸡)} \\\\times 2 \\\\text{ (只脚/鸡)} = 70\
      \ \\\\text{ (只脚)}\"\n                    },\n                    \"initial_state_desc\"\
      : \"隐藏 (hidden)\"\n                },\n                {\n                 \
      \   \"id\": \"chickens_image\",\n                    \"category\": \"media-and-imagery\"\
      ,\n                    \"type\": \"单张图片 (single-image)\",\n                \
      \    \"content\": {\n                        \"image\": {\n                \
      \            \"type\": \"url\",\n                            \"value\": \"http://35.232.154.66:5125/files/tools/ed007738-244c-408c-8645-0ea87f94e155.png?timestamp=1760603439&nonce=ce353fd99f6fa39b9e639212fb78d733&sign=QXwrAch-oYeZMZLqPctgmNC-mOzhft8XcCaKK8b6a_8=\"\
      \n                        },\n                        \"caption\": \"假设35个头都是鸡\"\
      \n                    },\n                    \"initial_state_desc\": \"隐藏 (hidden)\"\
      \n                }\n            ],\n            \"timeline_events\": [\n  \
      \              {\n                    \"start_time_seconds\": 12.9,\n      \
      \              \"end_time_seconds\": 14.9,\n                    \"target_desc\"\
      : \"展示假设卡片和鸡群图片\",\n                    \"events\": [\n                    \
      \    {\n                            \"action\": \"enter\",\n               \
      \             \"component_ids\": [\n                                \"assumption_card\"\
      \n                            ],\n                            \"animation_intent\"\
      : \"slide-in-from-left\",\n                            \"layout_intent\": \"\
      place-at-left-top\"\n                        },\n                        {\n\
      \                            \"action\": \"enter\",\n                      \
      \      \"component_ids\": [\n                                \"chickens_image\"\
      \n                            ],\n                            \"animation_intent\"\
      : \"fade-in\",\n                            \"layout_intent\": \"place-at-right-half\"\
      \n                        }\n                    ]\n                },\n   \
      \             {\n                    \"start_time_seconds\": 15.4,\n       \
      \             \"end_time_seconds\": 18.4,\n                    \"target_desc\"\
      : \"展示基于假设的计算\",\n                    \"events\": [\n                      \
      \  {\n                            \"action\": \"enter\",\n                 \
      \           \"component_ids\": [\n                                \"assumption_calculation\"\
      \n                            ],\n                            \"animation_intent\"\
      : \"unfold-calculation\",\n                            \"layout_intent\": \"\
      place-at-left-bottom\"\n                        }\n                    ]\n \
      \               }\n            ],\n            \"subtitles\": [\n          \
      \      {\n                    \"id\": \"S2_SUB1\",\n                    \"text\"\
      : \"解决这个问题的关键，是使用一种叫做“假设法”的技巧。\",\n                    \"start_time_seconds\"\
      : 12.9,\n                    \"end_time_seconds\": 18.2,\n                 \
      \   \"audio_url\": \"https://server.x-pilot.ai/static/meta-doc/video/08850fdb-74fc-41aa-895a-a2eb321c27c3/audio/audio_002_12.9s_to_18.2s.mp3\"\
      \n                },\n                {\n                    \"id\": \"S2_SUB2\"\
      ,\n                    \"text\": \"我们先假设35个头全是鸡，那么脚的总数应该是70只。\",\n         \
      \           \"start_time_seconds\": 18.7,\n                    \"end_time_seconds\"\
      : 23.8,\n                    \"audio_url\": \"https://server.x-pilot.ai/static/meta-doc/video/08850fdb-74fc-41aa-895a-a2eb321c27c3/audio/audio_003_18.7s_to_23.8s.mp3\"\
      \n                }\n            ],\n            \"estimated_duration_seconds\"\
      : 10.9\n        },\n        {\n            \"id\": \"scene_3_finding_the_difference\"\
      ,\n            \"target\": \"计算假设结果与实际情况的差异，并解释差异的来源。\",\n            \"layout\"\
      : \"中心叙事\",\n            \"background\": {\n                \"type\": \"颜色 (color)\"\
      ,\n                \"value\": \"#FDF6E3\"\n            },\n            \"components\"\
      : [\n                {\n                    \"id\": \"difference_calculation\"\
      ,\n                    \"category\": \"text-and-information\",\n           \
      \         \"type\": \"公式块 (formula-block)\",\n                    \"content\"\
      : {\n                        \"title\": \"计算脚数差额\",\n                      \
      \  \"formula_latex\": \"94 \\\\text{ (实际)} - 70 \\\\text{ (假设)} = 24 \\\\text{\
      \ (只脚)}\"\n                    },\n                    \"initial_state_desc\"\
      : \"隐藏 (hidden)\"\n                },\n                {\n                 \
      \   \"id\": \"explanation_card\",\n                    \"category\": \"text-and-information\"\
      ,\n                    \"type\": \"信息卡片 (info-card)\",\n                   \
      \ \"content\": {\n                        \"title\": \"差异的来源？\",\n         \
      \               \"description\": \"每用一只兔子替换一只鸡，总脚数会增加 (4 - 2 = 2) 只。\",\n  \
      \                      \"icon\": \"help-circle\"\n                    },\n \
      \                   \"initial_state_desc\": \"隐藏 (hidden)\"\n              \
      \  }\n            ],\n            \"timeline_events\": [\n                {\n\
      \                    \"start_time_seconds\": 24.3,\n                    \"end_time_seconds\"\
      : 27.3,\n                    \"target_desc\": \"计算实际与假设的脚数差额\",\n          \
      \          \"events\": [\n                        {\n                      \
      \      \"action\": \"enter\",\n                            \"component_ids\"\
      : [\n                                \"difference_calculation\"\n          \
      \                  ],\n                            \"animation_intent\": \"\
      dramatic-reveal\",\n                            \"layout_intent\": \"place-at-center\"\
      \n                        }\n                    ]\n                },\n   \
      \             {\n                    \"start_time_seconds\": 27.8,\n       \
      \             \"end_time_seconds\": 30.8,\n                    \"target_desc\"\
      : \"差额计算上移，下方出现解释卡片\",\n                    \"events\": [\n                \
      \        {\n                            \"action\": \"update\",\n          \
      \                  \"component_ids\": [\n                                \"\
      difference_calculation\"\n                            ],\n                 \
      \           \"animation_intent\": \"move-to\",\n                           \
      \ \"layout_intent\": \"place-at-top-half\"\n                        },\n   \
      \                     {\n                            \"action\": \"enter\",\n\
      \                            \"component_ids\": [\n                        \
      \        \"explanation_card\"\n                            ],\n            \
      \                \"animation_intent\": \"fade-in-up\",\n                   \
      \         \"layout_intent\": \"place-at-bottom-half\"\n                    \
      \    }\n                    ]\n                }\n            ],\n         \
      \   \"subtitles\": [\n                {\n                    \"id\": \"S3_SUB1\"\
      ,\n                    \"text\": \"这个结果和实际的94只脚相比，少了24只。这24只脚是从哪里来的呢？\",\n \
      \                   \"start_time_seconds\": 24.3,\n                    \"end_time_seconds\"\
      : 31,\n                    \"audio_url\": \"https://server.x-pilot.ai/static/meta-doc/video/08850fdb-74fc-41aa-895a-a2eb321c27c3/audio/audio_004_24.3s_to_31.0s.mp3\"\
      \n                },\n                {\n                    \"id\": \"S3_SUB2\"\
      ,\n                    \"text\": \"原来，每当我们把一只“假”的鸡换成一只“真”的兔子，脚的数量就会增加2只。\",\n\
      \                    \"start_time_seconds\": 31.5,\n                    \"end_time_seconds\"\
      : 38,\n                    \"audio_url\": \"https://server.x-pilot.ai/static/meta-doc/video/08850fdb-74fc-41aa-895a-a2eb321c27c3/audio/audio_005_31.5s_to_38.0s.mp3\"\
      \n                }\n            ],\n            \"estimated_duration_seconds\"\
      : 13.7\n        },\n        {\n            \"id\": \"scene_4_final_solution\"\
      ,\n            \"target\": \"基于差异，推导出兔子的数量，进而得出鸡的数量。\",\n            \"layout\"\
      : \"步骤展示\",\n            \"background\": {\n                \"type\": \"颜色 (color)\"\
      ,\n                \"value\": \"#FDF6E3\"\n            },\n            \"components\"\
      : [\n                {\n                    \"id\": \"solution_steps\",\n  \
      \                  \"category\": \"process-and-structure\",\n              \
      \      \"type\": \"解题步骤条 (solution-steps)\",\n                    \"content\"\
      : {\n                        \"title\": \"最终求解\",\n                        \"\
      steps\": [\n                            {\n                                \"\
      label\": \"求兔子数量\",\n                                \"content\": \"总差额 ÷ 每只差额\
      \ = 24 ÷ 2 = 12 (只兔子)\"\n                            },\n                  \
      \          {\n                                \"label\": \"求鸡的数量\",\n      \
      \                          \"content\": \"总头数 - 兔子数量 = 35 - 12 = 23 (只鸡)\"\n\
      \                            }\n                        ]\n                \
      \    },\n                    \"initial_state_desc\": \"隐藏 (hidden)\"\n     \
      \           },\n                {\n                    \"id\": \"verification_formula\"\
      ,\n                    \"category\": \"text-and-information\",\n           \
      \         \"type\": \"公式块 (formula-block)\",\n                    \"content\"\
      : {\n                        \"title\": \"验证答案\",\n                        \"\
      formula_latex\": \"(12 \\\\times 4) + (23 \\\\times 2) = 48 + 46 = 94 \\\\text{\
      \ (只脚)}\"\n                    },\n                    \"initial_state_desc\"\
      : \"隐藏 (hidden)\"\n                }\n            ],\n            \"timeline_events\"\
      : [\n                {\n                    \"start_time_seconds\": 38.5,\n\
      \                    \"end_time_seconds\": 43.5,\n                    \"target_desc\"\
      : \"分步展示求解过程\",\n                    \"events\": [\n                       \
      \ {\n                            \"action\": \"enter\",\n                  \
      \          \"component_ids\": [\n                                \"solution_steps\"\
      \n                            ],\n                            \"animation_intent\"\
      : \"reveal-steps-sequentially\",\n                            \"layout_intent\"\
      : \"place-at-top-half\"\n                        }\n                    ]\n\
      \                },\n                {\n                    \"start_time_seconds\"\
      : 44,\n                    \"end_time_seconds\": 47,\n                    \"\
      target_desc\": \"展示验证公式\",\n                    \"events\": [\n            \
      \            {\n                            \"action\": \"enter\",\n       \
      \                     \"component_ids\": [\n                               \
      \ \"verification_formula\"\n                            ],\n               \
      \             \"animation_intent\": \"fade-in\",\n                         \
      \   \"layout_intent\": \"place-at-bottom-half\"\n                        }\n\
      \                    ]\n                }\n            ],\n            \"subtitles\"\
      : [\n                {\n                    \"id\": \"S4_SUB1\",\n         \
      \           \"text\": \"那么，24只脚的差额，需要用 24 除以 2，也就是12只兔子来弥补。\",\n           \
      \         \"start_time_seconds\": 38.5,\n                    \"end_time_seconds\"\
      : 44.5,\n                    \"audio_url\": \"https://server.x-pilot.ai/static/meta-doc/video/08850fdb-74fc-41aa-895a-a2eb321c27c3/audio/audio_006_38.5s_to_44.5s.mp3\"\
      \n                },\n                {\n                    \"id\": \"S4_SUB2\"\
      ,\n                    \"text\": \"兔子的数量确定了，鸡的数量就是35减12，等于23只。\",\n        \
      \            \"start_time_seconds\": 45,\n                    \"end_time_seconds\"\
      : 50,\n                    \"audio_url\": \"https://server.x-pilot.ai/static/meta-doc/video/08850fdb-74fc-41aa-895a-a2eb321c27c3/audio/audio_007_45.0s_to_50.0s.mp3\"\
      \n                },\n                {\n                    \"id\": \"S4_SUB3\"\
      ,\n                    \"text\": \"让我们来验证一下，完全正确！\",\n                    \"\
      start_time_seconds\": 50.5,\n                    \"end_time_seconds\": 52.8,\n\
      \                    \"audio_url\": \"https://server.x-pilot.ai/static/meta-doc/video/08850fdb-74fc-41aa-895a-a2eb321c27c3/audio/audio_008_50.5s_to_52.8s.mp3\"\
      \n                }\n            ],\n            \"estimated_duration_seconds\"\
      : 14.3\n        }\n    ],\n    \"ending\": {\n        \"title\": \"方法总结\",\n\
      \        \"subtitle\": \"假设法三步走\",\n        \"elements\": [\n            {\n\
      \                \"type\": \"bullet-points\",\n                \"content\":\
      \ {\n                    \"title\": \"鸡兔同笼解题核心\",\n                    \"points\"\
      : [\n                        {\n                            \"icon\": \"brain\"\
      ,\n                            \"text\": \"第一步：假设全是一种动物，计算总脚数。\"\n         \
      \               },\n                        {\n                            \"\
      icon\": \"search\",\n                            \"text\": \"第二步：将计算结果与实际总脚数比较，求出差额。\"\
      \n                        },\n                        {\n                  \
      \          \"icon\": \"calculator\",\n                            \"text\":\
      \ \"第三步：用总差额除以单只脚的差额，求出另一种动物的数量。\"\n                        }\n            \
      \        ]\n                }\n            }\n        ],\n        \"copyright_text\"\
      : \"Created by X-Pilot\"\n    },\n    \"total_script_duration_seconds\": 52.8\n\
      }"
