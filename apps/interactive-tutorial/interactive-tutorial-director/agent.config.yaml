model: google/gemini-3.1-pro-preview
workerModel: z-ai/glm-5
fallbackModels:
  - moonshotai/kimi-k2.5
maxConcurrency: 8
maxIterations: 50
timeout: 600000
hideThinkOutput: false
streamMode: "stream"
allowedTools:
  - start_generation_pipeline
  - spawn_sub_agent
  - spawn_parallel_agents
  - workspace_read
  - workspace_write
  - workspace_list
  - reassemble_app
metadata:
  domain: interactive-tutorial
  templateDir: ../react-code-rander
pipeline:
  steps:
    - name: research
      handler: researchWithCache
      optional: true
      retry:
        maxAttempts: 2
        backoffMs: 3000
    - name: architect
      agent: tutorial-scene-architect
      dependsOn: [research]
      retry:
        maxAttempts: 2
        backoffMs: 3000
    - name: save-blueprint
      handler: saveBlueprint
      dependsOn: [architect]
    # 组件级 fan-out：把 blueprint 的 components 数组逐项交给单组件 coder 并行生成
    # 注意 fanOutFrom 指向 save-blueprint（而非 architect），因为 saveBlueprint 做了
    # workspace artifacts/blueprint.json 优先的三级 fallback，能稳定返回结构化对象；
    # architect step 的原始 LLM 输出可能只是自然语言总结（当模型选择用 workspace_write 落盘时）。
    - name: components
      agent: tutorial-component-coder
      dependsOn: [save-blueprint]
      parallel: true
      fanOutFrom: save-blueprint.components
      optional: true
      retry:
        maxAttempts: 2
        backoffMs: 3000
    # App.tsx 骨架：与组件 fan-out 同批并行执行（仅依赖 architect 的 file_name 列表）
    - name: app-shell
      agent: tutorial-app-shell-coder
      dependsOn: [save-blueprint]
      retry:
        maxAttempts: 2
        backoffMs: 3000
    - name: assemble
      handler: assembleApp
      dependsOn: [components, app-shell]
evolution:
  enabled: true
  requireApproval: true
