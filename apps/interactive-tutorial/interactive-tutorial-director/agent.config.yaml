provider: vertex
model: gemini-3.1-pro-preview
workerModel: z-ai/glm-5
fallbackModels:
  - moonshotai/kimi-k2.5
maxConcurrency: 8
maxIterations: 50
timeout: 600000
hideThinkOutput: false
streamMode: "stream"
allowedTools:
  - start_generation_pipeline
  - spawn_sub_agent
  - spawn_parallel_agents
  - workspace_read
  - workspace_write
  - workspace_list
  - reassemble_app
metadata:
  domain: interactive-tutorial
  templateDir: ../template_rander
pipeline:
  steps:
    - name: research
      handler: researchWithCache
      optional: true
      retry:
        maxAttempts: 2
        backoffMs: 3000
    - name: architect
      agent: tutorial-scene-architect
      dependsOn: [research]
      retry:
        maxAttempts: 2
        backoffMs: 3000
    - name: save-blueprint
      handler: saveBlueprint
      dependsOn: [architect]
    # 单一 Coder：读蓝图后串行写入所有文件（App.tsx + pages + components）
    # 取代原来的多编码器并行拆分，确保全局设计和数据模型一致
    - name: code
      agent: tutorial-coder
      dependsOn: [save-blueprint]
      retry:
        maxAttempts: 2
        backoffMs: 3000
    - name: assemble
      handler: assembleApp
      dependsOn: [code]
evolution:
  enabled: true
  requireApproval: true
