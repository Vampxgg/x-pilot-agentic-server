model: google/gemini-3.1-pro-preview
workerModel: google/gemini-3.1-pro-preview
fallbackModels:
  - google/gemini-3.1-pro-preview
  - moonshotai/kimi-k2.5
maxConcurrency: 1
# Used as langgraph recursionLimit (see src/core/agent-runtime.ts).
# A component coder ReAct cycle is similar in shape to app-shell-coder
# (read blueprint → write component → output JSON status); 12 left no headroom
# for outputFormat schema-validation retries. Keeping a buffer at 20 is safer.
maxIterations: 20
timeout: 180000
allowedTools:
  - workspace_read
  - workspace_write
metadata:
  domain: interactive-tutorial
outputFormat:
  type: json
  schema:
    type: object
    required: [filePath, status]
    properties:
      filePath:
        type: string
      status:
        type: string
        enum: [written, skipped, failed]
      sizeChars:
        type: number
evolution:
  enabled: true
  requireApproval: true
