provider: vertex
model: gemini-2.5-flash
workerModel: z-ai/glm-5
fallbackModels:
  - { model: gemini-2.5-pro, provider: vertex }
  - moonshotai/kimi-k2.5
maxConcurrency: 1
# Used as langgraph recursionLimit (see src/core/agent-runtime.ts).
# A ReAct cycle: perceiveâ†’thinkâ†’act(workspace_read?)â†’observeâ†’thinkâ†’act(workspace_write)â†’observeâ†’thinkâ†’final
# is ~8-9 super-steps; if the model's first JSON output fails the outputFormat
# schema check it retries, which previously blew past the limit of 10 and the
# whole `app-shell` pipeline step failed with "Recursion limit ... reached".
maxIterations: 25
timeout: 120000
allowedTools:
  - workspace_read
  - workspace_write
metadata:
  domain: interactive-tutorial
outputFormat:
  type: json
  schema:
    type: object
    required: [filePath, status]
    properties:
      filePath:
        type: string
      status:
        type: string
        enum: [written, failed]
      componentCount:
        type: number
evolution:
  enabled: true
  requireApproval: true
