model: gemini-3.1-pro
workerModel: gemini-3.1-pro
fallbackModels:
  - moonshotai/kimi-k2.5
maxConcurrency: 3
maxIterations: 30
timeout: 180000
allowedTools:
  - workspace_read
  - workspace_write
metadata:
  domain: interactive-tutorial
outputFormat:
  type: json
  schema:
    type: object
    required: [title, components, teaching_guide]
    properties:
      title:
        type: string
      description:
        type: string
      route_config:
        type: object
        description: "可选。路由建议：mode 为 single-page 或 multi-page，pages 列出建议的页面名"
        properties:
          mode:
            type: string
            enum: [single-page, multi-page]
          pages:
            type: array
            items:
              type: string
      components:
        type: array
        minItems: 3
        maxItems: 12
        items:
          type: object
          required: [file_name, purpose, ui_approach]
          properties:
            file_name:
              type: string
              pattern: "^[A-Z][A-Za-z0-9]+\\.tsx$"
              description: "PascalCase 组件文件名（含 .tsx 后缀），整个 components 数组中必须唯一"
            purpose:
              type: string
            ui_approach:
              type: array
              items:
                type: string
              description: "UI 实现方案描述，如 'Recharts 折线图'、'shadcn Card + Tabs'、'Framer Motion 动画'"
            data_points:
              type: array
              items:
                type: string
      teaching_guide:
        type: object
      layout_intent:
        type: object
        description: "可选。给下游 Coder 的布局设计意图，描述本教材应有的叙事节奏、组件关系、视觉身份与信息密度。不给 Tailwind class、不给具体配色十六进制，只描述方向。"
        properties:
          narrative:
            type: string
            description: "叙事节奏关键词，如 linear / exploratory / comparative / sandbox / story / total-detail-total"
          relations:
            type: string
            description: "components 之间的逻辑关系，如 parallel / progressive / comparative / nested / parameter-space / time-series / spatial"
          visual_identity:
            type: string
            description: "主题情绪关键词与色彩 DNA 方向，如 'deep-space-tech：深蓝+青+霓虹紫点缀' / 'classical-humanities：米白+赭石+墨绿' / 'bio-organic：苔绿+陶土+暖白'"
          density:
            type: string
            enum: [compact, balanced, spacious]
            description: "信息密度倾向"
      design_tokens:
        type: object
        description: "可选。给下游 Coder 的视觉设计约束，帮助所有生成文件保持一致的视觉风格。用自然语言描述，不给具体 Tailwind class 或十六进制色值。"
        properties:
          theme:
            type: string
            enum: [dark, light]
            description: "主题基调：深色或浅色"
          palette:
            type: string
            description: "色彩方案描述，如 'zinc-950 基底 + cyan-500 强调'"
          panel_style:
            type: string
            description: "容器/面板风格描述，如 '带 icon header 的圆角面板'"
          font_strategy:
            type: string
            description: "字体策略描述，如 'mono 数据展示 + sans 正文'"
evolution:
  enabled: true
  requireApproval: true
