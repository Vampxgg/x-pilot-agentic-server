model: google/gemini-3.1-pro-preview
workerModel: z-ai/glm-5
fallbackModels:
  - moonshotai/kimi-k2.5
maxConcurrency: 3
maxIterations: 45
timeout: 600000
allowedTools:
  - workspace_read
  - workspace_write
  - workspace_list
metadata:
  domain: interactive-tutorial
outputFormat:
  type: json
  schema:
    type: object
    required: [generatedFiles]
    properties:
      generatedFiles:
        type: array
        items:
          type: object
          required: [filePath, type]
          properties:
            filePath:
              type: string
            type:
              type: string
              enum: [app, component]
            status:
              type: string
evolution:
  enabled: true
  requireApproval: true
