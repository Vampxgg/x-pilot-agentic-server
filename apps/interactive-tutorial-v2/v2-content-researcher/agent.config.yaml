model: google/gemini-3.1-pro-preview
workerModel: z-ai/glm-5
fallbackModels:
  - moonshotai/kimi-k2.5
maxIterations: 15
timeout: 180000
hideThinkOutput: true
streamMode: stream

# 需要 workspace_write 写 artifacts/research.json
allowedTools:
  - workspace_write

metadata:
  domain: interactive-tutorial-v2

# v2 试错期：禁用 skill crystallization
evolution:
  enabled: false

outputFormat:
  type: json
  schema:
    type: object
    required: [topic, domain, concepts]
    properties:
      topic: { type: string }
      domain: { type: string }
      concepts:
        type: array
        minItems: 1
        items:
          type: object
          required: [id, name, definition]
          properties:
            id: { type: string }
            name: { type: string }
            definition: { type: string }
            keyPoints:
              type: array
              items: { type: string }
            example: { type: string }
      procedures:
        type: array
        items:
          type: object
          required: [name, steps]
          properties:
            name: { type: string }
            steps:
              type: array
              items:
                type: object
                required: [title]
                properties:
                  title: { type: string }
                  detail: { type: string }
                  caution: { type: string }
                  tool: { type: string }
                  param: { type: string }
      quizCandidates: { type: array }
      dataTables: { type: array }
      diagCodes: { type: array }
      simulationParams: { type: object }
      mediaHints: { type: array }
      glossary: { type: array }
      chapterHint:
        type: array
        items: { type: string }
