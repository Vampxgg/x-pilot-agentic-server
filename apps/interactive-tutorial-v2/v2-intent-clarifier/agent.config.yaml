model: z-ai/glm-5
fallbackModels:
  - moonshotai/kimi-k2.5
maxIterations: 10
timeout: 90000
hideThinkOutput: true
streamMode: stream

# 需要 workspace_write 写 artifacts/clarified-intent.json
allowedTools:
  - workspace_write

metadata:
  domain: interactive-tutorial-v2

# v2 试错期：禁用 skill crystallization
evolution:
  enabled: false

outputFormat:
  type: json
  schema:
    type: object
    required: [topic, domain, audience, goals, coreInteractions, scopeSuggestion, confidence]
    properties:
      topic: { type: string }
      domain: { type: string }
      audience:
        type: object
        required: [level]
        properties:
          level: { type: string }
          priorKnowledge: { type: string }
      goals:
        type: array
        minItems: 1
        items: { type: string }
      coreInteractions:
        type: array
        items: { type: string }
      styleHints:
        type: object
        properties:
          tone: { type: string }
          vibe: { type: string }
          referenceProducts:
            type: array
            items: { type: string }
      scopeSuggestion:
        type: object
        required: [estimatedScenes, progression]
        properties:
          estimatedScenes: { type: string }
          estimatedDurationMin: { type: number }
          progression:
            type: string
            enum: [linear, free, gated, hybrid]
      ambiguities:
        type: array
        items: { type: string }
      confidence: { type: number }
