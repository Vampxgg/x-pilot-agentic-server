model: google/gemini-3.1-pro-preview
workerModel: z-ai/glm-5
maxIterations: 14
timeout: 120000
hideThinkOutput: true
streamMode: stream

allowedTools:
  - workspace_read
  - workspace_write

metadata:
  domain: scene-dsl-chorus

evolution:
  enabled: false

outputFormat:
  type: json
  schema:
    type: object
    required: [scenes]
    properties:
      scenes:
        type: object
        additionalProperties:
          type: object
          required: [intent]
          properties:
            title: { type: string }
            intent: { type: string }
            beats:
              type: array
              items: { type: string }
            mustExplain:
              type: array
              items: { type: string }
