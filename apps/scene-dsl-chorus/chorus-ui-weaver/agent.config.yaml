model: google/gemini-3.1-pro-preview
workerModel: z-ai/glm-5
maxIterations: 20
timeout: 180000
hideThinkOutput: true
streamMode: stream

allowedTools:
  - workspace_read

metadata:
  domain: scene-dsl-chorus

evolution:
  enabled: false

outputFormat:
  type: json
  schema:
    type: object
    required: [id, scene]
    properties:
      id: { type: string }
      scene:
        type: object
        required: [ui]
        properties:
          title: { type: string }
          intent: { type: string }
          ui: { type: object }
          on: { type: object }
      actionsContrib:
        type: object
